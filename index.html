<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#176a4b">
<title>Pickleball Tournament</title>
<style>
/* ---------- tokens ---------- */
:root{
  --bg:#f1f4f0; --card:#ffffff; --ink:#17211b; --muted:#5e6d64; --line:#d7ded7;
  --accent:#176a4b; --accent-ink:#ffffff; --accent-soft:#e2efe6;
  --ball:#f5d90a; --ball-ink:#241f00;
  --alt:#34618f; --alt-soft:#e5ecf4;
  --warn:#a8730a; --warn-soft:#f6ecd9;
  --danger:#b3452e; --danger-soft:#f6e4de;
  --shadow:0 1px 2px rgba(23,33,27,.06);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0f1512; --card:#171f1b; --ink:#e7eee9; --muted:#90a098; --line:#26302a;
    --accent:#46b284; --accent-ink:#0c1410; --accent-soft:#1d3126;
    --ball:#f5d90a; --ball-ink:#241f00;
    --alt:#7aa5d8; --alt-soft:#1c2836;
    --warn:#d9a24a; --warn-soft:#33270f;
    --danger:#e07a5f; --danger-soft:#381d15;
    --shadow:none;
  }
}
:root[data-theme="light"]{
  --bg:#f1f4f0; --card:#ffffff; --ink:#17211b; --muted:#5e6d64; --line:#d7ded7;
  --accent:#176a4b; --accent-ink:#ffffff; --accent-soft:#e2efe6;
  --ball:#f5d90a; --ball-ink:#241f00;
  --alt:#34618f; --alt-soft:#e5ecf4;
  --warn:#a8730a; --warn-soft:#f6ecd9;
  --danger:#b3452e; --danger-soft:#f6e4de;
  --shadow:0 1px 2px rgba(23,33,27,.06);
}
:root[data-theme="dark"]{
  --bg:#0f1512; --card:#171f1b; --ink:#e7eee9; --muted:#90a098; --line:#26302a;
  --accent:#46b284; --accent-ink:#0c1410; --accent-soft:#1d3126;
  --ball:#f5d90a; --ball-ink:#241f00;
  --alt:#7aa5d8; --alt-soft:#1c2836;
  --warn:#d9a24a; --warn-soft:#33270f;
  --danger:#e07a5f; --danger-soft:#381d15;
  --shadow:none;
}

/* ---------- base ---------- */
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--ink);
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  font-size:15px; line-height:1.45;
  -webkit-font-smoothing:antialiased;
}
button{font:inherit; color:inherit; background:none; border:none; padding:0; cursor:pointer}
input,textarea,select{font:inherit; color:var(--ink)}
:focus-visible{outline:2px solid var(--accent); outline-offset:2px; border-radius:4px}
@media (prefers-reduced-motion: reduce){ *{transition:none !important; animation:none !important} }

.wrap{max-width:780px; margin:0 auto; padding:0 14px 80px}

/* ---------- header ---------- */
.topbar{position:sticky; top:0; z-index:30; background:var(--bg); border-bottom:1px solid var(--line)}
.masthead{max-width:780px; margin:0 auto; padding:14px 14px 0; display:flex; align-items:baseline; justify-content:space-between; gap:10px}
.wordmark{font-weight:900; font-size:19px; letter-spacing:.02em; text-transform:uppercase}
.wordmark .ball-dot{display:inline-block; width:10px; height:10px; border-radius:50%; background:var(--ball); margin-left:6px; vertical-align:baseline}
.stagechip{font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); white-space:nowrap}
.tabs{max-width:780px; margin:0 auto; padding:8px 14px 0; display:flex; gap:2px; overflow-x:auto}
.tab{padding:8px 12px 10px; font-weight:700; font-size:14px; color:var(--muted); border-bottom:3px solid transparent; white-space:nowrap; border-radius:6px 6px 0 0}
.tab[aria-current="true"]{color:var(--ink); border-bottom-color:var(--accent)}
.demo-banner{background:var(--warn-soft); color:var(--warn); font-size:12.5px; font-weight:600; text-align:center; padding:6px 12px}

/* ---------- shared bits ---------- */
.eventbar{display:flex; gap:8px; overflow-x:auto; padding:14px 0 4px}
.eventchip{padding:6px 12px; border-radius:999px; border:1px solid var(--line); background:var(--card); font-weight:700; font-size:13.5px; color:var(--muted); white-space:nowrap}
.eventchip[aria-current="true"]{background:var(--accent); border-color:var(--accent); color:var(--accent-ink)}
.section-h{display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin:20px 0 10px}
.section-h h2{margin:0; font-size:13px; font-weight:800; letter-spacing:.09em; text-transform:uppercase; color:var(--muted)}
.section-h .hint{font-size:12.5px; color:var(--muted)}
.microlabel{font-size:11px; font-weight:800; letter-spacing:.09em; text-transform:uppercase; color:var(--muted)}
.chip{display:inline-block; font-size:11px; font-weight:700; letter-spacing:.04em; padding:2px 7px; border-radius:5px; background:var(--accent-soft); color:var(--accent); white-space:nowrap}
.chip.alt{background:var(--alt-soft); color:var(--alt)}
.chip.warn{background:var(--warn-soft); color:var(--warn)}
.chip.plain{background:transparent; border:1px solid var(--line); color:var(--muted)}
.btn{display:inline-block; padding:9px 14px; border-radius:8px; font-weight:700; font-size:14px; background:var(--accent); color:var(--accent-ink); border:1px solid var(--accent)}
.btn.secondary{background:var(--card); color:var(--ink); border:1px solid var(--line)}
.btn.danger{background:var(--danger); border-color:var(--danger); color:#fff}
.btn.small{padding:5px 9px; font-size:12.5px; border-radius:6px}
.btn:disabled{opacity:.5; cursor:default}
.note{font-size:12.5px; color:var(--muted)}
.empty{padding:36px 16px; text-align:center; color:var(--muted); font-size:14px}
.err{color:var(--danger); font-size:13px; font-weight:600; margin-top:8px}

/* ---------- match cards ---------- */
.match{background:var(--card); border:1px solid var(--line); border-radius:10px; box-shadow:var(--shadow); padding:10px 12px; width:100%; text-align:left; display:block}
.match + .match{margin-top:8px}
.match .meta{display:flex; gap:6px; align-items:center; margin-bottom:6px; flex-wrap:wrap}
.match .row{display:flex; justify-content:space-between; align-items:baseline; gap:10px}
.match .row + .row{margin-top:2px}
.match .team{font-weight:600; min-width:0; overflow-wrap:anywhere}
.match .team.win{color:var(--accent); font-weight:800}
.match .score{font-weight:800; font-variant-numeric:tabular-nums; font-size:16px}
.match .cta{margin-top:6px; font-size:12.5px; font-weight:700; color:var(--accent)}
.match.upnow{border-left:6px solid var(--ball); padding-left:12px}
.upnow-tag{background:var(--ball); color:var(--ball-ink); font-size:10.5px; font-weight:900; letter-spacing:.08em; padding:2px 7px; border-radius:5px; text-transform:uppercase}
.queue-row{display:flex; align-items:center; gap:8px; padding:8px 4px; border-bottom:1px solid var(--line); font-size:14px}
.queue-row .qnames{flex:1; min-width:0; font-weight:600; overflow-wrap:anywhere}
.queue-row .qv{color:var(--muted); font-weight:400}
.queue-actions{display:flex; gap:6px}
.roundblock{margin-bottom:18px}

/* ---------- standings ---------- */
.group-card{background:var(--card); border:1px solid var(--line); border-radius:10px; box-shadow:var(--shadow); padding:12px 14px; margin-bottom:14px}
.group-card h3{margin:0 0 8px; font-size:15px; font-weight:800; display:flex; justify-content:space-between; align-items:baseline; gap:8px}
.standings{width:100%; border-collapse:collapse; font-variant-numeric:tabular-nums}
.standings th{font-size:10.5px; font-weight:800; letter-spacing:.07em; text-transform:uppercase; color:var(--muted); text-align:right; padding:4px 5px; border-bottom:1px solid var(--line)}
.standings th.tname{text-align:left}
.standings td{padding:6px 5px; text-align:right; font-size:13.5px; border-bottom:1px solid var(--line)}
.standings tr:last-child td{border-bottom:none}
.standings td.tname{text-align:left; font-weight:600; overflow-wrap:anywhere}
.standings tr.adv td{background:var(--accent-soft)}
.standings tr.adv td:first-child{border-radius:6px 0 0 6px}
.standings tr.adv td:last-child{border-radius:0 6px 6px 0}
.standings .pos{color:var(--muted); font-weight:700}

/* ---------- bracket ---------- */
.bracket-scroll{overflow-x:auto; padding-bottom:10px}
.bracket{display:flex; gap:14px; align-items:stretch; min-width:min-content}
.bcol{display:flex; flex-direction:column; justify-content:space-around; gap:10px; min-width:190px}
.bcol .microlabel{text-align:center; margin-bottom:2px}
.bmatch{background:var(--card); border:1px solid var(--line); border-radius:9px; padding:8px 10px; box-shadow:var(--shadow); text-align:left; width:100%}
.bmatch .brow{display:flex; justify-content:space-between; gap:8px; font-size:13.5px; padding:2px 0}
.bmatch .bteam{font-weight:600; min-width:0; overflow-wrap:anywhere}
.bmatch .bteam.tbd{color:var(--muted); font-weight:400}
.bmatch .bteam.win{color:var(--accent); font-weight:800}
.bmatch .bscore{font-weight:800; font-variant-numeric:tabular-nums}
.champ{background:var(--accent); color:var(--accent-ink); border-radius:10px; padding:14px 16px; text-align:center; font-weight:800; font-size:16px}
.champ .microlabel{color:var(--accent-ink); opacity:.75}

/* ---------- controls ---------- */
.controls{display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin:12px 0}
.search{flex:1; min-width:160px; padding:9px 12px; border-radius:8px; border:1px solid var(--line); background:var(--card)}
.gchips{display:flex; gap:6px; overflow-x:auto; padding-bottom:2px}
.gchip{padding:5px 10px; border-radius:999px; border:1px solid var(--line); background:var(--card); font-weight:700; font-size:12.5px; color:var(--muted); white-space:nowrap}
.gchip[aria-current="true"]{background:var(--ink); color:var(--bg); border-color:var(--ink)}

/* ---------- modal ---------- */
.overlay{position:fixed; inset:0; background:rgba(10,15,12,.55); z-index:50; display:flex; align-items:center; justify-content:center; padding:16px}
.modal{background:var(--card); border-radius:14px; width:100%; max-width:420px; padding:18px; max-height:90vh; overflow-y:auto}
.modal h3{margin:0 0 2px; font-size:16px; font-weight:800}
.modal .sub{color:var(--muted); font-size:12.5px; margin-bottom:14px}
.score-line{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:8px 0}
.score-line label{font-weight:600; flex:1; overflow-wrap:anywhere}
.score-in{width:74px; padding:10px; border-radius:8px; border:1px solid var(--line); background:var(--bg); font-size:20px; font-weight:800; text-align:center; font-variant-numeric:tabular-nums}
.modal .actions{display:flex; gap:8px; margin-top:14px; flex-wrap:wrap}
.modal .actions .spacer{flex:1}

/* ---------- admin ---------- */
.panel{background:var(--card); border:1px solid var(--line); border-radius:10px; box-shadow:var(--shadow); padding:14px; margin-bottom:14px}
.panel h3{margin:0 0 10px; font-size:14px; font-weight:800}
.field{margin-bottom:10px}
.field label{display:block; font-size:12px; font-weight:700; color:var(--muted); margin-bottom:4px}
.field input[type=text],.field input[type=password],.field input[type=number],.field textarea{
  width:100%; padding:9px 11px; border-radius:8px; border:1px solid var(--line); background:var(--bg)}
.field textarea{min-height:130px; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:13px}
.fieldrow{display:flex; gap:10px}
.fieldrow .field{flex:1}
.divider{border-top:1px solid var(--line); margin:14px 0}
.preview-box{background:var(--bg); border:1px solid var(--line); border-radius:8px; padding:10px 12px; font-size:13.5px; margin:10px 0; white-space:pre-line}

/* ---------- toast ---------- */
.toast{position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:var(--ink); color:var(--bg); padding:10px 16px; border-radius:10px; font-weight:700; font-size:14px; z-index:80; box-shadow:0 4px 14px rgba(0,0,0,.25); max-width:90vw; text-align:center}

/* ---------- print ---------- */
@media print{
  body{background:#fff; color:#000; font-size:12px}
  .topbar,.controls,.demo-banner,.match .cta,.btn,.queue-actions,.toast,.overlay{display:none !important}
  .wrap{max-width:100%; padding:0}
  .match,.group-card,.bmatch{box-shadow:none; border-color:#bbb; break-inside:avoid}
  .roundblock{break-inside:avoid}
  .print-title{display:block !important; font-size:18px; font-weight:900; margin:0 0 12px}
}
.print-title{display:none}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ================= CONFIG =================
   Leave both blank to run in demo mode with sample data.
   To go live: create a Supabase project, run supabase-schema.sql
   in the SQL editor, then paste your project URL and anon key here. */
const SUPABASE_URL = "";
const SUPABASE_ANON_KEY = "";
</script>

<script>
/*__LOGIC_START__*/
/* Pure tournament logic. No DOM access in this block, so it can be unit tested in node. */

function mulberry32(seed){
  return function(){
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function shuffled(arr, rand){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(rand() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
let __uidCounter = 0;
function uid(){
  if (typeof crypto !== "undefined" && crypto.randomUUID) return crypto.randomUUID();
  __uidCounter++;
  return "id-" + __uidCounter + "-" + Math.floor(Math.random() * 1e9);
}
function groupLetter(i){ return String.fromCharCode(65 + i); }

/* Split n entrants into groups near the target size.
   Returns an array of sizes, e.g. 50 with target 6 gives [7,7,6,6,6,6,6,6]. */
function groupSizes(n, target){
  target = Math.max(2, target || 6);
  const g = Math.max(1, Math.round(n / target));
  const base = Math.floor(n / g);
  const extra = n % g;
  const sizes = [];
  for(let i = 0; i < g; i++) sizes.push(base + (i < extra ? 1 : 0));
  return sizes;
}

/* names: array of strings. Returns [{name:'A', members:[...names]}] */
function makeGroups(names, target, rand){
  const pool = rand ? shuffled(names, rand) : names.slice();
  const sizes = groupSizes(pool.length, target);
  const groups = [];
  let idx = 0;
  sizes.forEach((s, i) => {
    groups.push({ name: groupLetter(i), members: pool.slice(idx, idx + s) });
    idx += s;
  });
  return groups;
}

/* Circle-method round robin. ids: array. Returns rounds, each an array of [a,b] pairs. */
function roundRobin(ids){
  const t = ids.slice();
  if (t.length % 2) t.push(null);
  const n = t.length;
  const rounds = [];
  for(let r = 0; r < n - 1; r++){
    const rd = [];
    for(let i = 0; i < n / 2; i++){
      const a = t[i], b = t[n - 1 - i];
      if (a != null && b != null) rd.push(r % 2 ? [b, a] : [a, b]);
    }
    rounds.push(rd);
    t.splice(1, 0, t.pop());
  }
  return rounds;
}

/* Build group-stage match rows for one event.
   groups: [{name, entrantIds}]. play_order interleaves groups round by round. */
function buildEventMatches(eventId, groups, startOrder){
  let ord = startOrder || 0;
  const perGroup = groups.map(g => ({ name: g.name, rounds: roundRobin(g.entrantIds) }));
  const maxR = Math.max(0, ...perGroup.map(g => g.rounds.length));
  const rows = [];
  for(let r = 0; r < maxR; r++){
    for(const g of perGroup){
      if (!g.rounds[r]) continue;
      for(const [a, b] of g.rounds[r]){
        ord += 10;
        rows.push({
          id: uid(), event_id: eventId, stage: "group", group_name: g.name,
          round: r + 1, bracket_round: null, bracket_pos: null,
          entrant1_id: a, entrant2_id: b, score1: null, score2: null,
          status: "scheduled", play_order: ord, postponed: false,
          next_match_id: null, next_slot: null
        });
      }
    }
  }
  return rows;
}

/* Merge per-event pending lists by alternating between events. */
function weaveQueues(lists){
  const out = [];
  const idx = lists.map(() => 0);
  let remaining = lists.reduce((s, l) => s + l.length, 0);
  while(remaining > 0){
    for(let e = 0; e < lists.length; e++){
      if (idx[e] < lists[e].length){
        out.push(lists[e][idx[e]]);
        idx[e]++;
        remaining--;
      }
    }
  }
  return out;
}

/* entrants: [{id,name}] for one group. matches: that group's matches.
   Sorted by wins, head to head (two-way ties), point diff, points for. */
function computeStandings(entrants, matches){
  const rows = entrants.map(e => ({ id: e.id, name: e.name, p: 0, w: 0, l: 0, pf: 0, pa: 0, diff: 0 }));
  const byId = {};
  rows.forEach(r => byId[r.id] = r);
  const played = matches.filter(m => m.status === "played" && m.score1 != null && m.score2 != null);
  for(const m of played){
    const a = byId[m.entrant1_id], b = byId[m.entrant2_id];
    if (!a || !b) continue;
    a.p++; b.p++;
    a.pf += m.score1; a.pa += m.score2;
    b.pf += m.score2; b.pa += m.score1;
    if (m.score1 > m.score2){ a.w++; b.l++; } else { b.w++; a.l++; }
  }
  rows.forEach(r => r.diff = r.pf - r.pa);
  rows.sort((x, y) => y.w - x.w || y.diff - x.diff || y.pf - x.pf || x.name.localeCompare(y.name));
  for(let i = 0; i < rows.length - 1; i++){
    const a = rows[i], b = rows[i + 1];
    const twoWay = a.w === b.w &&
      (i + 2 >= rows.length || rows[i + 2].w !== a.w) &&
      (i === 0 || rows[i - 1].w !== a.w);
    if (twoWay){
      const m = played.find(m =>
        (m.entrant1_id === a.id && m.entrant2_id === b.id) ||
        (m.entrant1_id === b.id && m.entrant2_id === a.id));
      if (m){
        const winner = m.score1 > m.score2 ? m.entrant1_id : m.entrant2_id;
        if (winner === b.id){ rows[i] = b; rows[i + 1] = a; }
      }
    }
  }
  return rows;
}

/* groupsStandings: [{group, rows}] for one event. Returns seed list for the bracket:
   all group winners first (best record first), then runners-up, and so on.
   Cross-group comparison uses win rate then average diff, since group sizes can differ. */
function rankQualifiers(groupsStandings, k){
  const seeds = [];
  for(let tier = 0; tier < k; tier++){
    const cands = [];
    for(const g of groupsStandings){
      const r = g.rows[tier];
      if (r) cands.push({ entrantId: r.id, group: g.group, name: r.name,
        winPct: r.p ? r.w / r.p : 0, avgDiff: r.p ? r.diff / r.p : 0, avgPf: r.p ? r.pf / r.p : 0 });
    }
    cands.sort((x, y) => y.winPct - x.winPct || y.avgDiff - x.avgDiff || y.avgPf - x.avgPf || x.name.localeCompare(y.name));
    seeds.push(...cands);
  }
  return seeds;
}

function nextPow2(n){ let p = 1; while(p < n) p *= 2; return p; }

/* Canonical bracket seed order, e.g. size 8 gives [1,8,4,5,2,7,3,6]. */
function bracketOrder(size){
  let r = [1, 2];
  while(r.length < size){
    const next = [];
    for(const s of r){ next.push(s); next.push(2 * r.length + 1 - s); }
    r = next;
  }
  return r;
}

function roundLabelFor(bracketRound, totalRounds){
  const teams = Math.pow(2, totalRounds - bracketRound + 1);
  if (teams === 2) return "Final";
  if (teams === 4) return "Semifinals";
  if (teams === 8) return "Quarterfinals";
  if (teams === 16) return "Round of 16";
  return "Round of " + teams;
}

/* seeds: [{entrantId, group}] in seed order. Builds all knockout rounds with
   linkage, avoids same-group matchups in round 1 where a swap can fix it,
   and resolves byes immediately. Returns match rows. */
function buildBracket(eventId, seeds, startOrder){
  const size = nextPow2(Math.max(2, seeds.length));
  const order = bracketOrder(size);
  const slot = n => seeds[n - 1] || null;
  const pairs = [];
  for(let i = 0; i < order.length; i += 2) pairs.push([slot(order[i]), slot(order[i + 1])]);

  const clash = p => p[0] && p[1] && p[0].group === p[1].group;
  for(let pass = 0; pass < 3; pass++){
    let fixed = true;
    for(const p of pairs){
      if (!clash(p)) continue;
      fixed = false;
      for(const q of pairs){
        if (q === p || !q[1]) continue;
        const t = p[1]; p[1] = q[1]; q[1] = t;
        if (!clash(p) && !clash(q)) break;
        q[1] = p[1]; p[1] = t;
      }
    }
    if (fixed) break;
  }

  const totalRounds = Math.log2(size);
  let ord = startOrder || 0;
  const rows = [];
  const roundMatches = [];
  for(let r = 1; r <= totalRounds; r++){
    const count = size / Math.pow(2, r);
    const list = [];
    for(let i = 0; i < count; i++){
      ord += 10;
      const row = {
        id: uid(), event_id: eventId, stage: "knockout", group_name: null,
        round: r, bracket_round: r, bracket_pos: i,
        entrant1_id: null, entrant2_id: null, score1: null, score2: null,
        status: "scheduled", play_order: ord, postponed: false,
        next_match_id: null, next_slot: null
      };
      list.push(row); rows.push(row);
    }
    roundMatches.push(list);
  }
  for(let r = 0; r < roundMatches.length - 1; r++){
    roundMatches[r].forEach((m, i) => {
      m.next_match_id = roundMatches[r + 1][Math.floor(i / 2)].id;
      m.next_slot = (i % 2) + 1;
    });
  }
  pairs.forEach((p, i) => {
    const m = roundMatches[0][i];
    m.entrant1_id = p[0] ? p[0].entrantId : null;
    m.entrant2_id = p[1] ? p[1].entrantId : null;
    if (m.entrant1_id && !m.entrant2_id){
      m.status = "played";
      const nm = rows.find(x => x.id === m.next_match_id);
      if (nm){ if (m.next_slot === 1) nm.entrant1_id = m.entrant1_id; else nm.entrant2_id = m.entrant1_id; }
    }
  });
  return rows;
}

/* Returns an error message, or null if the score is valid. */
function validateScore(s1, s2, pts, isAdmin){
  if (!Number.isInteger(s1) || !Number.isInteger(s2) || s1 < 0 || s2 < 0) return "Enter both scores as whole numbers.";
  if (s1 === s2) return "Scores can't be tied.";
  if (!isAdmin){
    if (Math.max(s1, s2) !== pts) return "The winner needs exactly " + pts + " points.";
    if (Math.min(s1, s2) >= pts) return "The losing score must be under " + pts + ".";
  }
  return null;
}

function estRounds(totalMatches, courts){ return Math.ceil(totalMatches / Math.max(1, courts)); }

/* ---------------- mock data ---------------- */
const MOCK_FIRSTS = ["Maya","Owen","Priya","Jonas","Aisha","Malik","Grace","Theo","Nia","Carlos",
"Ingrid","Sam","Wanjiru","Peter","Lena","Marcus","Amara","Felix","Rosa","Dmitri",

function buildMockData(){
  const rand = mulberry32(42);
  const tournament = { id: "t1", name: "Summer Pickleball Open", settings: { courts: 4 } };

  const evD = { id: "ev-doubles", tournament_id: "t1", name: "Men's Doubles", sort_order: 0, stage: "group",
    settings: { points_to_group: 21, points_to_knockout: 21, advance_per_group: 2, group_size: 6 } };
  const evS = { id: "ev-singles", tournament_id: "t1", name: "Men's Singles", sort_order: 1, stage: "group",
    settings: { points_to_group: 11, points_to_knockout: 15, advance_per_group: 2, group_size: 5 } };

  const firsts = shuffled(MOCK_FIRSTS, rand);
  const teamNames = [];
  for(let i = 0; i < 50; i++) teamNames.push(firsts[2 * i] + " & " + firsts[2 * i + 1]);

  const entrants = [];
  const skills = {};
  let en = 0;
  const mkEntrants = (ev, groups) => {
    const out = [];
    groups.forEach(g => {
      g.members.forEach((name, i) => {
        en++;
        const e = { id: "e" + en, event_id: ev.id, name: name, group_name: g.name, seed: i + 1 };
        skills[e.id] = 0.2 + rand() * 0.8;
        entrants.push(e); out.push(e);
      });
    });
    return out;
  };

  const groupsD = makeGroups(teamNames, evD.settings.group_size, rand);
  const groupsS = makeGroups(MOCK_SINGLES, evS.settings.group_size, rand);
  const entD = mkEntrants(evD, groupsD);
  const entS = mkEntrants(evS, groupsS);

  const idsByGroup = (ents, gname) => ents.filter(e => e.group_name === gname).map(e => e.id);
  const matchesD = buildEventMatches(evD.id, groupsD.map(g => ({ name: g.name, entrantIds: idsByGroup(entD, g.name) })), 0);
  const matchesS = buildEventMatches(evS.id, groupsS.map(g => ({ name: g.name, entrantIds: idsByGroup(entS, g.name) })), 0);

  const fracD = { A: 1, B: 1, C: 0.8, D: 0.6, E: 0.5, F: 0.35, G: 0.15, H: 0 };
  const fracS = { A: 1, B: 0.7, C: 0.5, D: 0.3 };
  const playOut = (rows, fracs, pts) => {
    for(const m of rows){
      const f = fracs[m.group_name] != null ? fracs[m.group_name] : 0.5;
      if (rand() >= f) continue;
      const s1 = skills[m.entrant1_id], s2 = skills[m.entrant2_id];
      const p1 = s1 / (s1 + s2);
      const oneWins = rand() < p1;
      const spread = Math.abs(s1 - s2);
      const loserPts = Math.max(2, Math.min(pts - 1, Math.round((pts - 2) * (1 - spread) * (0.55 + rand() * 0.5))));
      m.score1 = oneWins ? pts : loserPts;
      m.score2 = oneWins ? loserPts : pts;
      m.status = "played";
    }
  };
  playOut(matchesD, fracD, evD.settings.points_to_group);
  playOut(matchesS, fracS, evS.settings.points_to_group);

  const pendingC = matchesD.filter(m => m.group_name === "C" && m.status === "scheduled")
    .sort((a, b) => a.play_order - b.play_order);
  if (pendingC.length > 3){
    pendingC[0].postponed = true;
    pendingC[0].play_order = pendingC[3].play_order + 1;
  }

  return { tournament, events: [evD, evS], entrants, matches: matchesD.concat(matchesS) };
}
/*__LOGIC_END__*/
</script>

<script>
/* ================= STORES =================
   Both stores expose the same interface, so the UI never needs to know
   whether it is talking to sample data or to Supabase. */

function demoStore(){
  const db = buildMockData();
  const PIN = "2121";
  const subs = [];
  const notify = () => subs.forEach(f => { try{ f(); }catch(e){} });
  const ok = () => ({ ok: true });
  const fail = msg => ({ ok: false, error: msg });
  const findMatch = id => db.matches.find(m => m.id === id);
  const eventOf = m => db.events.find(e => e.id === m.event_id);
  const ptsFor = m => {
    const ev = eventOf(m);
    const key = m.stage === "knockout" ? "points_to_knockout" : "points_to_group";
    return (ev && ev.settings && ev.settings[key]) || 21;
  };
  const checkPin = pin => pin === PIN;

  function advanceWinner(m){
    if (!m.next_match_id || m.status !== "played") return;
    const w = m.score1 > m.score2 ? m.entrant1_id : m.entrant2_id;
    const nm = findMatch(m.next_match_id);
    if (nm && nm.status === "scheduled"){
      if (m.next_slot === 1) nm.entrant1_id = w; else nm.entrant2_id = w;
    }
  }

  return {
    mode: "demo",
    subscribe(f){ subs.push(f); },
    async loadAll(){
      return {
        tournament: JSON.parse(JSON.stringify(db.tournament)),
        events: JSON.parse(JSON.stringify(db.events)),
        entrants: JSON.parse(JSON.stringify(db.entrants)),
        matches: JSON.parse(JSON.stringify(db.matches))
      };
    },
    async verifyPin(pin){ return checkPin(pin) ? ok() : fail("Wrong PIN."); },
    async changePin(){ return fail("PIN changes only work on the live site."); },
    async submitScore(matchId, s1, s2){
      const m = findMatch(matchId);
      if (!m) return fail("Match not found.");
      if (m.status === "played") return fail("A score is already in. Ask the desk to change it.");
      if (!m.entrant1_id || !m.entrant2_id) return fail("Teams for this match aren't decided yet.");
      const err = validateScore(s1, s2, ptsFor(m), false);
      if (err) return fail(err);
      m.score1 = s1; m.score2 = s2; m.status = "played"; m.postponed = false;
      advanceWinner(m);
      notify(); return ok();
    },
    async adminSubmitScore(pin, matchId, s1, s2){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      const m = findMatch(matchId);
      if (!m) return fail("Match not found.");
      if (!m.entrant1_id || !m.entrant2_id) return fail("Teams for this match aren't decided yet.");
      const err = validateScore(s1, s2, ptsFor(m), true);
      if (err) return fail(err);
      if (m.next_match_id){
        const nm = findMatch(m.next_match_id);
        const oldW = m.status === "played" ? (m.score1 > m.score2 ? m.entrant1_id : m.entrant2_id) : null;
        const newW = s1 > s2 ? m.entrant1_id : m.entrant2_id;
        if (nm && nm.status === "played" && oldW !== newW)
          return fail("The next round already has a score. Clear it first.");
      }
      m.score1 = s1; m.score2 = s2; m.status = "played"; m.postponed = false;
      if (m.next_match_id){
        const nm = findMatch(m.next_match_id);
        const w = s1 > s2 ? m.entrant1_id : m.entrant2_id;
        if (nm && nm.status === "scheduled"){
          if (m.next_slot === 1) nm.entrant1_id = w; else nm.entrant2_id = w;
        }
      }
      notify(); return ok();
    },
    async adminClearScore(pin, matchId){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      const m = findMatch(matchId);
      if (!m) return fail("Match not found.");
      if (m.next_match_id){
        const nm = findMatch(m.next_match_id);
        if (nm && nm.status === "played") return fail("The next round already has a score. Clear it first.");
        if (nm){
          if (m.next_slot === 1) nm.entrant1_id = null; else nm.entrant2_id = null;
        }
      }
      m.score1 = null; m.score2 = null; m.status = "scheduled";
      notify(); return ok();
    },
    async adminPostpone(pin, matchId, toEnd){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      const m = findMatch(matchId);
      if (!m) return fail("Match not found.");
      if (m.status !== "scheduled") return fail("That match already has a score.");
      const pending = db.matches
        .filter(x => x.event_id === m.event_id && x.status === "scheduled" && x.id !== m.id)
        .sort((a, b) => a.play_order - b.play_order);
      if (toEnd || pending.length <= 8){
        m.play_order = (pending.length ? pending[pending.length - 1].play_order : m.play_order) + 10;
      } else {
        const after = pending.filter(x => x.play_order > m.play_order);
        const anchor = after[7] || after[after.length - 1];
        if (anchor) m.play_order = anchor.play_order + 1;
      }
      m.postponed = true;
      notify(); return ok();
    },
    async adminUpdateTournament(pin, name, settings){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      db.tournament.name = name; db.tournament.settings = settings;
      notify(); return ok();
    },
    async adminUpdateEvent(pin, eventId, name, settings){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      const ev = db.events.find(e => e.id === eventId);
      if (!ev) return fail("Event not found.");
      ev.name = name; ev.settings = settings;
      notify(); return ok();
    },
    async adminReplaceEvent(pin, eventId, meta, entrants, matches){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      let ev = eventId ? db.events.find(e => e.id === eventId) : null;
      if (!ev){
        ev = { id: uid(), tournament_id: db.tournament.id, name: meta.name, sort_order: db.events.length, stage: "group", settings: meta.settings };
        db.events.push(ev);
      } else {
        ev.name = meta.name; ev.settings = meta.settings; ev.stage = "group";
      }
      db.entrants = db.entrants.filter(e => e.event_id !== ev.id);
      db.matches = db.matches.filter(m => m.event_id !== ev.id);
      entrants.forEach(e => db.entrants.push(Object.assign({}, e, { event_id: ev.id })));
      matches.forEach(m => db.matches.push(Object.assign({}, m, { event_id: ev.id })));
      notify(); return { ok: true, eventId: ev.id };
    },
    async adminDeleteEvent(pin, eventId){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      db.events = db.events.filter(e => e.id !== eventId);
      db.entrants = db.entrants.filter(e => e.event_id !== eventId);
      db.matches = db.matches.filter(m => m.event_id !== eventId);
      notify(); return ok();
    },
    async adminGenerateBracket(pin, eventId, rows){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      const ev = db.events.find(e => e.id === eventId);
      if (!ev) return fail("Event not found.");
      db.matches = db.matches.filter(m => !(m.event_id === eventId && m.stage === "knockout"));
      rows.forEach(m => db.matches.push(Object.assign({}, m, { event_id: eventId })));
      ev.stage = "knockout";
      notify(); return ok();
    },
    async adminResetBracket(pin, eventId){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      const ev = db.events.find(e => e.id === eventId);
      if (!ev) return fail("Event not found.");
      db.matches = db.matches.filter(m => !(m.event_id === eventId && m.stage === "knockout"));
      ev.stage = "group";
      notify(); return ok();
    }
  };
}

function liveStore(){
  let client = null;
  const subs = [];
  const notify = () => subs.forEach(f => { try{ f(); }catch(e){} });
  let debounceT = null;
  const debouncedNotify = () => { clearTimeout(debounceT); debounceT = setTimeout(notify, 400); };

  function loadScript(src){
    return new Promise((res, rej) => {
      const s = document.createElement("script");
      s.src = src; s.onload = res; s.onerror = () => rej(new Error("Could not load " + src));
      document.head.appendChild(s);
    });
  }

  async function ensureClient(){
    if (client) return client;
    await loadScript("https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js");
    client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    client.channel("db-changes")
      .on("postgres_changes", { event: "*", schema: "public" }, debouncedNotify)
      .subscribe();
    setInterval(() => { if (document.visibilityState === "visible") notify(); }, 60000);
    document.addEventListener("visibilitychange", () => { if (document.visibilityState === "visible") notify(); });
    return client;
  }

  const rpc = async (fn, args) => {
    try{
      const c = await ensureClient();
      const { data, error } = await c.rpc(fn, args);
      if (error) return { ok: false, error: error.message };
      if (typeof data === "string" && data !== "OK" && !data.startsWith("OK")) return { ok: false, error: data };
      return { ok: true, data };
    }catch(e){ return { ok: false, error: e.message || "Network error." }; }
  };

  return {
    mode: "live",
    subscribe(f){ subs.push(f); },
    async loadAll(){
      const c = await ensureClient();
      const [t, ev, en, ma] = await Promise.all([
        c.from("tournaments").select("*").limit(1),
        c.from("events").select("*").order("sort_order"),
        c.from("entrants").select("*").order("group_name").order("seed"),
        c.from("matches").select("*").order("play_order")
      ]);
      const err = t.error || ev.error || en.error || ma.error;
      if (err) throw new Error(err.message);
      return { tournament: (t.data && t.data[0]) || null, events: ev.data || [], entrants: en.data || [], matches: ma.data || [] };
    },
    verifyPin: pin => rpc("verify_pin", { p_pin: pin }).then(r =>
      r.ok && r.data === true ? { ok: true } : { ok: false, error: r.error || "Wrong PIN." }),
    changePin: (oldPin, newPin) => rpc("change_admin_pin", { p_old: oldPin, p_new: newPin }),
    submitScore: (id, s1, s2) => rpc("submit_score", { p_match_id: id, p_score1: s1, p_score2: s2 }),
    adminSubmitScore: (pin, id, s1, s2) => rpc("admin_submit_score", { p_pin: pin, p_match_id: id, p_score1: s1, p_score2: s2 }),
    adminClearScore: (pin, id) => rpc("admin_clear_score", { p_pin: pin, p_match_id: id }),
    adminPostpone: (pin, id, toEnd) => rpc("admin_postpone", { p_pin: pin, p_match_id: id, p_to_end: !!toEnd }),
    adminUpdateTournament: (pin, name, settings) => rpc("admin_update_tournament", { p_pin: pin, p_name: name, p_settings: settings }),
    adminUpdateEvent: (pin, eventId, name, settings) => rpc("admin_update_event", { p_pin: pin, p_event_id: eventId, p_name: name, p_settings: settings }),
    adminReplaceEvent: async (pin, eventId, meta, entrants, matches) => {
      const r = await rpc("admin_replace_event", {
        p_pin: pin, p_event_id: eventId, p_name: meta.name,
        p_sort_order: meta.sort_order != null ? meta.sort_order : 0,
        p_settings: meta.settings, p_entrants: entrants, p_matches: matches
      });
      if (r.ok && typeof r.data === "string" && r.data.startsWith("OK:")) r.eventId = r.data.slice(3);
      return r;
    },
    adminDeleteEvent: (pin, eventId) => rpc("admin_delete_event", { p_pin: pin, p_event_id: eventId }),
    adminGenerateBracket: (pin, eventId, rows) => rpc("admin_generate_bracket", { p_pin: pin, p_event_id: eventId, p_matches: rows }),
    adminResetBracket: (pin, eventId) => rpc("admin_reset_bracket", { p_pin: pin, p_event_id: eventId })
  };
}
</script>

<script>
/* ================= UI ================= */
window.__APP_ERRORS = [];
window.addEventListener("error", e => window.__APP_ERRORS.push(String(e.message)));

const store = (SUPABASE_URL && SUPABASE_ANON_KEY) ? liveStore() : demoStore();
let data = { tournament: null, events: [], entrants: [], matches: [] };
const state = {
  view: "board", eventId: null, search: "", groupFilter: "all",
  adminPin: null, modalMatchId: null, setupPreview: null, adminEventId: null,
  loadError: null
};

function esc(s){
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}
function safeSession(key, val){
  try{
    if (val === undefined) return window.sessionStorage.getItem(key);
    if (val === null) window.sessionStorage.removeItem(key);
    else window.sessionStorage.setItem(key, val);
  }catch(e){ return null; }
}
function toast(msg){
  const t = document.createElement("div");
  t.className = "toast"; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = "0"; t.style.transition = "opacity .3s"; }, 1600);
  setTimeout(() => t.remove(), 2000);
}

/* ---------- data helpers ---------- */
const entrantById = id => data.entrants.find(e => e.id === id);
const entrantName = id => { const e = entrantById(id); return e ? e.name : null; };
const eventById = id => data.events.find(e => e.id === id);
const currentEvent = () => eventById(state.eventId) || data.events[0] || null;
const courtsCount = () => (data.tournament && data.tournament.settings && data.tournament.settings.courts) || 4;
const evSetting = (ev, key, dflt) => (ev && ev.settings && ev.settings[key] != null) ? ev.settings[key] : dflt;
const matchPts = m => {
  const ev = eventById(m.event_id);
  return evSetting(ev, m.stage === "knockout" ? "points_to_knockout" : "points_to_group", 21);
};
function groupsOfEvent(ev){
  if (!ev) return [];
  const names = [...new Set(data.entrants.filter(e => e.event_id === ev.id && e.group_name).map(e => e.group_name))];
  names.sort();
  return names;
}
function standingsFor(ev, gname){
  const ents = data.entrants.filter(e => e.event_id === ev.id && e.group_name === gname);
  const ms = data.matches.filter(m => m.event_id === ev.id && m.stage === "group" && m.group_name === gname);
  return computeStandings(ents, ms);
}
function pendingQueue(){
  const lists = data.events
    .slice().sort((a, b) => a.sort_order - b.sort_order)
    .map(ev => data.matches
      .filter(m => m.event_id === ev.id && m.status === "scheduled" && m.entrant1_id && m.entrant2_id)
      .sort((a, b) => a.play_order - b.play_order));
  return weaveQueues(lists);
}
function koLabel(m){
  const ko = data.matches.filter(x => x.event_id === m.event_id && x.stage === "knockout");
  const total = Math.max(0, ...ko.map(x => x.bracket_round || 0));
  return roundLabelFor(m.bracket_round, total);
}
function matchTag(m){
  return m.stage === "knockout" ? koLabel(m) : "Group " + m.group_name + " · R" + m.round;
}

/* ---------- rendering ---------- */
function render(){
  const app = document.getElementById("app");
  const restoreId = document.activeElement && document.activeElement.id;
  const restoreVal = restoreId && document.activeElement.value;

  if (state.loadError){
    app.innerHTML = '<div class="wrap"><div class="empty">Could not load tournament data.<br>' + esc(state.loadError) + '<br><br><button class="btn secondary" onclick="location.reload()">Retry</button></div></div>';
    return;
  }
  if (!data.tournament){
    app.innerHTML = '<div class="wrap"><div class="empty">Loading…</div></div>';
    return;
  }

  const tabs = [
    ["board", "Up next"], ["schedule", "Schedule"], ["standings", "Standings"],
    ["bracket", "Bracket"], ["admin", "Admin"]
  ];

  html += '<nav class="tabs">' + tabs.map(([id, label]) =>
    '<button class="tab" aria-current="' + (state.view === id) + '" onclick="setView(\'' + id + '\')">' + label + '</button>'
  ).join("") + '</nav></div>';

  html += '<main class="wrap">';
  const needsEventBar = ["schedule", "standings", "bracket"].includes(state.view) && data.events.length > 1;
  if (needsEventBar){
    const cur = currentEvent();
    html += '<div class="eventbar">' + data.events.slice().sort((a, b) => a.sort_order - b.sort_order).map(ev =>
      '<button class="eventchip" aria-current="' + (cur && ev.id === cur.id) + '" onclick="setEvent(\'' + ev.id + '\')">' + esc(ev.name) + '</button>'
    ).join("") + '</div>';
  }

  if (state.view === "board") html += renderBoard();
  else if (state.view === "schedule") html += renderSchedule();
  else if (state.view === "standings") html += renderStandings();
  else if (state.view === "bracket") html += renderBracket();
  else if (state.view === "admin") html += renderAdmin();
  html += '</main>';

  html += renderModal();
  app.innerHTML = html;

  if (restoreId){
    const el = document.getElementById(restoreId);
    if (el && el.tagName === "INPUT" && el.type === "text"){
      el.focus();
      if (restoreVal != null){ el.value = restoreVal; try{ el.setSelectionRange(restoreVal.length, restoreVal.length); }catch(e){} }
    }
  }
}

function matchCard(m, opts){
  opts = opts || {};
  const n1 = entrantName(m.entrant1_id), n2 = entrantName(m.entrant2_id);
  const played = m.status === "played" && m.score1 != null;
  const bye = m.stage === "knockout" && m.status === "played" && m.score1 == null;
  const clickable = !bye && m.entrant1_id && m.entrant2_id;
  const w1 = played && m.score1 > m.score2, w2 = played && m.score2 > m.score1;
  let h = '<' + (clickable ? 'button' : 'div') + ' class="match' + (opts.upnow ? ' upnow' : '') + '"' +
    (clickable ? ' onclick="openMatch(\'' + m.id + '\')"' : '') + '>';
  h += '<div class="meta">';
  if (opts.upnow) h += '<span class="upnow-tag">Up now</span>';
  if (opts.showEvent){ const ev = eventById(m.event_id); if (ev) h += '<span class="chip alt">' + esc(ev.name) + '</span>'; }
  h += '<span class="chip">' + esc(matchTag(m)) + '</span>';
  if (m.postponed && m.status === "scheduled") h += '<span class="chip warn">Postponed</span>';
  h += '</div>';
  h += '<div class="row"><span class="team' + (w1 ? ' win' : '') + '">' + esc(n1 || "TBD") + '</span>' +
    (played ? '<span class="score">' + m.score1 + '</span>' : '') + '</div>';
  h += '<div class="row"><span class="team' + (w2 ? ' win' : '') + '">' + esc(n2 || (bye ? "BYE" : "TBD")) + '</span>' +
    (played ? '<span class="score">' + m.score2 + '</span>' : '') + '</div>';
  if (!played && clickable && !opts.upnow) h += '<div class="cta">Tap to enter score</div>';
  if (!played && clickable && opts.upnow) h += '<div class="cta">Tap to enter score when done</div>';
  h += clickable ? '</button>' : '</div>';
  return h;
}

function renderBoard(){
  const q = pendingQueue();
  const courts = courtsCount();
  let h = '<span class="print-title">' + esc(data.tournament.name) + ' · Up next</span>';
  h += '<div class="section-h"><h2>On court</h2><span class="hint">Next ' + courts + ' in line, all events mixed</span></div>';
  if (!q.length){
    h += '<div class="empty">No matches are waiting for a court.<br>Enter scores, or generate a knockout bracket from the Admin tab.</div>';
    return h;
  }
  h += q.slice(0, courts).map(m => matchCard(m, { upnow: true, showEvent: data.events.length > 1 })).join("");
  const rest = q.slice(courts, courts + 14);
  if (rest.length){
    h += '<div class="section-h"><h2>Coming up</h2><span class="hint">In queue order · no-shows get postponed by the desk</span></div>';
    h += rest.map((m, i) => {
      const ev = eventById(m.event_id);
      let row = '<div class="queue-row"><span class="microlabel">' + (courts + i + 1) + '</span>';
      if (data.events.length > 1 && ev) row += '<span class="chip alt">' + esc(ev.name) + '</span>';
      row += '<span class="chip plain">' + esc(matchTag(m)) + '</span>';
      row += '<span class="qnames">' + esc(entrantName(m.entrant1_id)) + ' <span class="qv">vs</span> ' + esc(entrantName(m.entrant2_id)) + '</span>';
      if (m.postponed) row += '<span class="chip warn">Postponed</span>';
      if (state.adminPin) row += '<span class="queue-actions"><button class="btn small secondary" onclick="postpone(\'' + m.id + '\', false)">Postpone</button><button class="btn small secondary" onclick="postpone(\'' + m.id + '\', true)">To end</button></span>';
      row += '</div>';
      return row;
    }).join("");
  }
  const totalPending = q.length;
  h += '<p class="note" style="margin-top:12px">' + totalPending + ' match' + (totalPending === 1 ? '' : 'es') + ' waiting across all events. Roughly ' + estRounds(totalPending, courts) + ' court rotations to go.</p>';
  return h;
}

function renderSchedule(){
  const ev = currentEvent();
  if (!ev) return '<div class="empty">No events yet. Set one up in the Admin tab.</div>';
  const evMatches = data.matches.filter(m => m.event_id === ev.id);
  const groupMs = evMatches.filter(m => m.stage === "group");
  const koMs = evMatches.filter(m => m.stage === "knockout");
  const playedCount = groupMs.filter(m => m.status === "played").length;
  const groups = groupsOfEvent(ev);

  let h = '<span class="print-title">' + esc(data.tournament.name) + ' · ' + esc(ev.name) + ' · Schedule</span>';
  h += '<div class="controls no-print">' +
    '<input class="search" id="search-input" type="text" placeholder="Find a team or player" value="' + esc(state.search) + '" oninput="setSearch(this.value)">' +
    '<button class="btn small secondary" onclick="window.print()">Print</button></div>';
  h += '<div class="gchips">' +
    '<button class="gchip" aria-current="' + (state.groupFilter === "all") + '" onclick="setGroupFilter(\'all\')">All</button>' +
    groups.map(g => '<button class="gchip" aria-current="' + (state.groupFilter === g) + '" onclick="setGroupFilter(\'' + g + '\')">Group ' + g + '</button>').join("") +
    (koMs.length ? '<button class="gchip" aria-current="' + (state.groupFilter === "ko") + '" onclick="setGroupFilter(\'ko\')">Knockout</button>' : '') +
    '</div>';
  h += '<p class="note" style="margin:10px 0 0">' + playedCount + ' of ' + groupMs.length + ' group matches played' + (koMs.length ? ' · knockout underway' : '') + '</p>';

  const term = state.search.trim().toLowerCase();
  const matchesTerm = m => {
    if (!term) return true;
    const n1 = entrantName(m.entrant1_id) || "", n2 = entrantName(m.entrant2_id) || "";
    return n1.toLowerCase().includes(term) || n2.toLowerCase().includes(term);
  };

  if (state.groupFilter === "ko"){
    const total = Math.max(0, ...koMs.map(x => x.bracket_round || 0));
    for(let r = 1; r <= total; r++){
      const list = koMs.filter(m => m.bracket_round === r && matchesTerm(m)).sort((a, b) => a.bracket_pos - b.bracket_pos);
      if (!list.length) continue;
      h += '<div class="roundblock"><div class="section-h"><h2>' + roundLabelFor(r, total) + '</h2></div>' + list.map(m => matchCard(m)).join("") + '</div>';
    }
    return h;
  }

  const shown = groupMs.filter(m => (state.groupFilter === "all" || m.group_name === state.groupFilter) && matchesTerm(m));
  if (!shown.length) return h + '<div class="empty">No matches found.</div>';
  const maxRound = Math.max(...shown.map(m => m.round));
  for(let r = 1; r <= maxRound; r++){
    const list = shown.filter(m => m.round === r).sort((a, b) => a.play_order - b.play_order);
    if (!list.length) continue;
    h += '<div class="roundblock"><div class="section-h"><h2>Round ' + r + '</h2></div>' + list.map(m => matchCard(m)).join("") + '</div>';
  }
  return h;
}

function renderStandings(){
  const ev = currentEvent();
  if (!ev) return '<div class="empty">No events yet. Set one up in the Admin tab.</div>';
  const groups = groupsOfEvent(ev);
  if (!groups.length) return '<div class="empty">No groups yet for this event.</div>';
  const adv = evSetting(ev, "advance_per_group", 2);
  let h = '<span class="print-title">' + esc(data.tournament.name) + ' · ' + esc(ev.name) + ' · Standings</span>';
  h += '<div class="section-h"><h2>' + esc(ev.name) + '</h2><span class="hint">Top ' + adv + ' per group advance</span></div>';
  for(const g of groups){
    const rows = standingsFor(ev, g);
    const left = data.matches.filter(m => m.event_id === ev.id && m.stage === "group" && m.group_name === g && m.status === "scheduled").length;
    h += '<div class="group-card"><h3><span>Group ' + g + '</span>' + (left ? '<span class="chip plain">' + left + ' left</span>' : '<span class="chip">Complete</span>') + '</h3>';
    h += '<table class="standings"><thead><tr><th></th><th class="tname">Team</th><th>P</th><th>W</th><th>L</th><th>PF</th><th>PA</th><th>+/-</th></tr></thead><tbody>';
    rows.forEach((r, i) => {
      h += '<tr class="' + (i < adv ? 'adv' : '') + '"><td class="pos">' + (i + 1) + '</td><td class="tname">' + esc(r.name) + '</td>' +
        '<td>' + r.p + '</td><td>' + r.w + '</td><td>' + r.l + '</td><td>' + r.pf + '</td><td>' + r.pa + '</td><td>' + (r.diff > 0 ? '+' : '') + r.diff + '</td></tr>';
    });
    h += '</tbody></table></div>';
  }
  h += '<p class="note">Tiebreakers: wins, then head to head, then point difference, then points scored.</p>';
  return h;
}

function renderBracket(){
  const ev = currentEvent();
  if (!ev) return '<div class="empty">No events yet.</div>';
  const ko = data.matches.filter(m => m.event_id === ev.id && m.stage === "knockout");
  if (!ko.length){
    return '<div class="empty">The knockout bracket for ' + esc(ev.name) + ' hasn\'t been generated yet.<br>It appears here once group play wraps up' + (state.adminPin ? ': generate it from the Admin tab.' : '.') + '</div>';
  }
  const total = Math.max(...ko.map(m => m.bracket_round));
  let h = '<span class="print-title">' + esc(data.tournament.name) + ' · ' + esc(ev.name) + ' · Bracket</span>';
  h += '<div class="bracket-scroll"><div class="bracket">';
  for(let r = 1; r <= total; r++){
    const list = ko.filter(m => m.bracket_round === r).sort((a, b) => a.bracket_pos - b.bracket_pos);
    h += '<div class="bcol"><div><span class="microlabel">' + roundLabelFor(r, total) + '</span></div>';
    h += list.map(m => {
      const n1 = entrantName(m.entrant1_id), n2 = entrantName(m.entrant2_id);
      const played = m.status === "played" && m.score1 != null;
      const bye = m.status === "played" && m.score1 == null;
      const w1 = played && m.score1 > m.score2, w2 = played && m.score2 > m.score1;
      const clickable = !bye && m.entrant1_id && m.entrant2_id;
      let c = '<' + (clickable ? 'button' : 'div') + ' class="bmatch"' + (clickable ? ' onclick="openMatch(\'' + m.id + '\')"' : '') + '>';
      c += '<div class="brow"><span class="bteam' + (n1 ? (w1 ? ' win' : '') : ' tbd') + '">' + esc(n1 || "TBD") + '</span>' + (played ? '<span class="bscore">' + m.score1 + '</span>' : '') + '</div>';
      c += '<div class="brow"><span class="bteam' + (n2 ? (w2 ? ' win' : '') : ' tbd') + '">' + esc(n2 || (bye ? "BYE" : "TBD")) + '</span>' + (played ? '<span class="bscore">' + m.score2 + '</span>' : '') + '</div>';
      c += clickable ? '</button>' : '</div>';
      return c;
    }).join("");
    h += '</div>';
  }
  const final = ko.find(m => m.bracket_round === total);
  h += '<div class="bcol"><div><span class="microlabel">Champion</span></div>';
  if (final && final.status === "played" && final.score1 != null){
    const champ = final.score1 > final.score2 ? final.entrant1_id : final.entrant2_id;
    h += '<div class="champ"><span class="microlabel">' + esc(ev.name) + '</span><br>🏆 ' + esc(entrantName(champ)) + '</div>';
  } else {
    h += '<div class="bmatch"><div class="brow"><span class="bteam tbd">To be decided</span></div></div>';
  }
  h += '</div></div></div>';
  return h;
}

/* ---------- modal ---------- */
function renderModal(){
  if (!state.modalMatchId) return "";
  const m = data.matches.find(x => x.id === state.modalMatchId);
  if (!m) return "";
  const n1 = entrantName(m.entrant1_id) || "TBD", n2 = entrantName(m.entrant2_id) || "TBD";
  const played = m.status === "played" && m.score1 != null;
  const isAdmin = !!state.adminPin;
  const pts = matchPts(m);
  const ev = eventById(m.event_id);

  let h = '<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal" role="dialog" aria-modal="true">';
  h += '<h3>' + (played ? 'Match result' : 'Enter score') + '</h3>';
  h += '<div class="sub">' + esc(ev ? ev.name : '') + ' · ' + esc(matchTag(m)) + ' · first to ' + pts + '</div>';

  if (played && !isAdmin){
    h += '<div class="score-line"><label>' + esc(n1) + '</label><span class="score" style="font-size:22px;font-weight:800">' + m.score1 + '</span></div>';
    h += '<div class="score-line"><label>' + esc(n2) + '</label><span class="score" style="font-size:22px;font-weight:800">' + m.score2 + '</span></div>';
    h += '<p class="note">Score already recorded. Spot a mistake? Ask at the desk and an organizer can fix it.</p>';
    h += '<div class="actions"><span class="spacer"></span><button class="btn secondary" onclick="closeModal()">Close</button></div>';
  } else {
    h += '<div class="score-line"><label for="score1">' + esc(n1) + '</label><input class="score-in" id="score1" type="number" inputmode="numeric" min="0" value="' + (played ? m.score1 : '') + '"></div>';
    h += '<div class="score-line"><label for="score2">' + esc(n2) + '</label><input class="score-in" id="score2" type="number" inputmode="numeric" min="0" value="' + (played ? m.score2 : '') + '"></div>';
    h += '<div class="err" id="score-err"></div>';
    if (!isAdmin) h += '<p class="note">Winners report the score. One entry per match: after that, corrections go through the desk.</p>';
    h += '<div class="actions">';
    if (isAdmin && m.status === "scheduled"){
      h += '<button class="btn small secondary" onclick="postpone(\'' + m.id + '\', false, true)">Postpone</button>' +
        '<button class="btn small secondary" onclick="postpone(\'' + m.id + '\', true, true)">To end</button>';
    }
    if (isAdmin && played) h += '<button class="btn small danger" onclick="clearScore(\'' + m.id + '\')">Clear score</button>';
    h += '<span class="spacer"></span><button class="btn secondary" onclick="closeModal()">Cancel</button>' +
      '<button class="btn" onclick="saveScore(\'' + m.id + '\')">' + (isAdmin ? 'Save (admin)' : 'Save score') + '</button></div>';
  }
  h += '</div></div>';
  return h;
}

/* ---------- actions ---------- */
function setView(v){ state.view = v; state.setupPreview = null; render(); }
function setEvent(id){ state.eventId = id; state.groupFilter = "all"; render(); }
function setAdminEvent(id){ state.adminEventId = id; state.setupPreview = null; render(); }
function setGroupFilter(g){ state.groupFilter = g; render(); }
let searchT = null;
function setSearch(v){ state.search = v; clearTimeout(searchT); searchT = setTimeout(render, 150); }
function openMatch(id){ state.modalMatchId = id; render(); }
function closeModal(){ state.modalMatchId = null; render(); }
document.addEventListener("keydown", e => { if (e.key === "Escape" && state.modalMatchId) closeModal(); });

async function reload(){
  try{
    data = await store.loadAll();
    state.loadError = null;
    if (!state.eventId && data.events.length) state.eventId = data.events[0].id;
    if (state.eventId && !eventById(state.eventId)) state.eventId = data.events.length ? data.events[0].id : null;
    if (state.adminEventId && !eventById(state.adminEventId)) state.adminEventId = data.events.length ? data.events[0].id : null;
  }catch(e){
    state.loadError = e.message || String(e);
  }
  render();
}

async function saveScore(matchId){
  const s1 = parseInt(document.getElementById("score1").value, 10);
  const s2 = parseInt(document.getElementById("score2").value, 10);
  const errEl = document.getElementById("score-err");
  const r = state.adminPin
    ? await store.adminSubmitScore(state.adminPin, matchId, s1, s2)
    : await store.submitScore(matchId, s1, s2);
  if (!r.ok){ errEl.textContent = r.error || "Something went wrong."; return; }
  state.modalMatchId = null;
  toast("Score saved");
  await reload();
}
async function clearScore(matchId){
  if (!confirm("Clear this score? The match goes back into the queue.")) return;
  const r = await store.adminClearScore(state.adminPin, matchId);
  if (!r.ok){ const errEl = document.getElementById("score-err"); if (errEl) errEl.textContent = r.error; else toast(r.error); return; }
  state.modalMatchId = null;
  toast("Score cleared");
  await reload();
}
async function postpone(matchId, toEnd, fromModal){
  const r = await store.adminPostpone(state.adminPin, matchId, toEnd);
  if (!r.ok){ toast(r.error || "Could not postpone."); return; }
  if (fromModal) state.modalMatchId = null;
  toast(toEnd ? "Moved to the end of the queue" : "Postponed a few spots");
  await reload();
}

async function tryUnlock(){
  const pin = document.getElementById("pin-input").value.trim();
  const r = await store.verifyPin(pin);
  const errEl = document.getElementById("pin-err");
  if (!r.ok){ errEl.textContent = r.error || "Wrong PIN."; return; }
  state.adminPin = pin;
  safeSession("pb_admin_pin", pin);
  toast("Admin unlocked");
  render();
}
function adminSignOut(){ state.adminPin = null; safeSession("pb_admin_pin", null); render(); }

async function saveTournament(){
  const name = document.getElementById("adm-tname").value.trim() || "Pickleball Tournament";
  const courts = Math.max(1, parseInt(document.getElementById("adm-courts").value, 10) || 4);
  const settings = Object.assign({}, data.tournament.settings, { courts });
  const r = await store.adminUpdateTournament(state.adminPin, name, settings);
  if (!r.ok){ toast(r.error); return; }
  toast("Saved"); await reload();
}
function readEventForm(ev){
  return {
    name: document.getElementById("adm-ename").value.trim() || ev.name,
    settings: Object.assign({}, ev.settings, {
      points_to_group: Math.max(1, parseInt(document.getElementById("adm-ptg").value, 10) || 21),
      points_to_knockout: Math.max(1, parseInt(document.getElementById("adm-ptk").value, 10) || 21),
      advance_per_group: Math.max(1, parseInt(document.getElementById("adm-adv").value, 10) || 2),
      group_size: Math.max(3, parseInt(document.getElementById("adm-gsize") ? document.getElementById("adm-gsize").value : 6, 10) || 6)
    })
  };
}
async function saveEvent(){
  const ev = eventById(state.adminEventId);
  if (!ev) return;
  const f = readEventForm(ev);
  const r = await store.adminUpdateEvent(state.adminPin, ev.id, f.name, f.settings);
  if (!r.ok){ toast(r.error); return; }
  toast("Event saved"); await reload();
}
async function deleteEvent(){
  const ev = eventById(state.adminEventId);
  if (!ev) return;
  if (!confirm('Delete "' + ev.name + '" and all its matches and scores? This cannot be undone.')) return;
  const r = await store.adminDeleteEvent(state.adminPin, ev.id);
  if (!r.ok){ toast(r.error); return; }
  state.adminEventId = null;
  toast("Event deleted"); await reload();
}
async function addEvent(){
  const name = prompt("Name for the new event (e.g. Mixed Doubles):");
  if (!name || !name.trim()) return;
  const meta = { name: name.trim(), sort_order: data.events.length,
    settings: { points_to_group: 21, points_to_knockout: 21, advance_per_group: 2, group_size: 6 } };
  const r = await store.adminReplaceEvent(state.adminPin, null, meta, [], []);
  if (!r.ok){ toast(r.error); return; }
  if (r.eventId) state.adminEventId = r.eventId;
  toast("Event created. Now build its groups.");
  await reload();
}
function parseTeamsInput(){
  return document.getElementById("adm-teams").value
    .split("\n").map(s => s.trim()).filter(Boolean);
}
function setupSummary(names, target, courts, adv){
  const sizes = groupSizes(names.length, target);
  const groups = sizes.length;
  const matchCount = sizes.reduce((s, n) => s + n * (n - 1) / 2, 0);
  const quals = groups * adv;
  const bsize = nextPow2(Math.max(2, quals));
  return names.length + " entrants into " + groups + " groups (" + sizes.join(", ") + ")\n" +
    matchCount + " group matches, about " + estRounds(matchCount, courts) + " court rotations on " + courts + " courts\n" +
    quals + " qualify for a " + bsize + "-slot knockout" + (bsize > quals ? " (" + (bsize - quals) + " byes)" : "");
}
function previewSetup(){
  const ev = eventById(state.adminEventId);
  if (!ev) return;
  const names = parseTeamsInput();
  if (names.length < 4){ state.setupPreview = "Paste at least 4 entrants first."; render(); return; }
  const f = readEventForm(ev);
  state.setupPreview = setupSummary(names, f.settings.group_size, courtsCount(), f.settings.advance_per_group);
  render();
}
async function applySetup(){
  const ev = eventById(state.adminEventId);
  if (!ev) return;
  const names = parseTeamsInput();
  if (names.length < 4){ state.setupPreview = "Paste at least 4 entrants first."; render(); return; }
  const dupes = names.filter((n, i) => names.indexOf(n) !== i);
  if (dupes.length){ state.setupPreview = "Duplicate entries: " + [...new Set(dupes)].join(", "); render(); return; }
  const f = readEventForm(ev);
  if (!confirm('Rebuild "' + f.name + '" with ' + names.length + ' entrants? This wipes existing groups, matches, and scores for this event.')) return;
  const shuffle = document.getElementById("adm-shuffle").checked;
  const rand = shuffle ? mulberry32(Math.floor(performance.now() * 1000) % 2147483647 + 1) : null;
  const groups = makeGroups(names, f.settings.group_size, rand);
  const entrants = [];
  groups.forEach(g => g.members.forEach((name, i) =>
    entrants.push({ id: uid(), event_id: ev.id, name, group_name: g.name, seed: i + 1 })));
  const idsByGroup = g => entrants.filter(e => e.group_name === g).map(e => e.id);
  const matches = buildEventMatches(ev.id, groups.map(g => ({ name: g.name, entrantIds: idsByGroup(g.name) })), 0);
  const r = await store.adminReplaceEvent(state.adminPin, ev.id, { name: f.name, sort_order: ev.sort_order, settings: f.settings }, entrants, matches);
  if (!r.ok){ toast(r.error); return; }
  state.setupPreview = null;
  toast("Groups and schedule built");
  await reload();
}
async function generateBracket(){
  const ev = eventById(state.adminEventId);
  if (!ev) return;
  const groups = groupsOfEvent(ev);
  if (!groups.length){ toast("This event has no groups yet."); return; }
  const left = data.matches.filter(m => m.event_id === ev.id && m.stage === "group" && m.status === "scheduled").length;
  const msg = (left ? left + " group matches are still unplayed. " : "") +
    "Generate the knockout bracket from current standings?";
  if (!confirm(msg)) return;
  const adv = evSetting(ev, "advance_per_group", 2);
  const gs = groups.map(g => ({ group: g, rows: standingsFor(ev, g) }));
  const seeds = rankQualifiers(gs, adv);
  if (seeds.length < 2){ toast("Not enough qualifiers yet."); return; }
  const maxOrder = Math.max(0, ...data.matches.filter(m => m.event_id === ev.id).map(m => m.play_order || 0));
  const rows = buildBracket(ev.id, seeds, maxOrder);
  const r = await store.adminGenerateBracket(state.adminPin, ev.id, rows);
  if (!r.ok){ toast(r.error); return; }
  toast("Bracket generated");
  state.view = "bracket"; state.eventId = ev.id;
  await reload();
}
async function resetBracket(){
  const ev = eventById(state.adminEventId);
  if (!ev) return;
  if (!confirm("Remove the knockout bracket and its scores for this event?")) return;
  const r = await store.adminResetBracket(state.adminPin, ev.id);
  if (!r.ok){ toast(r.error); return; }
  toast("Bracket removed");
  await reload();
}
async function doChangePin(){
  const oldPin = document.getElementById("adm-oldpin").value.trim();
  const newPin = document.getElementById("adm-newpin").value.trim();
  if (newPin.length < 4){ toast("New PIN needs at least 4 characters."); return; }
  const r = await store.changePin(oldPin, newPin);
  if (!r.ok){ toast(r.error); return; }
  state.adminPin = newPin;
  safeSession("pb_admin_pin", newPin);
  toast("PIN changed");
}

/* ---------- init ---------- */
(async function init(){
  const savedPin = safeSession("pb_admin_pin");
  if (savedPin){
    const r = await store.verifyPin(savedPin).catch(() => ({ ok: false }));
    if (r.ok) state.adminPin = savedPin; else safeSession("pb_admin_pin", null);
  }
  store.subscribe(reload);
  await reload();
  window.__APP_READY = true;
})();
</script>
