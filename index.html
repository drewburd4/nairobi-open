<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#f7f5f0">
<title>Nairobi Open</title>
<style>
/* ---------- tokens ---------- */
:root{
  --bg:#f7f5f0; --card:#fffefb; --ink:#26251f; --muted:#6f6a5e; --line:#e2ddd1;
  --accent:#9a4526; --accent-ink:#ffffff; --accent-soft:#f4e7e0;
  --good:#46704f; --good-soft:#e9efe7;
  --warn:#a8730a; --warn-soft:#f6ecd9;
  --danger:#a33d2a; --danger-soft:#f6e4de;
  --bkline:#cfc8b8;
  --court:#2f6f6e; --court-soft:#e7f0ef; --ball:#c99a1f;
  --court-ink:#ffffff; --callout-chip:rgba(255,255,255,.18); --callout-chip-line:rgba(255,255,255,.4);
  --shadow:0 1px 2px rgba(38,37,31,.05);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#171511; --card:#201d18; --ink:#ece8df; --muted:#a39b8b; --line:#353026;
    --accent:#d07a55; --accent-ink:#1c130d; --accent-soft:#3a2a20;
    --good:#8db394; --good-soft:#26302a;
    --warn:#d9a24a; --warn-soft:#33270f;
    --danger:#df8268; --danger-soft:#381d15;
    --bkline:#575040;
    --court:#6cb8b2; --court-soft:#1b2b29; --ball:#e0b84a;
    --court-ink:#10201e; --callout-chip:rgba(0,0,0,.14); --callout-chip-line:rgba(0,0,0,.3);
    --shadow:none;
  }
}
:root[data-theme="light"]{
  --bg:#f7f5f0; --card:#fffefb; --ink:#26251f; --muted:#6f6a5e; --line:#e2ddd1;
  --accent:#9a4526; --accent-ink:#ffffff; --accent-soft:#f4e7e0;
  --good:#46704f; --good-soft:#e9efe7;
  --warn:#a8730a; --warn-soft:#f6ecd9;
  --danger:#a33d2a; --danger-soft:#f6e4de;
  --bkline:#cfc8b8;
  --court:#2f6f6e; --court-soft:#e7f0ef; --ball:#c99a1f;
  --court-ink:#ffffff; --callout-chip:rgba(255,255,255,.18); --callout-chip-line:rgba(255,255,255,.4);
  --shadow:0 1px 2px rgba(38,37,31,.05);
}
:root[data-theme="dark"]{
  --bg:#171511; --card:#201d18; --ink:#ece8df; --muted:#a39b8b; --line:#353026;
  --accent:#d07a55; --accent-ink:#1c130d; --accent-soft:#3a2a20;
  --good:#8db394; --good-soft:#26302a;
  --warn:#d9a24a; --warn-soft:#33270f;
  --danger:#df8268; --danger-soft:#381d15;
  --bkline:#575040;
  --court:#6cb8b2; --court-soft:#1b2b29; --ball:#e0b84a;
  --court-ink:#10201e; --callout-chip:rgba(0,0,0,.14); --callout-chip-line:rgba(0,0,0,.3);
  --shadow:none;
}

/* ---------- base ---------- */
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg); color:var(--ink);
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  font-size:15px; line-height:1.45; -webkit-font-smoothing:antialiased}
button{font:inherit; color:inherit; background:none; border:none; padding:0; cursor:pointer; text-align:left; appearance:none; -webkit-appearance:none}
input,textarea,select{font:inherit; color:var(--ink)}
:focus-visible{outline:2px solid var(--accent); outline-offset:2px; border-radius:4px}
@media (prefers-reduced-motion: reduce){ *{transition:none !important; animation:none !important} }
.wrap{max-width:820px; margin:0 auto; padding:0 14px 80px}

/* ---------- header ---------- */
.topbar{position:sticky; top:0; z-index:30; background:var(--bg); border-bottom:1px solid var(--line)}
.masthead{max-width:820px; margin:0 auto; padding:14px 14px 0; display:flex; align-items:baseline; justify-content:space-between; gap:10px}
.wordmark{font-weight:900; font-size:19px; letter-spacing:.05em; text-transform:uppercase}
.stagechip{font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); white-space:nowrap}
.tabs{max-width:820px; margin:0 auto; padding:8px 14px 0; display:flex; gap:2px; overflow-x:auto}
.tab{padding:8px 12px 10px; font-weight:700; font-size:14px; color:var(--muted); border-bottom:3px solid transparent; white-space:nowrap; border-radius:6px 6px 0 0}
.tab[aria-current="true"]{color:var(--ink); border-bottom-color:var(--accent); background:var(--accent-soft)}
.demo-banner{background:var(--warn-soft); color:var(--warn); font-size:12.5px; font-weight:600; text-align:center; padding:6px 12px}
.callout{display:flex; align-items:center; gap:10px; width:100%; background:var(--court); color:var(--court-ink); padding:9px 14px; font-weight:700; font-size:14px; border-top:1px solid var(--callout-chip-line)}
.callout .cinner{max-width:820px; margin:0 auto; width:100%; display:flex; align-items:center; gap:10px}
.callout .ctext{flex:1; min-width:0; overflow-wrap:anywhere}
.callout .cdim{opacity:.85; font-weight:600}
.callout .ack{background:var(--callout-chip); border:1px solid var(--callout-chip-line); color:inherit; border-radius:6px; padding:4px 9px; font-size:12.5px; font-weight:700; white-space:nowrap}

/* ---------- shared ---------- */
.evtabs{margin-top:14px}
.livedot{color:var(--good); font-size:9px; vertical-align:2px}
.section-h{display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin:20px 0 10px}
.section-h h2{margin:0; font-size:13px; font-weight:800; letter-spacing:.09em; text-transform:uppercase; color:var(--muted)}
.section-h .hint{font-size:12.5px; color:var(--muted)}
.microlabel{font-size:11px; font-weight:800; letter-spacing:.09em; text-transform:uppercase; color:var(--muted)}
.tag{display:inline-block; font-size:11px; font-weight:700; padding:2px 7px; border-radius:5px; background:var(--accent-soft); color:var(--accent); white-space:nowrap}
.tag.good{background:var(--good-soft); color:var(--good)}
.tag.warn{background:var(--warn-soft); color:var(--warn)}
.tag.plain{background:transparent; border:1px solid var(--line); color:var(--muted)}
.btn{display:inline-block; padding:9px 14px; border-radius:8px; font-weight:700; font-size:14px; background:var(--accent); color:var(--accent-ink); border:1px solid var(--accent); text-align:center}
.btn.secondary{background:var(--card); color:var(--ink); border:1px solid var(--line)}
.btn.danger{background:var(--danger); border-color:var(--danger); color:#fff}
.btn.small{padding:5px 9px; font-size:12.5px; border-radius:6px}
.btn:disabled{opacity:.45; cursor:default}
.note{font-size:12.5px; color:var(--muted)}
.empty{padding:36px 16px; text-align:center; color:var(--muted); font-size:14px}
.err{color:var(--danger); font-size:13px; font-weight:600; margin-top:8px}

/* ---------- courts board ---------- */
.courtgrid{display:grid; grid-template-columns:1fr; gap:10px}
@media (min-width:640px){ .courtgrid{grid-template-columns:1fr 1fr} }
.courtcard{background:var(--card); border:1px solid var(--line); border-radius:12px; box-shadow:var(--shadow); padding:12px 14px; width:100%}
.courtcard .chead{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px}
.courtcard .cnum{font-size:12px; font-weight:900; letter-spacing:.1em; text-transform:uppercase; color:var(--court); background:var(--court-soft); padding:3px 9px; border-radius:20px}
.courtcard .team{font-weight:700; font-size:16px; overflow-wrap:anywhere}
.courtcard .vs{color:var(--muted); font-weight:400; font-size:13px; padding:1px 0}
.courtcard .cta{margin-top:8px; font-size:12.5px; font-weight:700; color:var(--accent)}
.courtcard.idle .team{color:var(--muted); font-weight:500}
.queue-row{display:flex; align-items:center; gap:10px; padding:9px 4px; border-bottom:1px solid var(--line); font-size:14.5px; width:100%}
.queue-row:last-child{border-bottom:none}
.queue-row.click{cursor:pointer}
.queue-row .qpos{font-size:12px; font-weight:800; color:var(--muted); min-width:20px}
.queue-row .qnames{flex:1; min-width:0; font-weight:600; overflow-wrap:anywhere}
.queue-row .qv{color:var(--muted); font-weight:400}
.queue-row .qtag{font-size:11.5px; color:var(--muted); white-space:nowrap}
.queue-actions{display:flex; gap:6px}
.boardnotes{margin-top:16px}
.boardnotes .note{display:block; padding:2px 0}

/* ---------- schedule / results ---------- */
.subtabs{display:flex; flex-wrap:wrap; gap:6px; margin:12px 0 4px; padding:2px 0}
.subtab{padding:6px 12px; font-weight:700; font-size:13.5px; color:var(--muted); background:var(--card); border:1px solid var(--line); border-radius:999px; white-space:nowrap}
.subtab[aria-current="true"]{color:var(--accent); background:var(--accent-soft); border-color:var(--accent)}
.controls{display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin:12px 0 0}
.search{flex:1; min-width:160px; padding:9px 12px; border-radius:8px; border:1px solid var(--line); background:var(--card)}
.roundblock{background:var(--card); border:1px solid var(--line); border-radius:10px; box-shadow:var(--shadow); padding:4px 14px 8px; margin:12px 0}
.roundblock h3{font-size:13px; font-weight:800; letter-spacing:.09em; text-transform:uppercase; color:var(--muted); margin:10px 0 4px}
details.roundblock summary{cursor:pointer; list-style:none}
details.roundblock summary::-webkit-details-marker{display:none}
details.roundblock summary h3{display:inline-block}
details.roundblock summary h3::after{content:"▸"; margin-left:6px; font-size:11px}
details.roundblock[open] summary h3::after{content:"▾"}
details.roundblock .hint{font-weight:600; letter-spacing:0; text-transform:none}
.srow{display:flex; align-items:center; gap:10px; padding:7px 0; border-bottom:1px solid var(--line); font-size:14.5px; width:100%}
.srow:last-child{border-bottom:none}
.srow .g{font-size:11.5px; font-weight:800; color:var(--muted); min-width:14px}
.srow .names{flex:1; min-width:0; font-weight:600; overflow-wrap:anywhere}
.srow .names .qv{color:var(--muted); font-weight:400}
.srow.done .names{color:var(--muted); font-weight:500}
.srow .res{font-weight:800; font-variant-numeric:tabular-nums; white-space:nowrap}
.srow .res.pending{color:var(--muted); font-weight:600; font-size:12.5px}

/* ---------- standings ---------- */
.group-card{background:var(--card); border:1px solid var(--line); border-radius:10px; box-shadow:var(--shadow); padding:12px 14px; margin-bottom:14px}
.group-card h3{margin:0 0 8px; font-size:15px; font-weight:800; display:flex; justify-content:space-between; align-items:baseline; gap:8px}
.standings{width:100%; border-collapse:collapse; font-variant-numeric:tabular-nums}
.standings th{font-size:10.5px; font-weight:800; letter-spacing:.07em; text-transform:uppercase; color:var(--muted); text-align:right; padding:4px 5px; border-bottom:1px solid var(--line); background:var(--court-soft)}
.standings th.tname{text-align:left}
.standings td{padding:7px 5px; text-align:right; font-size:13.5px; border-bottom:1px solid var(--line); cursor:pointer}
.standings tr:last-child td{border-bottom:none}
.standings td.tname{text-align:left; font-weight:600; overflow-wrap:anywhere}
.standings .pos{color:var(--muted); font-weight:700}

/* ---------- bracket (single-sided, left to right: round 1 to champion) ----------
   Matches are absolutely positioned inside each round's fixed-height body at
   computed centres, so the elbow connectors always meet at the exact midpoint
   between a pair and land on the next round's slot, at any bracket size. */
.bkwrap{overflow-x:auto; -webkit-overflow-scrolling:touch; padding:2px 0 14px}
.bk{display:flex; align-items:flex-start; width:max-content}
.bkcol,.bkconn{display:flex; flex-direction:column; flex:0 0 auto}
.bkhead{height:40px; margin-bottom:14px; display:flex; align-items:flex-end; padding-bottom:8px;
  border-bottom:2px solid var(--court-soft); font-size:11.5px; font-weight:800; letter-spacing:.08em;
  text-transform:uppercase; color:var(--court); white-space:nowrap}
.bkconn .bkhead{border-bottom-color:transparent}
.bkbody{position:relative; overflow:visible}
.bkmatch{position:absolute; left:0; right:0; height:76px; background:var(--card); border:1px solid var(--line);
  border-radius:12px; box-shadow:var(--shadow); overflow:hidden; display:block; text-align:left}
button.bkmatch,.bkmatch .bkmain{cursor:pointer}
.bkmatch .bkmain{display:block; width:100%; text-align:left}
.bkmatch.editable .bkteam:first-child{padding-right:46px}
.bkteam{height:38px; display:flex; align-items:center; gap:6px; padding:0 9px; min-width:0}
.bkteam + .bkteam{border-top:1px solid var(--line)}
.bkseed{flex:0 0 auto; font-size:10px; font-weight:800; letter-spacing:.02em; padding:2px 5px; border-radius:5px;
  background:var(--accent); color:var(--accent-ink); line-height:1.3}
.bkname{flex:1 1 auto; min-width:0; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.bkscore{flex:0 0 auto; font-size:13px; font-weight:700; font-variant-numeric:tabular-nums; min-width:18px; text-align:right}
.bkteam.bkm-win{background:var(--good-soft)}
.bkteam.bkm-win .bkname,.bkteam.bkm-win .bkscore{color:var(--good); font-weight:800}
.bkteam.bkm-lose .bkname,.bkteam.bkm-lose .bkscore{color:var(--muted); font-weight:500}
.bkteam.bkm-pending .bkname{color:var(--ink); font-weight:700}
.bkteam.bkm-tbd .bkname{color:var(--muted); font-style:italic; font-weight:500}
.bkteam.bkm-seed .bkname{font-weight:700}
.bedit{position:absolute; top:0; right:0; z-index:2; font-size:10.5px; font-weight:800; letter-spacing:.02em;
  color:var(--accent); background:var(--accent-soft); border-bottom-left-radius:8px; padding:3px 7px; line-height:1.2}
.bedit:hover,.bedit:focus-visible{background:var(--accent); color:var(--accent-ink)}
.bkelbow{position:absolute; left:0; width:16px; box-sizing:border-box;
  border-top:2px solid var(--bkline); border-right:2px solid var(--bkline); border-bottom:2px solid var(--bkline);
  border-top-right-radius:8px; border-bottom-right-radius:8px}
.bkarrow{position:absolute; left:16px; right:0; height:2px; background:var(--bkline)}
.bkarrow.bkarrow-champ{left:0; height:3px; border-radius:2px; background:linear-gradient(to right,var(--bkline),var(--ball))}
.bkchamp{position:absolute; left:0; right:0}
.bkchamp-card{box-sizing:border-box; background:var(--good-soft); border:1.5px solid var(--good); border-radius:16px;
  overflow:hidden; position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:12px 8px 10px; text-align:center; min-height:88px; animation:bkchamp .5s ease-out}
@keyframes bkchamp{from{opacity:0; transform:scale(.94)} to{opacity:1; transform:scale(1)}}
.bkchamp-card::before{content:""; position:absolute; top:0; left:0; right:0; height:4px; background:var(--ball)}
.bkchamp-card.tbd{background:var(--card); border:1.5px dashed var(--bkline)}
.bkchamp-card.tbd::before{background:var(--bkline)}
.bkchamp-trophy{font-size:26px; line-height:1; margin-bottom:2px}
.bkchamp-label{font-size:11px; font-weight:800; letter-spacing:.07em; text-transform:uppercase; color:var(--good)}
.bkchamp-card.tbd .bkchamp-label{color:var(--muted)}
.bkchamp-name{margin-top:6px; padding-top:6px; width:100%; border-top:1px dashed var(--line); font-size:13px; overflow-wrap:anywhere}
.bkchamp-name.win{color:var(--good); font-weight:800}
.bkchamp-name.tbd{color:var(--muted); font-style:italic}
.bktag{font-size:10px; font-weight:700; padding:1px 5px; border-radius:4px; background:var(--warn-soft); color:var(--warn); white-space:nowrap; margin-left:4px}

/* ---------- modal ---------- */
.overlay{position:fixed; inset:0; background:rgba(20,17,12,.55); z-index:50; display:flex; align-items:center; justify-content:center; padding:16px}
.modal{background:var(--card); border-radius:14px; width:100%; max-width:440px; padding:18px; max-height:90vh; overflow-y:auto}
.modal h3{margin:0 0 2px; font-size:16px; font-weight:800}
.modal .sub{color:var(--muted); font-size:12.5px; margin-bottom:14px}
.score-line{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:8px 0}
.score-line label{font-weight:600; flex:1; overflow-wrap:anywhere}
.score-in{width:70px; padding:10px; border-radius:8px; border:1px solid var(--line); background:var(--bg); font-size:19px; font-weight:800; text-align:center; font-variant-numeric:tabular-nums}
.game-line{display:flex; align-items:center; gap:10px; padding:6px 0}
.game-line .glabel{font-size:12px; font-weight:700; color:var(--muted); min-width:60px}
.modal .actions{display:flex; gap:8px; margin-top:14px; flex-wrap:wrap}
.modal .actions .spacer{flex:1}
.modal select{width:100%; padding:9px 11px; border-radius:8px; border:1px solid var(--line); background:var(--bg); margin:4px 0}
.tmrow{display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--line); font-size:14px; width:100%}
.tmrow:last-child{border-bottom:none}
.tmrow .tmround{font-size:12px; font-weight:700; color:var(--muted); min-width:88px}
.tmrow .tmopp{flex:1; font-weight:600; overflow-wrap:anywhere}
.tmrow .tmres{font-weight:800; font-variant-numeric:tabular-nums; white-space:nowrap}
.tmrow .tmres.w{color:var(--good)} .tmrow .tmres.l{color:var(--danger)}
.tmrow .tmres.pending{color:var(--muted); font-weight:600; font-size:12.5px}
.tmgames{font-size:11.5px; color:var(--muted); font-weight:400}

/* ---------- admin ---------- */
.panel{background:var(--card); border:1px solid var(--line); border-radius:10px; box-shadow:var(--shadow); padding:14px; margin-bottom:14px}
.panel h3{margin:0 0 10px; font-size:14px; font-weight:800}
.panel h4{margin:16px 0 6px; font-size:13px; font-weight:800}
.field{margin-bottom:10px}
.field label{display:block; font-size:12px; font-weight:700; color:var(--muted); margin-bottom:4px}
.field input[type=text],.field input[type=password],.field input[type=number],.field textarea,.field select{
  width:100%; padding:9px 11px; border-radius:8px; border:1px solid var(--line); background:var(--bg)}
.field textarea{min-height:130px; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:13px}
.fieldrow{display:flex; gap:10px; flex-wrap:wrap}
.fieldrow .field{flex:1; min-width:110px}
.divider{border-top:1px solid var(--line); margin:16px 0}
.preview-box{background:var(--bg); border:1px solid var(--line); border-radius:8px; padding:10px 12px; font-size:13.5px; margin:10px 0; white-space:pre-line}
.statusline{display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:10px}
details.teamlist{margin:10px 0}
details.teamlist summary{cursor:pointer; font-weight:700; font-size:13.5px; padding:4px 0}
select.mv{padding:4px 6px; border-radius:6px; border:1px solid var(--line); background:var(--bg); font-size:12px; max-width:96px}
.addteam{display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-top:10px}
.addteam input{flex:2; min-width:140px; padding:8px 10px; border-radius:8px; border:1px solid var(--line); background:var(--bg)}
.addteam select{flex:1; min-width:90px; padding:8px 10px; border-radius:8px; border:1px solid var(--line); background:var(--bg)}

/* ---------- toast ---------- */
.toast{position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:var(--ink); color:var(--bg); padding:10px 16px; border-radius:10px; font-weight:700; font-size:14px; z-index:80; box-shadow:0 4px 14px rgba(0,0,0,.25); max-width:90vw; text-align:center}

/* ---------- print ---------- */
@media print{
  body{background:#fff; color:#000; font-size:12px}
  .topbar,.controls,.subtabs,.demo-banner,.callout,.btn,.queue-actions,.toast,.overlay,.courtcard .cta{display:none !important}
  .wrap{max-width:100%; padding:0}
  .roundblock,.group-card{box-shadow:none; border-color:#bbb; break-inside:avoid}
  .bkmatch{break-inside:avoid; box-shadow:none; border-color:#bbb}
  .bkelbow{border-color:#999}
  .bkarrow{background:#999}
  .bkhead{color:#000; border-bottom-color:#bbb}
  .print-title{display:block !important; font-size:18px; font-weight:900; margin:0 0 12px}
}
.print-title{display:none}
</style>
</head>

<script>
/* ================= CONFIG =================
   Shares the Dispatch app's Supabase project for now: every tournament
   table and function is prefixed nairobi_ so nothing collides with the
   Dispatch tables. Setup: run supabase-schema.sql once in that project's
   SQL editor, then supabase-testdata.sql for the sample tournament.
   Clearing both values below falls back to local sample data (dev only). */
const SUPABASE_URL = "https://cutiomcwgicdqfgbdsnc.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_jsoONy5tGwX6y3b2TJaqdA_BSg5DKNR";

<script>
/*__LOGIC_START__*/
/* Pure tournament logic. No DOM access in this block, so it can be unit tested in node. */

const CALLED_FRESH_MS = 4 * 60 * 1000;   // "go to court" banner lifetime

function mulberry32(seed){
  return function(){
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function shuffled(arr, rand){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(rand() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
let __uidCounter = 0;
function uid(){
  if (typeof crypto !== "undefined" && crypto.randomUUID) return crypto.randomUUID();
  __uidCounter++;
  return "id-" + __uidCounter + "-" + Math.floor(Math.random() * 1e9);
}
function groupLetter(i){ return String.fromCharCode(65 + i); }
function ordinal(n){ return n + (n === 1 ? "st" : n === 2 ? "nd" : n === 3 ? "rd" : "th"); }

/* Split n entrants into groups near the target size. Larger groups go last,
   e.g. 50 with target 6 gives [6,6,6,6,6,6,7,7]. */
function groupSizes(n, target){
  target = Math.max(2, target || 6);
  const g = Math.max(1, Math.round(n / target));
  const base = Math.floor(n / g);
  const extra = n % g;
  const sizes = [];
  for(let i = 0; i < g; i++) sizes.push(base + (i >= g - extra ? 1 : 0));
  return sizes;
}

function makeGroups(names, target, rand){
  const pool = rand ? shuffled(names, rand) : names.slice();
  const sizes = groupSizes(pool.length, target);
  const groups = [];
  let idx = 0;
  sizes.forEach((s, i) => {
    groups.push({ name: groupLetter(i), members: pool.slice(idx, idx + s) });
    idx += s;
  });
  return groups;
}

/* Circle-method round robin. Returns rounds, each an array of [a,b] pairs. */
function roundRobin(ids){
  const t = ids.slice();
  if (t.length % 2) t.push(null);
  const n = t.length;
  const rounds = [];
  for(let r = 0; r < n - 1; r++){
    const rd = [];
    for(let i = 0; i < n / 2; i++){
      const a = t[i], b = t[n - 1 - i];
      if (a != null && b != null) rd.push(r % 2 ? [b, a] : [a, b]);
    }
    rounds.push(rd);
    t.splice(1, 0, t.pop());
  }
  return rounds;
}

/* Build group-stage match rows for one event. Play order runs round by round,
   and inside each round it starts at group A and works down, so every team
   finishes match 1 before anyone starts match 2. */
function buildEventMatches(eventId, groups, startOrder){
  let ord = startOrder || 0;
  const perGroup = groups.map(g => ({ name: g.name, rounds: roundRobin(g.entrantIds) }));
  const maxR = Math.max(0, ...perGroup.map(g => g.rounds.length));
  const rows = [];
  for(let r = 0; r < maxR; r++){
    for(const g of perGroup){
      if (!g.rounds[r]) continue;
      for(const [a, b] of g.rounds[r]){
        ord += 10;
        rows.push({
          id: uid(), event_id: eventId, stage: "group", group_name: g.name,
          round: r + 1, bracket_round: null, bracket_pos: null,
          entrant1_id: a, entrant2_id: b, score1: null, score2: null, games: null,
          status: "scheduled", play_order: ord, postponed: false, court: null,
          walkover: false, called_at: null, called_ack: false,
          next_match_id: null, next_slot: null
        });
      }
    }
  }
  return rows;
}

/* Catch-up matches for a team added to (or moved into) a group: one match
   against each current member, appended after the group's existing rounds. */
function buildCatchupMatches(eventId, groupName, newId, memberIds, startRound, startOrder){
  return memberIds.map((oppId, i) => ({
    id: uid(), event_id: eventId, stage: "group", group_name: groupName,
    round: startRound + i, bracket_round: null, bracket_pos: null,
    entrant1_id: newId, entrant2_id: oppId, score1: null, score2: null, games: null,
    status: "scheduled", play_order: startOrder + (i + 1) * 10, postponed: false, court: null,
    walkover: false, called_at: null, called_ack: false,
    next_match_id: null, next_slot: null
  }));
}

/* Merge per-event pending lists into one queue, weighted by list length: an
   event with more waiting matches appears proportionally more often, so it
   claims proportionally more courts. Each match gets a fractional key
   (position + 0.5) / count, and the queue is those keys ascending (ties broken
   by event order). An equal split falls back to plain alternation. */
function weaveQueues(lists){
  const items = [];
  lists.forEach((list, e) => {
    const n = list.length;
    for(let i = 0; i < n; i++) items.push({ m: list[i], e: e, key: (i + 0.5) / n });
  });
  items.sort((a, b) => a.key - b.key || a.e - b.e);
  return items.map(x => x.m);
}

/* Points for/against of one side of a match, summing games when present. */
function matchPoints(m){
  if (Array.isArray(m.games) && m.games.length){
    let a = 0, b = 0;
    m.games.forEach(g => { a += g[0]; b += g[1]; });
    return [a, b];
  }
  return [m.score1 || 0, m.score2 || 0];
}

/* Standings: wins, head to head (two-way ties), point diff, points for. */
function computeStandings(entrants, matches){
  const rows = entrants.map(e => ({ id: e.id, name: e.name, p: 0, w: 0, l: 0, pf: 0, pa: 0, diff: 0 }));
  const byId = {};
  rows.forEach(r => byId[r.id] = r);
  const played = matches.filter(m => m.status === "played" && m.score1 != null && m.score2 != null);
  for(const m of played){
    const a = byId[m.entrant1_id], b = byId[m.entrant2_id];
    if (!a || !b) continue;
    const [p1, p2] = matchPoints(m);
    a.p++; b.p++;
    a.pf += p1; a.pa += p2;
    b.pf += p2; b.pa += p1;
    if (m.score1 > m.score2){ a.w++; b.l++; } else { b.w++; a.l++; }
  }
  rows.forEach(r => r.diff = r.pf - r.pa);
  rows.sort((x, y) => y.w - x.w || y.diff - x.diff || y.pf - x.pf || x.name.localeCompare(y.name));
  for(let i = 0; i < rows.length - 1; i++){
    const a = rows[i], b = rows[i + 1];
    const twoWay = a.w === b.w &&
      (i + 2 >= rows.length || rows[i + 2].w !== a.w) &&
      (i === 0 || rows[i - 1].w !== a.w);
    if (twoWay){
      const m = played.find(m =>
        (m.entrant1_id === a.id && m.entrant2_id === b.id) ||
        (m.entrant1_id === b.id && m.entrant2_id === a.id));
      if (m){
        const winner = m.score1 > m.score2 ? m.entrant1_id : m.entrant2_id;
        if (winner === b.id){ rows[i] = b; rows[i + 1] = a; }
      }
    }
  }
  return rows;
}

/* Seed the knockout field.
   sizeOverride null ("auto"): top `adv` per group, filled to the next power of
   two with best next-placed finishers. sizeOverride N: exactly N spots, whole
   place-tiers first, then best-of-the-next-tier to fill.
   Partial-tier qualifiers are marked wildcard ("best 3rd" etc). */
function seedField(groupsStandings, adv, sizeOverride){
  const tierList = t => groupsStandings
    .map(g => g.rows[t] ? { row: g.rows[t], group: g.group } : null)
    .filter(Boolean)
    .map(x => ({
      entrantId: x.row.id, name: x.row.name, group: x.group, place: t + 1,
      w: x.row.w, l: x.row.l,
      winPct: x.row.p ? x.row.w / x.row.p : 0,
      avgDiff: x.row.p ? x.row.diff / x.row.p : 0,
      avgPf: x.row.p ? x.row.pf / x.row.p : 0
    }))
    .sort((a, b) => b.winPct - a.winPct || b.avgDiff - a.avgDiff || b.avgPf - a.avgPf || a.name.localeCompare(b.name));
  const maxPlace = Math.max(0, ...groupsStandings.map(g => g.rows.length));
  const seeds = [];
  let size, guaranteed = 0;
  if (!sizeOverride){
    for(let t = 0; t < adv && t < maxPlace; t++){ seeds.push(...tierList(t)); guaranteed++; }
    size = nextPow2(Math.max(2, seeds.length));
    let t = adv;
    while(seeds.length < size && t < maxPlace){
      for(const c of tierList(t)){
        if (seeds.length >= size) break;
        c.wildcard = true;
        seeds.push(c);
      }
      t++;
    }
  } else {
    size = sizeOverride;
    let t = 0;
    while(seeds.length < size && t < maxPlace){
      const list = tierList(t);
      if (seeds.length + list.length <= size){
        seeds.push(...list); guaranteed++;
      } else {
        for(const c of list){
          if (seeds.length >= size) break;
          c.wildcard = true;
          seeds.push(c);
        }
      }
      t++;
    }
  }
  return { seeds, size, guaranteed, wildcards: seeds.filter(s => s.wildcard).length };
}

function nextPow2(n){ let p = 1; while(p < n) p *= 2; return p; }

/* Canonical bracket seed order, e.g. size 8 gives [1,8,4,5,2,7,3,6]. */
function bracketOrder(size){
  let r = [1, 2];
  while(r.length < size){
    const next = [];
    for(const s of r){ next.push(s); next.push(2 * r.length + 1 - s); }
    r = next;
  }
  return r;
}

/* First-round pairings for a seed list, padded to a full bracket with nulls,
   with same-group matchups swapped apart where possible. */
function bracketPairs(seeds){
  const size = nextPow2(Math.max(2, seeds.length));
  const order = bracketOrder(size);
  const slot = n => seeds[n - 1] || null;
  const pairs = [];
  for(let i = 0; i < order.length; i += 2) pairs.push([slot(order[i]), slot(order[i + 1])]);
  const clash = p => p[0] && p[1] && p[0].group === p[1].group;
  for(let pass = 0; pass < 3; pass++){
    let fixed = true;
    for(const p of pairs){
      if (!clash(p)) continue;
      fixed = false;
      for(const q of pairs){
        if (q === p || !q[1]) continue;
        const t = p[1]; p[1] = q[1]; q[1] = t;
        if (!clash(p) && !clash(q)) break;
        q[1] = p[1]; p[1] = t;
      }
    }
    if (fixed) break;
  }
  return pairs;
}

function roundLabelFor(bracketRound, totalRounds){
  const teams = Math.pow(2, totalRounds - bracketRound + 1);
  if (teams === 2) return "Final";
  if (teams === 4) return "Semifinals";
  if (teams === 8) return "Quarterfinals";
  if (teams === 16) return "Round of 16";
  return "Round of " + teams;
}

/* Builds all knockout rounds with linkage and resolves any byes immediately. */
function buildBracket(eventId, seeds, startOrder){
  const size = nextPow2(Math.max(2, seeds.length));
  const pairs = bracketPairs(seeds);
  const totalRounds = Math.log2(size);
  let ord = startOrder || 0;
  const rows = [];
  const roundMatches = [];
  for(let r = 1; r <= totalRounds; r++){
    const count = size / Math.pow(2, r);
    const list = [];
    for(let i = 0; i < count; i++){
      ord += 10;
      const row = {
        id: uid(), event_id: eventId, stage: "knockout", group_name: null,
        round: r, bracket_round: r, bracket_pos: i,
        entrant1_id: null, entrant2_id: null, score1: null, score2: null, games: null,
        status: "scheduled", play_order: ord, postponed: false, court: null,
        walkover: false, called_at: null, called_ack: false,
        next_match_id: null, next_slot: null
      };
      list.push(row); rows.push(row);
    }
    roundMatches.push(list);
  }
  for(let r = 0; r < roundMatches.length - 1; r++){
    roundMatches[r].forEach((m, i) => {
      m.next_match_id = roundMatches[r + 1][Math.floor(i / 2)].id;
      m.next_slot = (i % 2) + 1;
    });
  }
  pairs.forEach((p, i) => {
    const m = roundMatches[0][i];
    m.entrant1_id = p[0] ? p[0].entrantId : null;
    m.entrant2_id = p[1] ? p[1].entrantId : null;
    if (m.entrant1_id && !m.entrant2_id){
      m.status = "played";
      const nm = rows.find(x => x.id === m.next_match_id);
      if (nm){ if (m.next_slot === 1) nm.entrant1_id = m.entrant1_id; else nm.entrant2_id = m.entrant1_id; }
    }
  });
  return rows;
}

/* Single-game score check. Returns an error message, or null if valid. */
function validateScore(s1, s2, pts, isAdmin){
  if (!Number.isInteger(s1) || !Number.isInteger(s2) || s1 < 0 || s2 < 0) return "Enter both scores as whole numbers.";
  if (s1 === s2) return "Scores can't be tied.";
  if (!isAdmin){
    if (Math.max(s1, s2) !== pts) return "The winner needs exactly " + pts + " points.";
    if (Math.min(s1, s2) >= pts) return "The losing score must be under " + pts + ".";
  }
  return null;
}

/* Best-of-N check. games: [[a,b],...]. Returns {error} or {w1, w2}. */
function validateGames(games, pts, isAdmin, bestOf){
  const need = Math.floor(bestOf / 2) + 1;
  if (!Array.isArray(games) || !games.length) return { error: "Enter the game scores in order." };
  if (games.length > bestOf) return { error: "Best of " + bestOf + ": that's too many games." };
  let w1 = 0, w2 = 0;
  for(const g of games){
    if (w1 === need || w2 === need) return { error: "The match was already decided; remove the extra games." };
    const err = validateScore(g[0], g[1], pts, isAdmin);
    if (err) return { error: err };
    if (g[0] > g[1]) w1++; else w2++;
  }
  if (w1 < need && w2 < need) return { error: "Best of " + bestOf + ": someone needs " + need + " game wins." };
  return { w1, w2 };
}

/* The pending queue across all active events, woven so events alternate.
   This is exactly the order courts are filled in. */
function weavePending(db){
  const act = db.events.filter(e => e.active).sort((a, b) => a.sort_order - b.sort_order);
  const lists = act.map(ev => db.matches
    .filter(m => m.event_id === ev.id && m.status === "scheduled" && m.court == null && m.entrant1_id && m.entrant2_id)
    .sort((a, b) => a.play_order - b.play_order));
  return weaveQueues(lists);
}

/* Shared court pool: every free court takes the next match from the woven
   cross-event queue, so no court sits idle while any active event has
   matches waiting. Mutates db.matches. Mirrors the SQL function. */
function assignCourtsGlobal(db){
  const total = (db.tournament && db.tournament.settings && db.tournament.settings.courts) || 4;
  db.matches.forEach(m => {
    if (m.status !== "scheduled" || m.court == null) return;
    const ev = db.events.find(e => e.id === m.event_id);
    if (!ev || !ev.active) m.court = null;
  });
  const taken = new Set(db.matches.filter(m => m.status === "scheduled" && m.court != null).map(m => m.court));
  const free = [];
  for(let c = 1; c <= total; c++) if (!taken.has(c)) free.push(c);
  const queue = weavePending(db);
  for(const next of queue){
    if (!free.length) break;
    const ev = db.events.find(e => e.id === next.event_id);
    const allowed = ev && ev.settings && Array.isArray(ev.settings.courts) && ev.settings.courts.length ? ev.settings.courts : null;
    let idx = -1;
    for(let k = 0; k < free.length; k++){ if (!allowed || allowed.includes(free[k])){ idx = k; break; } }
    if (idx === -1) continue;
    next.court = free[idx]; free.splice(idx, 1);
    next.postponed = false;
    next.called_at = new Date().toISOString();
    next.called_ack = false;
  }
}

const EVENT_CATEGORIES = [

function defaultEventSettings(){
  return { points_to_group: 21, points_to_knockout: 21, best_of_group: 1, best_of_knockout: 1,
    advance_per_group: 2, knockout_size: "auto", group_size: 6, schedule_note: "" };

function buildMockData(){
  const rand = mulberry32(42);
  const tournament = { id: "t1", name: "Nairobi Open", settings: { courts: 4 } };

  const events = EVENT_CATEGORIES.map((name, i) => ({
    id: "ev" + (i + 1), tournament_id: "t1", name, sort_order: i,
    stage: "group", active: false, settings: defaultEventSettings()
  }));
  const evD = events[0], evS = events[1];
  evD.active = true; evD.settings.schedule_note = "Day 1";
  evS.active = true; evS.settings.group_size = 5;
  evS.settings.schedule_note = "Day 1"; evS.settings.best_of_knockout = 3;
  events[2].settings.schedule_note = "Day 2"; events[3].settings.schedule_note = "Day 2"; events[4].settings.schedule_note = "Day 2";
  for(let i = 5; i <= 9; i++) events[i].settings.schedule_note = "Day 3";
  for(let i = 10; i <= 12; i++) events[i].settings.schedule_note = "Day 4";

  const entrants = [];
  const skills = {};
  let en = 0;
  const mkEntrants = (ev, groups) => {
    groups.forEach(g => {
      g.members.forEach((name, i) => {
        en++;
        const e = { id: "e" + en, event_id: ev.id, name, group_name: g.name, seed: i + 1 };
        skills[e.id] = 0.2 + rand() * 0.8;
        entrants.push(e);
      });
    });
  };
  const idsByGroup = (evId, gname) => entrants.filter(e => e.event_id === evId && e.group_name === gname).map(e => e.id);
  const buildFor = (ev, names) => {
    const groups = makeGroups(names, ev.settings.group_size, rand);
    mkEntrants(ev, groups);
    return buildEventMatches(ev.id, groups.map(g => ({ name: g.name, entrantIds: idsByGroup(ev.id, g.name) })), 0);
  };

  const firsts = shuffled(MOCK_FIRSTS, rand);
  const teamNames = [];
  for(let i = 0; i < 50; i++) teamNames.push(firsts[2 * i] + " & " + firsts[2 * i + 1]);
  const matchesD = buildFor(evD, teamNames);
  const matchesS = buildFor(evS, MOCK_WOMEN_SINGLES);

  /* Small fields for every other category so their schedules render. */
  const SURNAMES = "KMWPRSTBGD";
  let allOther = [];
  for(let i = 2; i < events.length; i++){
    const ev = events[i];
    ev.settings.group_size = 4;
    const pool = shuffled(MOCK_FIRSTS, rand);
    const names = ev.name.includes("Singles")
      ? pool.slice(0, 8).map(n => n + " " + SURNAMES[(i - 2) % SURNAMES.length] + ".")
      : Array.from({ length: 8 }, (_, k) => pool[2 * k] + " & " + pool[2 * k + 1]);
    allOther = allOther.concat(buildFor(ev, names));
  }

  /* Play strictly in queue order. The doubles group stage is fully played so
     the knockout flow can be tested end to end (confirm bracket, KO scores).
     Singles stops mid round 4 to show a live group stage. */
  const playInOrder = (rows, count, pts) => {
    rows.slice().sort((a, b) => a.play_order - b.play_order).slice(0, count).forEach(m => {
      const s1 = skills[m.entrant1_id], s2 = skills[m.entrant2_id];
      const p1 = s1 / (s1 + s2);
      const oneWins = rand() < p1;
      const spread = Math.abs(s1 - s2);
      const loserPts = Math.max(2, Math.min(pts - 1, Math.round((pts - 2) * (1 - spread) * (0.55 + rand() * 0.5))));
      m.score1 = oneWins ? pts : loserPts;
      m.score2 = oneWins ? loserPts : pts;
      m.status = "played";
    });
  };
  playInOrder(matchesD, matchesD.length, 21);
  playInOrder(matchesS, 20, 21);

  const db = { tournament, events, entrants, matches: matchesD.concat(matchesS, allOther) };

  const pendingS = matchesS.filter(m => m.status === "scheduled")
    .sort((a, b) => a.play_order - b.play_order);
  if (pendingS.length > 4){
    const target = pendingS[1];
    target.postponed = true;
    target.play_order = pendingS[Math.min(8, pendingS.length - 1)].play_order + 1;
  }

  assignCourtsGlobal(db);
  return db;
}

<script>
/* ================= STORES =================
   Both stores expose the same interface, so the UI never needs to know
   whether it is talking to sample data or to Supabase. */

function demoStore(){
  const db = buildMockData();
  const PIN = "0727";
  const subs = [];
  const notify = () => subs.forEach(f => { try{ f(); }catch(e){} });
  const ok = () => ({ ok: true });
  const fail = msg => ({ ok: false, error: msg });
  const findMatch = id => db.matches.find(m => m.id === id);
  const eventOf = m => db.events.find(e => e.id === m.event_id);
  const settingFor = (m, base) => {
    const ev = eventOf(m);
    const key = base + (m.stage === "knockout" ? "_knockout" : "_group");
    return (ev && ev.settings && ev.settings[key]) || (base === "points_to" ? 21 : 1);
  };
  const checkPin = pin => pin === PIN;

  function advanceWinner(m){
    if (!m.next_match_id || m.status !== "played") return;
    const w = m.score1 > m.score2 ? m.entrant1_id : m.entrant2_id;
    const nm = findMatch(m.next_match_id);
    if (nm && nm.status === "scheduled"){
      if (m.next_slot === 1) nm.entrant1_id = w; else nm.entrant2_id = w;
    }
  }

  function applyScore(m, s1, s2, games, isAdmin, walkover){
    const pts = settingFor(m, "points_to");
    const bo = settingFor(m, "best_of");
    if (walkover){
      m.score1 = s1; m.score2 = s2; m.games = null;
    } else if (bo > 1){
      const v = validateGames(games || [], pts, isAdmin, bo);
      if (v.error) return v.error;
      m.score1 = v.w1; m.score2 = v.w2; m.games = games;
    } else {
      const err = validateScore(s1, s2, pts, isAdmin);
      if (err) return err;
      m.score1 = s1; m.score2 = s2; m.games = null;
    }
    m.status = "played"; m.postponed = false; m.court = null;
    m.walkover = !!walkover;
    return null;
  }

  return {
    mode: "demo",
    subscribe(f){ subs.push(f); },
    async loadAll(){ return JSON.parse(JSON.stringify(db)); },
    async verifyPin(pin){ return checkPin(pin) ? ok() : fail("Wrong PIN."); },
    async changePin(){ return fail("PIN changes only work on the live site."); },
    async submitScore(matchId, s1, s2, games){
      const m = findMatch(matchId);
      if (!m) return fail("Match not found.");
      if (m.status === "played") return fail("A score is already in. Ask the desk to change it.");
      if (!m.entrant1_id || !m.entrant2_id) return fail("Teams for this match aren't decided yet.");
      if (m.court == null) return fail("This match isn't on a court yet. The score is entered from the Courts tab once it's called; corrections go through the desk.");
      const err = applyScore(m, s1, s2, games, false, false);
      if (err) return fail(err);
      advanceWinner(m);
      assignCourtsGlobal(db);
      notify(); return ok();
    },
    async adminSubmitScore(pin, matchId, s1, s2, games, walkover){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      const m = findMatch(matchId);
      if (!m) return fail("Match not found.");
      if (!m.entrant1_id || !m.entrant2_id) return fail("Teams for this match aren't decided yet.");
      const bo = settingFor(m, "best_of");
      let newW;
      if (walkover){
        if (!Number.isInteger(s1) || !Number.isInteger(s2) || s1 === s2) return fail("Bad walkover score.");
        newW = s1 > s2 ? m.entrant1_id : m.entrant2_id;
      } else if (bo > 1){
        const v = validateGames(games || [], settingFor(m, "points_to"), true, bo);
        if (v.error) return fail(v.error);
        newW = v.w1 > v.w2 ? m.entrant1_id : m.entrant2_id;
      } else {
        const err = validateScore(s1, s2, settingFor(m, "points_to"), true);
        if (err) return fail(err);
        newW = s1 > s2 ? m.entrant1_id : m.entrant2_id;
      }
      if (m.next_match_id){
        const nm = findMatch(m.next_match_id);
        const oldW = m.status === "played" ? (m.score1 > m.score2 ? m.entrant1_id : m.entrant2_id) : null;
        if (nm && nm.status === "played" && oldW !== newW)
          return fail("The next round already has a score. Clear it first.");
      }
      applyScore(m, s1, s2, games, true, walkover);
      if (m.next_match_id){
        const nm = findMatch(m.next_match_id);
        if (nm && nm.status === "scheduled"){
          if (m.next_slot === 1) nm.entrant1_id = newW; else nm.entrant2_id = newW;
        }
      }
      assignCourtsGlobal(db);
      notify(); return ok();
    },
    async adminClearScore(pin, matchId){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      const m = findMatch(matchId);
      if (!m) return fail("Match not found.");
      if (m.next_match_id){
        const nm = findMatch(m.next_match_id);
        if (nm && nm.status === "played") return fail("The next round already has a score. Clear it first.");
        if (nm){
          if (m.next_slot === 1) nm.entrant1_id = null; else nm.entrant2_id = null;
        }
      }
      m.score1 = null; m.score2 = null; m.games = null; m.walkover = false;
      m.status = "scheduled"; m.court = null;
      assignCourtsGlobal(db);
      notify(); return ok();
    },
    async adminPostpone(pin, matchId, toEnd){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      const m = findMatch(matchId);
      if (!m) return fail("Match not found.");
      if (m.status !== "scheduled") return fail("That match already has a score.");
      const pending = db.matches
        .filter(x => x.event_id === m.event_id && x.status === "scheduled" && x.id !== m.id)
        .sort((a, b) => a.play_order - b.play_order);
      if (toEnd || pending.length <= 8){
        m.play_order = (pending.length ? pending[pending.length - 1].play_order : m.play_order) + 10;
      } else {
        const after = pending.filter(x => x.play_order > m.play_order);
        const anchor = after[7] || after[after.length - 1];
        if (anchor) m.play_order = anchor.play_order + 1;
      }
      m.postponed = true; m.court = null;
      assignCourtsGlobal(db);
      notify(); return ok();
    },
    async adminPlayNext(pin, matchId){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      const m = findMatch(matchId);
      if (!m) return fail("Match not found.");
      if (m.status !== "scheduled") return fail("That match already has a score.");
      const pending = db.matches.filter(x => x.event_id === m.event_id && x.status === "scheduled" && x.id !== m.id);
      m.play_order = (pending.length ? Math.min(...pending.map(x => x.play_order)) : m.play_order) - 1;
      m.postponed = false;
      assignCourtsGlobal(db);
      notify(); return ok();
    },
    async adminSwapOut(pin, matchId){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      const m = findMatch(matchId);
      if (!m) return fail("Match not found.");
      if (m.status !== "scheduled" || m.court == null) return fail("That match is not on a court.");
      const repl = weavePending(db)[0];
      if (!repl) return fail("No other match is waiting, so it stays on court.");
      repl.court = m.court; repl.postponed = false;
      repl.called_at = new Date().toISOString(); repl.called_ack = false;
      const pending = db.matches.filter(x => x.event_id === m.event_id && x.status === "scheduled" && x.court == null && x.id !== m.id);
      m.court = null; m.called_at = null; m.called_ack = false; m.postponed = false;
      m.play_order = (pending.length ? Math.min(...pending.map(x => x.play_order)) : m.play_order) - 1;
      notify(); return ok();
    },
    async adminAckCalled(pin, matchId){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      const m = findMatch(matchId);
      if (!m) return fail("Match not found.");
      m.called_ack = true;
      notify(); return ok();
    },
    async adminAssignCourt(pin, matchId, court){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      const m = findMatch(matchId);
      if (!m) return fail("Match not found.");
      if (m.status !== "scheduled" || m.court != null) return fail("That match is not waiting for a court.");
      if (!m.entrant1_id || !m.entrant2_id) return fail("This match's teams aren't set yet.");
      const total = (db.tournament && db.tournament.settings && db.tournament.settings.courts) || 4;
      if (!(court >= 1 && court <= total)) return fail("No such court.");
      if (db.matches.some(x => x.status === "scheduled" && x.court === court)) return fail("Court " + court + " was just filled. Pick another.");
      m.court = court; m.postponed = false;
      m.called_at = new Date().toISOString(); m.called_ack = false;
      assignCourtsGlobal(db);
      notify(); return ok();
    },
    async adminUpdateEvent(pin, eventId, name, settings){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      const ev = db.events.find(e => e.id === eventId);
      if (!ev) return fail("Event not found.");
      ev.name = name; ev.settings = settings;
      assignCourtsGlobal(db);
      notify(); return ok();
    },
    async adminSetActive(pin, eventId, active){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      const ev = db.events.find(e => e.id === eventId);
      if (!ev) return fail("Event not found.");
      if (active && !db.matches.some(m => m.event_id === eventId)) return fail("Draw groups first, then start the event.");
      ev.active = active;
      assignCourtsGlobal(db);
      notify(); return ok();
    },
    async adminReplaceEvent(pin, eventId, meta, entrants, matches){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      let ev = eventId ? db.events.find(e => e.id === eventId) : null;
      if (!ev){
        ev = { id: uid(), tournament_id: db.tournament.id, name: meta.name, sort_order: db.events.length,
          stage: "group", active: false, settings: meta.settings };
        db.events.push(ev);
      } else {
        ev.name = meta.name; ev.settings = meta.settings; ev.stage = "group"; ev.active = false;
      }
      db.entrants = db.entrants.filter(e => e.event_id !== ev.id);
      db.matches = db.matches.filter(m => m.event_id !== ev.id);
      entrants.forEach(e => db.entrants.push(Object.assign({}, e, { event_id: ev.id })));
      matches.forEach(m => db.matches.push(Object.assign({}, m, { event_id: ev.id, court: null })));
      assignCourtsGlobal(db);
      notify(); return { ok: true, eventId: ev.id };
    },
    async adminRenameEntrant(pin, entrantId, name){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      const e = db.entrants.find(x => x.id === entrantId);
      if (!e) return fail("Team not found.");
      e.name = name;
      notify(); return ok();
    },
    async adminRemoveEntrant(pin, entrantId){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      const e = db.entrants.find(x => x.id === entrantId);
      if (!e) return fail("Team not found.");
      if (db.matches.some(m => m.stage === "knockout" && (m.entrant1_id === entrantId || m.entrant2_id === entrantId)))
        return fail("They're in the knockout bracket. Edit the bracket or reset it first.");
      db.matches = db.matches.filter(m => !(m.entrant1_id === entrantId || m.entrant2_id === entrantId));
      db.entrants = db.entrants.filter(x => x.id !== entrantId);
      assignCourtsGlobal(db);
      notify(); return ok();
    },
    async adminAddEntrant(pin, eventId, entrant, matches){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      if (!db.events.some(e => e.id === eventId)) return fail("Event not found.");
      db.entrants.push(Object.assign({}, entrant, { event_id: eventId }));
      matches.forEach(m => db.matches.push(Object.assign({}, m, { event_id: eventId, court: null })));
      assignCourtsGlobal(db);
      notify(); return ok();
    },
    async adminMoveEntrant(pin, entrantId, newGroup, matches){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      const e = db.entrants.find(x => x.id === entrantId);
      if (!e) return fail("Team not found.");
      if (db.matches.some(m => m.stage === "knockout" && (m.entrant1_id === entrantId || m.entrant2_id === entrantId)))
        return fail("They're in the knockout bracket. Edit the bracket or reset it first.");
      db.matches = db.matches.filter(m => !(m.stage === "group" && (m.entrant1_id === entrantId || m.entrant2_id === entrantId)));
      e.group_name = newGroup;
      matches.forEach(m => db.matches.push(Object.assign({}, m, { event_id: e.event_id, court: null })));
      assignCourtsGlobal(db);
      notify(); return ok();
    },
    async adminSetContacts(){ return fail("Phone numbers only work on the live site."); },
    async adminListContacts(){ return { ok: true, data: [] }; },
    async adminSetBracketTeams(pin, matchId, e1, e2){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      const m = findMatch(matchId);
      if (!m) return fail("Match not found.");
      if (m.stage !== "knockout") return fail("Only knockout matches can be edited here.");
      if (m.status === "played") return fail("This match already has a score. Clear it first.");
      m.entrant1_id = e1 || null; m.entrant2_id = e2 || null;
      assignCourtsGlobal(db);
      notify(); return ok();
    },
    async adminGenerateBracket(pin, eventId, rows){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      const ev = db.events.find(e => e.id === eventId);
      if (!ev) return fail("Event not found.");
      db.matches = db.matches.filter(m => !(m.event_id === eventId && m.stage === "knockout"));
      rows.forEach(m => db.matches.push(Object.assign({}, m, { event_id: eventId })));
      ev.stage = "knockout";
      assignCourtsGlobal(db);
      notify(); return ok();
    },
    async adminResetBracket(pin, eventId){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      const ev = db.events.find(e => e.id === eventId);
      if (!ev) return fail("Event not found.");
      db.matches = db.matches.filter(m => !(m.event_id === eventId && m.stage === "knockout"));
      ev.stage = "group";
      assignCourtsGlobal(db);
      notify(); return ok();
    }
  };
}

function liveStore(){
  let client = null;
  const subs = [];
  const notify = () => subs.forEach(f => { try{ f(); }catch(e){} });
  let debounceT = null;
  /* Reload live data only when the tab is actually being looked at, and let a
     burst of changes coalesce into one reload, to keep egress down. A
     backgrounded tab catches up the instant it returns to the foreground (see
     the visibilitychange handler below), so "you're up" still lands on time. */
  const debouncedNotify = () => {
    clearTimeout(debounceT);
    debounceT = setTimeout(() => { if (document.visibilityState === "visible") notify(); }, 1500);
  };

  function loadScript(src){
    return new Promise((res, rej) => {
      const s = document.createElement("script");
      s.src = src; s.onload = res; s.onerror = () => rej(new Error("Could not load " + src));
      document.head.appendChild(s);
    });
  }

  async function ensureClient(){
    if (client) return client;
    await loadScript("https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js");
    client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    /* Subscribe per table: the shared project also holds the Dispatch app's
       tables, and their changes shouldn't trigger reloads here. */
    client.channel("nairobi-db-changes")
      .on("postgres_changes", { event: "*", schema: "public", table: "nairobi_tournaments" }, debouncedNotify)
      .on("postgres_changes", { event: "*", schema: "public", table: "nairobi_events" }, debouncedNotify)
      .on("postgres_changes", { event: "*", schema: "public", table: "nairobi_entrants" }, debouncedNotify)
      .on("postgres_changes", { event: "*", schema: "public", table: "nairobi_matches" }, debouncedNotify)
      .subscribe();
    setInterval(() => { if (document.visibilityState === "visible") notify(); }, 180000);
    document.addEventListener("visibilitychange", () => { if (document.visibilityState === "visible") notify(); });
    return client;
  }

  const rpc = async (fn, args) => {
    try{
      const c = await ensureClient();
      const { data, error } = await c.rpc(fn, args);
      if (error) return { ok: false, error: error.message };
      if (typeof data === "string" && data !== "OK" && !data.startsWith("OK")) return { ok: false, error: data };
      return { ok: true, data };
    }catch(e){ return { ok: false, error: e.message || "Network error." }; }
  };

  return {
    mode: "live",
    subscribe(f){ subs.push(f); },
    async loadAll(){
      const c = await ensureClient();
      const [t, ev, en, ma] = await Promise.all([
        c.from("nairobi_tournaments").select("*").limit(1),
        c.from("nairobi_events").select("*").order("sort_order"),
        c.from("nairobi_entrants").select("*").order("group_name").order("seed"),
        c.from("nairobi_matches").select("*").order("play_order")
      ]);
      const err = t.error || ev.error || en.error || ma.error;
      if (err) throw new Error(err.message);
      return { tournament: (t.data && t.data[0]) || null, events: ev.data || [], entrants: en.data || [], matches: ma.data || [] };
    },
    verifyPin: pin => rpc("nairobi_verify_pin", { p_pin: pin }).then(r =>
      r.ok && r.data === true ? { ok: true } : { ok: false, error: r.error || "Wrong PIN." }),
    changePin: (oldPin, newPin) => rpc("nairobi_change_admin_pin", { p_old: oldPin, p_new: newPin }),
    submitScore: (id, s1, s2, games) => rpc("nairobi_submit_score", { p_match_id: id, p_score1: s1, p_score2: s2, p_games: games || null }),
    adminSubmitScore: (pin, id, s1, s2, games, walkover) => rpc("nairobi_admin_submit_score", { p_pin: pin, p_match_id: id, p_score1: s1, p_score2: s2, p_games: games || null, p_walkover: !!walkover }),
    adminClearScore: (pin, id) => rpc("nairobi_admin_clear_score", { p_pin: pin, p_match_id: id }),
    adminPostpone: (pin, id, toEnd) => rpc("nairobi_admin_postpone", { p_pin: pin, p_match_id: id, p_to_end: !!toEnd }),
    adminPlayNext: (pin, id) => rpc("nairobi_admin_play_next", { p_pin: pin, p_match_id: id }),
    adminSwapOut: (pin, id) => rpc("nairobi_admin_swap_out", { p_pin: pin, p_match_id: id }),
    adminAckCalled: (pin, id) => rpc("nairobi_admin_ack_called", { p_pin: pin, p_match_id: id }),
    adminAssignCourt: (pin, id, court) => rpc("nairobi_admin_assign_court", { p_pin: pin, p_match_id: id, p_court: court }),
    adminUpdateEvent: (pin, eventId, name, settings) => rpc("nairobi_admin_update_event", { p_pin: pin, p_event_id: eventId, p_name: name, p_settings: settings }),
    adminSetActive: (pin, eventId, active) => rpc("nairobi_admin_set_active", { p_pin: pin, p_event_id: eventId, p_active: !!active }),
    adminReplaceEvent: async (pin, eventId, meta, entrants, matches) => {
      const r = await rpc("nairobi_admin_replace_event", {
        p_pin: pin, p_event_id: eventId, p_name: meta.name,
        p_sort_order: meta.sort_order != null ? meta.sort_order : 0,
        p_settings: meta.settings, p_entrants: entrants, p_matches: matches
      });
      if (r.ok && typeof r.data === "string" && r.data.startsWith("OK:")) r.eventId = r.data.slice(3);
      return r;
    },
    adminRenameEntrant: (pin, id, name) => rpc("nairobi_admin_rename_entrant", { p_pin: pin, p_entrant_id: id, p_name: name }),
    adminRemoveEntrant: (pin, id) => rpc("nairobi_admin_remove_entrant", { p_pin: pin, p_entrant_id: id }),
    adminAddEntrant: (pin, eventId, entrant, matches) => rpc("nairobi_admin_add_entrant", { p_pin: pin, p_event_id: eventId, p_entrant: entrant, p_matches: matches }),
    adminMoveEntrant: (pin, id, group, matches) => rpc("nairobi_admin_move_entrant", { p_pin: pin, p_entrant_id: id, p_group: group, p_matches: matches }),
    adminSetContacts: (pin, entrantId, phones) => rpc("nairobi_admin_set_contacts", { p_pin: pin, p_entrant_id: entrantId, p_phones: phones }),
    adminListContacts: pin => rpc("nairobi_admin_list_contacts", { p_pin: pin }),
    adminSetBracketTeams: (pin, matchId, e1, e2) => rpc("nairobi_admin_set_bracket_teams", { p_pin: pin, p_match_id: matchId, p_entrant1_id: e1 || null, p_entrant2_id: e2 || null }),
    adminGenerateBracket: (pin, eventId, rows) => rpc("nairobi_admin_generate_bracket", { p_pin: pin, p_event_id: eventId, p_matches: rows }),
    adminResetBracket: (pin, eventId) => rpc("nairobi_admin_reset_bracket", { p_pin: pin, p_event_id: eventId })
  };
}
</script>

<script>
/* ================= UI ================= */
window.__APP_ERRORS = [];
window.addEventListener("error", e => window.__APP_ERRORS.push(String(e.message)));

const store = (SUPABASE_URL && SUPABASE_ANON_KEY) ? liveStore() : demoStore();
let data = { tournament: null, events: [], entrants: [], matches: [] };
const state = {
  view: "board", eventId: null, search: "", roundFilter: "all",
  standingsFilter: "all",
  adminPin: null, modalMatchId: null, teamModalId: null, slotEditId: null, assignCourt: null,
  setupPreview: null, adminEventId: null, loadError: null,
  showAllQueue: false, showRedraw: false, pendingRender: false,
  dismissedCalled: {}, contacts: {}, bkCentered: false
};

function esc(s){
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}
function safeSession(key, val){
  try{
    if (val === undefined) return window.sessionStorage.getItem(key);
    if (val === null) window.sessionStorage.removeItem(key);
    else window.sessionStorage.setItem(key, val);
  }catch(e){ return null; }
}
function safeLocal(key, val){
  try{
    if (val === undefined) return window.localStorage.getItem(key);
    if (val === null) window.localStorage.removeItem(key);
    else window.localStorage.setItem(key, val);
  }catch(e){ return null; }
}
/* Banner dismissals survive refresh; entries expire with the banners. */
function loadDismissedCalled(){
  try{
    const o = JSON.parse(safeLocal("pb_dismissed") || "{}");
    const now = Date.now(), keep = {};
    Object.keys(o).forEach(k => {
      const t = Date.parse(k.split("|")[1] || "");
      if (t && now - t < CALLED_FRESH_MS * 3) keep[k] = true;
    });
    return keep;
  }catch(e){ return {}; }
}
function toast(msg){
  const t = document.createElement("div");
  t.className = "toast"; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = "0"; t.style.transition = "opacity .3s"; }, 1600);
  setTimeout(() => t.remove(), 2000);
}

/* ---------- data helpers ---------- */
const entrantById = id => data.entrants.find(e => e.id === id);
const entrantName = id => { const e = entrantById(id); return e ? e.name : null; };
const eventById = id => data.events.find(e => e.id === id);
const activeEvents = () => data.events.filter(e => e.active).sort((a, b) => a.sort_order - b.sort_order);
const courtsCount = () => (data.tournament && data.tournament.settings && data.tournament.settings.courts) || 4;
const evSetting = (ev, key, dflt) => (ev && ev.settings && ev.settings[key] != null) ? ev.settings[key] : dflt;
const matchPts = m => {
  const ev = eventById(m.event_id);
  return evSetting(ev, m.stage === "knockout" ? "points_to_knockout" : "points_to_group", 21);
};
const matchBestOf = m => {
  const ev = eventById(m.event_id);
  return parseInt(evSetting(ev, m.stage === "knockout" ? "best_of_knockout" : "best_of_group", 1), 10) || 1;
};
function currentEvent(){
  if (state.eventId && eventById(state.eventId)) return eventById(state.eventId);
  const act = activeEvents();
  return act[0] || data.events[0] || null;
}
function groupsOfEvent(ev){
  if (!ev) return [];
  const names = [...new Set(data.entrants.filter(e => e.event_id === ev.id && e.group_name).map(e => e.group_name))];
  names.sort();
  return names;
}
function standingsFor(ev, gname){
  const ents = data.entrants.filter(e => e.event_id === ev.id && e.group_name === gname);
  const ms = data.matches.filter(m => m.event_id === ev.id && m.stage === "group" && m.group_name === gname);
  return computeStandings(ents, ms);
}
function seedFieldFor(ev){
  const groups = groupsOfEvent(ev);
  const gs = groups.map(g => ({ group: g, rows: standingsFor(ev, g) }));
  const ks = evSetting(ev, "knockout_size", "auto");
  const override = (ks === "auto" || !ks) ? null : parseInt(ks, 10);
  return seedField(gs, evSetting(ev, "advance_per_group", 2), override);
}
function koLabel(m){
  const ko = data.matches.filter(x => x.event_id === m.event_id && x.stage === "knockout");
  const total = Math.max(0, ...ko.map(x => x.bracket_round || 0));
  return roundLabelFor(m.bracket_round, total);
}
function roundName(m){ return m.stage === "knockout" ? koLabel(m) : "Round " + m.round; }
function gamesStr(m){
  if (Array.isArray(m.games) && m.games.length) return m.games.map(g => g[0] + "-" + g[1]).join(", ");
  return null;
}
function onCourtMatches(){
  return data.matches
    .filter(m => m.status === "scheduled" && m.court != null && m.entrant1_id && m.entrant2_id)
    .filter(m => { const ev = eventById(m.event_id); return ev && ev.active; })
    .sort((a, b) => a.court - b.court);
}
function pendingQueue(){
  const lists = activeEvents().map(ev => data.matches
    .filter(m => m.event_id === ev.id && m.status === "scheduled" && m.court == null && m.entrant1_id && m.entrant2_id)
    .sort((a, b) => a.play_order - b.play_order));
  return weaveQueues(lists);
}
function calledMatches(){
  const now = Date.now();
  return onCourtMatches().filter(m =>
    m.called_at && !m.called_ack && (now - Date.parse(m.called_at)) < CALLED_FRESH_MS &&
    !state.dismissedCalled[m.id + "|" + m.called_at]);
}

/* ---------- rendering ---------- */
/* Only touch the DOM when the generated markup actually changed. Periodic and
   realtime refreshes with no visible difference then leave the page alone, so
   taps never land on elements that were just replaced mid-gesture. */
let renderedHtml = null;
function commitHtml(app, html){
  if (html === renderedHtml) return false;
  app.innerHTML = html;
  renderedHtml = html;
  return true;
}
function render(){
  const app = document.getElementById("app");
  const ae = document.activeElement;
  const typingInForm = ae && app.contains(ae) && /^(INPUT|TEXTAREA|SELECT)$/.test(ae.tagName) && ae.id !== "pin-input" && ae.id !== "search-input";
  if (typingInForm && (state.view === "admin" || state.modalMatchId || state.slotEditId)){
    state.pendingRender = true;
    return;
  }
  const restoreId = ae && ae.id;
  const restoreVal = restoreId && ae.value;

  if (state.loadError){
    commitHtml(app, '<div class="wrap"><div class="empty">Could not load tournament data.<br>' + esc(state.loadError) + '<br><br><button class="btn secondary" onclick="location.reload()">Retry</button></div></div>');
    return;
  }
  if (!data.tournament){
    commitHtml(app, '<div class="wrap"><div class="empty">Loading…</div></div>');
    return;
  }

  const tabs = [
    ["board", "Courts"], ["schedule", "Schedule"],
    ["standings", "Standings"], ["bracket", "Bracket"], ["admin", "Admin"]
  ];
  let html = '<div class="topbar">';
  if (store.mode === "demo") html += '<div class="demo-banner">Demo with sample data. Changes reset on refresh. Admin PIN: 0727</div>';
  html += '<div class="masthead"><div class="wordmark">' + esc(data.tournament.name) + '</div></div>';
  html += '<nav class="tabs">' + tabs.map(([id, label]) =>
    '<button class="tab" aria-current="' + (state.view === id) + '" onclick="setView(\'' + id + '\')">' + label + '</button>'
  ).join("") + '</nav>';
  html += renderCallouts();
  html += '</div>';

  html += '<main class="wrap">';
  if (["schedule", "standings", "bracket"].includes(state.view) && data.events.length > 1){
    html += renderEventTabs();
  }
  if (state.view === "board") html += renderBoard();
  else if (state.view === "schedule") html += renderSchedule();
  else if (state.view === "standings") html += renderStandings();
  else if (state.view === "bracket") html += renderBracket();
  else if (state.view === "admin") html += renderAdmin();
  html += '</main>';

  html += renderScoreModal();
  html += renderTeamModal();
  html += renderSlotModal();
  html += renderCourtAssignModal();
  if (!commitHtml(app, html)) return;

  if (restoreId){
    const el = document.getElementById(restoreId);
    if (el && el.tagName === "INPUT" && (el.type === "text" || el.type === "password")){
      el.focus();
      if (restoreVal != null){ el.value = restoreVal; try{ el.setSelectionRange(restoreVal.length, restoreVal.length); }catch(e){} }
    }
  }
}

/* "Go to court now" banners: fresh court assignments, auto-expire.
   Tapping a banner hides it on this phone only; the admin ✓ dismisses it
   for everyone. Scores are never entered from here. */
function renderCallouts(){
  const called = calledMatches();
  if (!called.length) return "";
  const multi = activeEvents().length > 1;
  let h = "";
  called.slice(0, 4).forEach(m => {
    const ev = eventById(m.event_id);
    h += '<button class="callout" onclick="dismissCallout(\'' + m.id + '\')" title="Tap to dismiss"><span class="cinner">' +
      '<span class="ctext">Court ' + m.court + ' now: ' + esc(entrantName(m.entrant1_id)) + ' <span class="cdim">vs</span> ' + esc(entrantName(m.entrant2_id)) +
      (multi && ev ? ' <span class="cdim">· ' + esc(ev.name) + '</span>' : '') + '</span>' +
      (state.adminPin
        ? '<span class="ack" role="button" onclick="event.stopPropagation();ackCalled(\'' + m.id + '\')">✓ On court</span>'
        : '<span class="ack" aria-hidden="true">✕</span>') +
      '</span></button>';

  if (called.length > 4) h += '<div class="callout"><span class="cinner"><span class="ctext cdim">' + (called.length - 4) + ' more matches just called</span></span></div>';

function renderSchedule(){
  const ev = currentEvent();
  if (!ev) return '<div class="empty">No events yet.</div>';
  const evMatches = data.matches.filter(m => m.event_id === ev.id);
  if (!evMatches.length){
    const note = evSetting(ev, "schedule_note", "");
    return '<div class="empty">' + esc(ev.name) + ' has no schedule yet.' + (note ? '<br>Planned: ' + esc(note) : '') + '</div>';
  }
  const groupMs = evMatches.filter(m => m.stage === "group");
  const koMs = evMatches.filter(m => m.stage === "knockout");
  const maxRound = Math.max(0, ...groupMs.map(m => m.round));
  /* Heal a filter that no longer exists (event redrawn, bracket reset). */
  if (state.roundFilter === "ko" ? !koMs.length : state.roundFilter !== "all" && parseInt(state.roundFilter, 10) > maxRound) state.roundFilter = "all";

  let h = '<span class="print-title">' + esc(data.tournament.name) + ' · ' + esc(ev.name) + ' · Schedule</span>';
  h += '<div class="controls">' +
    '<input class="search" id="search-input" type="text" placeholder="Find a name" value="' + esc(state.search) + '" oninput="setSearch(this.value)">' +
    '<button class="btn small secondary" onclick="window.print()">Print</button></div>';
  h += '<div class="subtabs" role="tablist">' +
    '<button class="subtab" aria-current="' + (state.roundFilter === "all") + '" onclick="setRoundFilter(\'all\')">All</button>';
  for(let r = 1; r <= maxRound; r++){
    h += '<button class="subtab" aria-current="' + (state.roundFilter === String(r)) + '" onclick="setRoundFilter(\'' + r + '\')">Round ' + r + '</button>';
  }
  if (koMs.length) h += '<button class="subtab" aria-current="' + (state.roundFilter === "ko") + '" onclick="setRoundFilter(\'ko\')">Knockout</button>';
  h += '</div>';

  const matchesTerm = termFilterFor();

  if (state.roundFilter === "ko"){
    if (!koMs.length) return h + '<div class="empty">No knockout matches yet.</div>';
    const total = Math.max(...koMs.map(x => x.bracket_round));
    for(let r = 1; r <= total; r++){
      const list = koMs.filter(m => m.bracket_round === r && matchesTerm(m)).sort((a, b) => a.bracket_pos - b.bracket_pos);
      if (!list.length) continue;
      h += '<div class="roundblock"><h3>' + roundLabelFor(r, total) + '</h3>' + list.map(m => scheduleRow(m, true)).join("") + '</div>';
    }
    return h;
  }

  const shown = groupMs.filter(m => (state.roundFilter === "all" || String(m.round) === state.roundFilter) && matchesTerm(m));
  const shownKo = state.roundFilter === "all" ? koMs.filter(matchesTerm) : [];
  if (!shown.length && !shownKo.length) return h + '<div class="empty">No matches found.</div>';
  for(let r = 1; r <= maxRound; r++){
    const list = shown.filter(m => m.round === r).sort((a, b) => a.play_order - b.play_order);
    if (!list.length) continue;
    const allDone = list.every(m => m.status === "played");
    if (allDone && state.roundFilter === "all"){
      /* Finished rounds fold away; tap to peek. */
      h += '<details class="roundblock folded"><summary><h3>Round ' + r + ' <span class="hint">complete · ' + list.length + ' matches</span></h3></summary>' +
        list.map(m => scheduleRow(m, true)).join("") + '</details>';
    } else {
      h += '<div class="roundblock"><h3>Round ' + r + '</h3>' + list.map(m => scheduleRow(m, true)).join("") + '</div>';
    }
  }
  /* Knockout matches show on the "All" page too while they're live, not only
     under the Knockout tab. */
  if (shownKo.length){
    const koTotal = Math.max(...koMs.map(x => x.bracket_round));
    for(let r = 1; r <= koTotal; r++){
      const list = shownKo.filter(m => m.bracket_round === r).sort((a, b) => a.bracket_pos - b.bracket_pos);
      if (!list.length) continue;
      h += '<div class="roundblock"><h3>' + roundLabelFor(r, koTotal) + '</h3>' + list.map(m => scheduleRow(m, true)).join("") + '</div>';
    }
  }
  h += '<p class="note">Matches run in this order, group A first, so everyone plays round 1 before round 2 starts. Played matches show their scores; tap a match for details. A score can be entered while the match is on a court, and corrections go through the desk.</p>';
  return h;
}

/* Single-sided bracket geometry. Round r (0-based) match j sits at a fixed
   vertical centre; the spacing doubles each round so a pair's elbow always
   meets at the next round's slot. Mirrors design 4 from the mockups. */
const BK_P = 114, BK_MH = 76, BK_HALF = 38, BK_COLW = 152;
function bkCenter(r, j){ return BK_HALF + BK_P * (Math.pow(2, r) - 1) / 2 + j * BK_P * Math.pow(2, r); }
function bkBodyH(totalRounds){ return BK_MH + (Math.pow(2, totalRounds - 1) - 1) * BK_P; }
function bkTeamRow(name, cls, score, extra){
  return '<div class="bkteam ' + (cls || '') + '"><span class="bkname">' + name + (extra || '') + '</span>' +
    (score != null ? '<span class="bkscore">' + score + '</span>' : '') + '</div>';
}
function bkRoundCol(label, cells, bodyH){
  return '<div class="bkcol" style="width:' + BK_COLW + 'px"><div class="bkhead">' + esc(label) + '</div>' +
    '<div class="bkbody" style="height:' + bodyH + 'px">' + cells.join('') + '</div></div>';
}
/* Connector column between round r and r+1, where round r+1 has nNext matches. */
function bkConnCol(r, nNext, bodyH){
  let h = '<div class="bkconn"><div class="bkhead">&nbsp;</div><div class="bkbody" style="height:' + bodyH + 'px">';
  for(let j = 0; j < nNext; j++){
    const top = bkCenter(r, 2 * j), bot = bkCenter(r, 2 * j + 1);
    h += '<div class="bkelbow" style="top:' + top + 'px;height:' + (bot - top) + 'px"></div>';
    h += '<div class="bkarrow" style="top:' + bkCenter(r + 1, j) + 'px"></div>';
  }
  return h + '</div></div>';
}
function bkChampCol(champHtml, totalRounds, bodyH){
  const cy = bkCenter(totalRounds - 1, 0);
  return '<div class="bkconn"><div class="bkhead">&nbsp;</div><div class="bkbody" style="height:' + bodyH + 'px">' +
      '<div class="bkarrow bkarrow-champ" style="top:' + cy + 'px"></div></div></div>' +
    '<div class="bkcol" style="width:' + BK_COLW + 'px"><div class="bkhead">Champion</div>' +
      '<div class="bkbody" style="height:' + bodyH + 'px"><div class="bkchamp" style="top:' + (cy - 44) + 'px">' + champHtml + '</div></div></div>';
}
function bkSideCls(hasName, isWin, played){
  if (!hasName) return 'bkm-tbd';
  if (isWin) return 'bkm-win';
  if (played) return 'bkm-lose';
  return 'bkm-pending';
}
const bkChampTbd = '<div class="bkchamp-card tbd"><div class="bkchamp-trophy">🏆</div><div class="bkchamp-label">Champion</div><div class="bkchamp-name tbd">To be decided</div></div>';

function renderBracket(){
  const ev = currentEvent();
  if (!ev) return '<div class="empty">No events yet.</div>';
  const ko = data.matches.filter(m => m.event_id === ev.id && m.stage === "knockout");

  /* Projected bracket: before the desk confirms the knockout, show the seeds. */
  if (!ko.length){
    const groups = groupsOfEvent(ev);
    if (!groups.length) return '<div class="empty">' + esc(ev.name) + ' has no groups yet.</div>';
    const field = seedFieldFor(ev);
    if (field.seeds.length < 2) return '<div class="empty">Not enough teams yet.</div>';
    const left = data.matches.filter(m => m.event_id === ev.id && m.stage === "group" && m.status === "scheduled").length;
    const pairs = bracketPairs(field.seeds);
    const size = nextPow2(Math.max(2, field.seeds.length));
    const totalRounds = Math.log2(size);
    const bodyH = bkBodyH(totalRounds);
    const seedRow = s => !s ? bkTeamRow('BYE', 'bkm-tbd')
      : bkTeamRow(esc(s.group + s.place), 'bkm-seed', null, s.wildcard ? ' <span class="bktag">Best ' + ordinal(s.place) + '</span>' : '');
    const tbdRow = () => bkTeamRow('TBD', 'bkm-tbd');

    let h = '<div class="bkwrap"><div class="bk">';
    for(let r = 0; r < totalRounds; r++){
      const count = size / Math.pow(2, r + 1);
      const cells = [];
      for(let j = 0; j < count; j++){
        const top = bkCenter(r, j) - BK_HALF;
        const rows = r === 0 ? (seedRow(pairs[j][0]) + seedRow(pairs[j][1])) : (tbdRow() + tbdRow());
        cells.push('<div class="bkmatch" style="top:' + top + 'px">' + rows + '</div>');
      }
      h += bkRoundCol(roundLabelFor(r + 1, totalRounds), cells, bodyH);
      if (r < totalRounds - 1) h += bkConnCol(r, size / Math.pow(2, r + 2), bodyH);
    }
    h += bkChampCol(bkChampTbd, totalRounds, bodyH);
    h += '</div></div>';
    h += '<p class="note">A1 means the group A winner, C2 the group C runner-up, from standings right now, so matchups can shift until group play ends. ' +
      'Round 1 is on the left and winners move to the right, toward the final and champion. ' +
      field.seeds.length + ' qualify for a ' + size + '-slot bracket' +
      (field.wildcards ? ', including ' + field.wildcards + ' wildcard' + (field.wildcards > 1 ? 's' : '') + ' from the next places' : '') +
      '. The real bracket is created when the desk confirms the group stage is finished.</p>';
    return h;
  }

  /* Live bracket. */
  const total = Math.max(...ko.map(m => m.bracket_round));
  const bodyH = bkBodyH(total);
  const wo = ' <span class="bktag">W/O</span>';
  const matchCell = (m, r, j) => {
    const n1 = entrantName(m.entrant1_id), n2 = entrantName(m.entrant2_id);
    const played = m.status === "played" && m.score1 != null;
    const bye = m.status === "played" && m.score1 == null;
    const w1 = played && m.score1 > m.score2, w2 = played && m.score2 > m.score1;
    const rows =
      bkTeamRow(n1 ? esc(n1) : 'TBD', bkSideCls(!!n1, w1, played), played ? m.score1 : null, m.walkover && w1 ? wo : '') +
      bkTeamRow(n2 ? esc(n2) : (bye ? 'BYE' : 'TBD'), bkSideCls(!!n2, w2, played), played ? m.score2 : null, m.walkover && w2 ? wo : '');
    const top = bkCenter(r, j) - BK_HALF;
    const clickable = !bye && m.entrant1_id && m.entrant2_id;
    const editable = !!(state.adminPin && m.status === "scheduled" && !bye);
    /* Editable cells keep the two buttons as siblings, never nested. */
    if (editable){
      const main = clickable
        ? '<button class="bkmain" onclick="openMatch(\'' + m.id + '\')">' + rows + '</button>'
        : rows;
      return '<div class="bkmatch editable" style="top:' + top + 'px">' + main +
        '<button class="bedit" onclick="openSlotEditor(\'' + m.id + '\')">Edit</button></div>';
    }
    return clickable
      ? '<button class="bkmatch" style="top:' + top + 'px" onclick="openMatch(\'' + m.id + '\')">' + rows + '</button>'
      : '<div class="bkmatch" style="top:' + top + 'px">' + rows + '</div>';
  };

  const final = ko.find(m => m.bracket_round === total);
  let champHtml;
  if (final && final.status === "played" && final.score1 != null){
    const champ = final.score1 > final.score2 ? final.entrant1_id : final.entrant2_id;
    champHtml = '<div class="bkchamp-card"><div class="bkchamp-trophy">🏆</div><div class="bkchamp-label">Champion</div><div class="bkchamp-name win">' + esc(entrantName(champ)) + '</div></div>';
  } else {
    champHtml = bkChampTbd;
  }

  let h = '<span class="print-title">' + esc(data.tournament.name) + ' · ' + esc(ev.name) + ' · Bracket</span>';
  h += '<div class="bkwrap"><div class="bk">';
  for(let r = 1; r <= total; r++){
    const list = ko.filter(m => m.bracket_round === r).sort((a, b) => a.bracket_pos - b.bracket_pos);
    h += bkRoundCol(roundLabelFor(r, total), list.map((m, j) => matchCell(m, r - 1, j)), bodyH);
    if (r < total) h += bkConnCol(r - 1, ko.filter(m => m.bracket_round === r + 1).length, bodyH);
  }
  h += bkChampCol(champHtml, total, bodyH);
  h += '</div></div>';
  h += '<p class="note">Winners move to the right, round by round, toward the champion. Tap a match to see or enter its result.' +
    (state.adminPin ? ' Unplayed matches have an Edit link to fix the teams by hand.' : '') + '</p>';
  return h;
}
