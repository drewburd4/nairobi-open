/* ---------- modals ---------- */
function renderScoreModal(){
  if (!state.modalMatchId) return "";
  const m = data.matches.find(x => x.id === state.modalMatchId);
  if (!m) return "";
  const n1 = entrantName(m.entrant1_id) || "TBD", n2 = entrantName(m.entrant2_id) || "TBD";
  const played = m.status === "played" && m.score1 != null;
  const isAdmin = !!state.adminPin;
  /* Players can only enter scores for matches currently on a court; everything
     else is read-only for them (admins can score any match from anywhere). */
  const onCourt = m.status === "scheduled" && m.court != null;
  const infoOnly = !isAdmin && !played && !onCourt;
  const pts = matchPts(m);
  const bo = matchBestOf(m);
  const ev = eventById(m.event_id);

  let h = '<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal" role="dialog" aria-modal="true">';
  h += '<h3>' + (played ? 'Match result' : infoOnly ? 'Upcoming match' : 'Enter score') + '</h3>';
  h += '<div class="sub">' + esc(ev ? ev.name : '') + ' · ' + esc(roundName(m)) + (m.court != null && !played ? ' · Court ' + m.court : '') +
    ' · ' + (bo > 1 ? 'best of ' + bo + ', games' : 'first') + ' to ' + pts + '</div>';

  const adminExtras = () => {
    let x = '';
    if (isAdmin && m.status === "scheduled"){
      if (m.court != null) x += '<button class="btn small secondary" onclick="swapOut(\'' + m.id + '\')">Off court, up next</button>';
      x += '<button class="btn small secondary" onclick="postpone(\'' + m.id + '\', false, true)">Postpone</button>';
    }
    if (isAdmin && played) x += '<button class="btn small danger" onclick="clearScore(\'' + m.id + '\')">Clear score</button>';
    return x;
  };
  const walkoverRow = () => {
    if (!isAdmin || !m.entrant1_id || !m.entrant2_id) return '';
    return '<p class="note" style="margin-top:10px">No-show? Record a walkover win:</p>' +
      '<div class="actions" style="margin-top:4px">' +
      '<button class="btn small secondary" onclick="walkover(\'' + m.id + '\', 1)">W/O · ' + esc(n1) + '</button>' +
      '<button class="btn small secondary" onclick="walkover(\'' + m.id + '\', 2)">W/O · ' + esc(n2) + '</button></div>';
  };

  if (played && !isAdmin){
    h += '<div class="score-line"><label>' + esc(n1) + '</label><span style="font-size:22px;font-weight:800;font-variant-numeric:tabular-nums">' + m.score1 + '</span></div>';
    h += '<div class="score-line"><label>' + esc(n2) + '</label><span style="font-size:22px;font-weight:800;font-variant-numeric:tabular-nums">' + m.score2 + '</span></div>';
    const gs = gamesStr(m);
    if (gs) h += '<p class="note">Games: ' + esc(gs) + '</p>';
    if (m.walkover) h += '<p class="note">Walkover.</p>';
    h += '<p class="note">Score already recorded. Spot a mistake? Ask at the desk and an organizer can fix it.</p>';
    h += '<div class="actions"><span class="spacer"></span><button class="btn secondary" onclick="closeModal()">Close</button></div>';
  } else if (infoOnly){
    h += '<div class="score-line"><label>' + esc(n1) + '</label></div>';
    h += '<div class="score-line"><label>' + esc(n2) + '</label></div>';
    h += '<p class="note">' + (m.postponed ? 'Postponed: waiting lower in the queue.' : 'Waiting for a court.') +
      ' When the match is called, it appears on the Courts tab and the score can be entered. Anything wrong? Ask at the desk.</p>';
    h += '<div class="actions"><span class="spacer"></span><button class="btn secondary" onclick="closeModal()">Close</button></div>';
  } else if (bo > 1){
    h += '<div class="game-line"><span class="glabel"></span><span style="flex:1;font-size:12px;font-weight:700;color:var(--muted);overflow-wrap:anywhere">' + esc(n1) + '</span><span style="flex:1;font-size:12px;font-weight:700;color:var(--muted);overflow-wrap:anywhere;text-align:right">' + esc(n2) + '</span></div>';
    for(let g = 1; g <= bo; g++){
      const pre = played && m.games && m.games[g - 1] ? m.games[g - 1] : null;
      h += '<div class="game-line"><span class="glabel">Game ' + g + '</span>' +
        '<input class="score-in" id="g' + g + 'a" type="number" inputmode="numeric" min="0" value="' + (pre ? pre[0] : '') + '" style="flex:1">' +
        '<input class="score-in" id="g' + g + 'b" type="number" inputmode="numeric" min="0" value="' + (pre ? pre[1] : '') + '" style="flex:1"></div>';
    }
    h += '<div class="err" id="score-err"></div>';
    h += '<p class="note">Fill games in order and leave unplayed games blank. First to ' + (Math.floor(bo / 2) + 1) + ' game wins takes the match.</p>';
    if (!isAdmin) h += '<p class="note">One entry per match: after that, corrections go through the desk.</p>';
    h += '<div class="actions">' + adminExtras() +
      '<span class="spacer"></span><button class="btn secondary" onclick="closeModal()">Cancel</button>' +
      '<button class="btn" onclick="saveScore(\'' + m.id + '\')">' + (isAdmin ? 'Save (admin)' : 'Save score') + '</button></div>';
    h += walkoverRow();
  } else {
    h += '<div class="score-line"><label for="score1">' + esc(n1) + '</label><input class="score-in" id="score1" type="number" inputmode="numeric" min="0" value="' + (played ? m.score1 : '') + '"></div>';
    h += '<div class="score-line"><label for="score2">' + esc(n2) + '</label><input class="score-in" id="score2" type="number" inputmode="numeric" min="0" value="' + (played ? m.score2 : '') + '"></div>';
    h += '<div class="err" id="score-err"></div>';
    if (!isAdmin) h += '<p class="note">Winners report the score. One entry per match: after that, corrections go through the desk.</p>';
    h += '<div class="actions">' + adminExtras() +
      '<span class="spacer"></span><button class="btn secondary" onclick="closeModal()">Cancel</button>' +
      '<button class="btn" onclick="saveScore(\'' + m.id + '\')">' + (isAdmin ? 'Save (admin)' : 'Save score') + '</button></div>';
    h += walkoverRow();
  }
  h += '</div></div>';
  return h;
}

function renderTeamModal(){
  if (!state.teamModalId || state.modalMatchId) return "";
  const e = entrantById(state.teamModalId);
  if (!e) return "";
  const ev = eventById(e.event_id);
  const ms = data.matches
    .filter(m => (m.entrant1_id === e.id || m.entrant2_id === e.id))
    .sort((a, b) => (a.stage === b.stage ? a.play_order - b.play_order : a.stage === "group" ? -1 : 1));
  let w = 0, l = 0;
  ms.forEach(m => {
    if (m.status !== "played" || m.score1 == null) return;
    const mine = m.entrant1_id === e.id ? m.score1 : m.score2;
    const theirs = m.entrant1_id === e.id ? m.score2 : m.score1;
    if (mine > theirs) w++; else l++;
  });

  let h = '<div class="overlay" onclick="if(event.target===this)closeTeam()"><div class="modal" role="dialog" aria-modal="true">';
  h += '<h3>' + esc(e.name) + '</h3>';
  h += '<div class="sub">' + esc(ev ? ev.name : '') + (e.group_name ? ' · Group ' + esc(e.group_name) : '') + ' · ' + w + '-' + l + '</div>';
  h += ms.map(m => {
    const opp = entrantName(m.entrant1_id === e.id ? m.entrant2_id : m.entrant1_id);
    const played = m.status === "played" && m.score1 != null;
    const bye = m.stage === "knockout" && m.status === "played" && m.score1 == null;
    let res;
    if (played){
      const mine = m.entrant1_id === e.id ? m.score1 : m.score2;
      const theirs = m.entrant1_id === e.id ? m.score2 : m.score1;
      const gs = gamesStr(m);
      res = '<span class="tmres ' + (mine > theirs ? 'w' : 'l') + '">' + (mine > theirs ? 'W' : 'L') + ' ' + mine + '-' + theirs +
        (m.walkover ? ' <span class="tmgames">W/O</span>' : '') +
        (gs ? ' <span class="tmgames">(' + esc(gs) + ')</span>' : '') + '</span>';
    } else if (bye){
      res = '<span class="tmres pending">Bye</span>';
    } else if (m.court != null){
      res = '<span class="tmres pending">Court ' + m.court + '</span>';
    } else if (m.postponed){
      res = '<span class="tmres pending">Postponed</span>';
    } else {
      res = '<span class="tmres pending">To play</span>';
    }
    const clickable = !bye && m.entrant1_id && m.entrant2_id;
    const inner = '<span class="tmround">' + esc(roundName(m)) + '</span>' +
      '<span class="tmopp">' + (opp ? 'vs ' + esc(opp) : 'Opponent TBD') + '</span>' + res;
    return clickable
      ? '<button class="tmrow" onclick="openMatch(\'' + m.id + '\')">' + inner + '</button>'
      : '<div class="tmrow">' + inner + '</div>';
  }).join("");
  h += '<div class="actions"><span class="spacer"></span><button class="btn secondary" onclick="closeTeam()">Close</button></div>';
  h += '</div></div>';
  return h;
}

/* Admin: pick a waiting match to drop onto a specific free court. Lists the
   whole cross-event queue so any waiting match can override the auto pool. */
function renderCourtAssignModal(){
  if (state.assignCourt == null) return "";
  const c = state.assignCourt;

  let h = '<div class="overlay" onclick="if(event.target===this)closeCourtAssign()"><div class="modal" role="dialog" aria-modal="true">';

    h += '<p class="note">No match is waiting right now.</p>';
  } else {
    h += '<div class="roundblock" style="padding-top:2px">';
    h += q.slice(0, 40).map((m, i) => {

function collectGames(bo){
  const games = [];
  for(let g = 1; g <= bo; g++){
    const a = document.getElementById("g" + g + "a").value;
    const b = document.getElementById("g" + g + "b").value;
    if (a === "" && b === "") continue;
    games.push([parseInt(a, 10), parseInt(b, 10)]);
  }
  return games;
}
async function saveScore(matchId){
  const m = data.matches.find(x => x.id === matchId);
  const bo = m ? matchBestOf(m) : 1;
  const pts = m ? matchPts(m) : 21;
  const errEl = document.getElementById("score-err");
  let r;
  if (bo > 1){
    const games = collectGames(bo);
    /* Admin scores are free-form, but an off-format score must be
       acknowledged so typos don't slip through as overrides. */
    if (state.adminPin){
      const strict = validateGames(games, pts, false, bo);
      const lenient = validateGames(games, pts, true, bo);
      if (!lenient.error && strict.error && !confirm(strict.error + " Save anyway (admin override)?")) return;
    }
    r = state.adminPin
      ? await store.adminSubmitScore(state.adminPin, matchId, null, null, games, false)
      : await store.submitScore(matchId, null, null, games);
  } else {
    const s1 = parseInt(document.getElementById("score1").value, 10);
    const s2 = parseInt(document.getElementById("score2").value, 10);
    if (state.adminPin){
      const strict = validateScore(s1, s2, pts, false);
      const lenient = validateScore(s1, s2, pts, true);
      if (!lenient && strict && !confirm(strict + " Save anyway (admin override)?")) return;
    }
    r = state.adminPin
      ? await store.adminSubmitScore(state.adminPin, matchId, s1, s2, null, false)
      : await store.submitScore(matchId, s1, s2);
  }
  if (!r.ok){ errEl.textContent = r.error || "Something went wrong."; return; }
  state.modalMatchId = null;
  toast("Score saved");
  await reload();
}
async function walkover(matchId, side){
  const m = data.matches.find(x => x.id === matchId);
  if (!m) return;
  const winner = entrantName(side === 1 ? m.entrant1_id : m.entrant2_id);
  if (!confirm("Record a walkover win for " + winner + "?")) return;
  const bo = matchBestOf(m);
  const pts = bo > 1 ? Math.floor(bo / 2) + 1 : matchPts(m);
  const s1 = side === 1 ? pts : 0, s2 = side === 1 ? 0 : pts;
  const r = await store.adminSubmitScore(state.adminPin, matchId, s1, s2, null, true);
  if (!r.ok){ const errEl = document.getElementById("score-err"); if (errEl) errEl.textContent = r.error; else toast(r.error); return; }

function readEventSettings(ev){
  const num = (id, dflt) => { const el = document.getElementById(id); return el ? (parseInt(el.value, 10) || dflt) : dflt; };
  const ksEl = document.getElementById("adm-ksize");
  const ks = ksEl ? ksEl.value : String(evSetting(ev, "knockout_size", "auto"));
  /* Court override: all (or none) ticked means no restriction (share every
     court); a subset limits the event to those courts. Preserve the saved
     value when the checkboxes aren't on screen. */
  const courtBoxes = Array.from(document.querySelectorAll(".adm-court"));
  let courts;
  if (!courtBoxes.length){
    courts = Array.isArray(ev.settings && ev.settings.courts) ? ev.settings.courts : [];
  } else {
    const picked = courtBoxes.filter(b => b.checked).map(b => parseInt(b.value, 10));
    courts = (picked.length === 0 || picked.length >= courtsCount()) ? [] : picked.sort((a, b) => a - b);
  }
  return Object.assign({}, ev.settings, {
    points_to_group: Math.max(1, num("adm-ptg", evSetting(ev, "points_to_group", 21))),
    points_to_knockout: Math.max(1, num("adm-ptk", evSetting(ev, "points_to_knockout", 21))),
    best_of_group: num("adm-bog", evSetting(ev, "best_of_group", 1)),
    best_of_knockout: num("adm-bok", evSetting(ev, "best_of_knockout", 1)),
    knockout_size: ks === "auto" ? "auto" : parseInt(ks, 10),
    advance_per_group: Math.max(1, num("adm-adv", evSetting(ev, "advance_per_group", 2))),
    group_size: Math.max(3, num("adm-gsize", evSetting(ev, "group_size", 6))),
    courts: courts
  });
}

function normalizePhone(s){
  s = s.trim().replace(/[\s()-]/g, "");
  if (/^0[17]\d{8}$/.test(s)) return "+254" + s.slice(1);
  if (/^254\d{9}$/.test(s)) return "+" + s;
  if (/^\+\d{10,14}$/.test(s)) return s;
  return null;
}
async function editContacts(id){
  const e = entrantById(id);
  if (!e) return;
  const cur = (state.contacts[id] || []).join(", ");
  const raw = prompt('Phone number(s) for "' + e.name + '", comma separated (07... or +254...). Leave empty to remove.', cur);
  if (raw == null) return;
  const parts = raw.split(",").map(s => s.trim()).filter(Boolean);
  const phones = [];
  for(const p of parts){
    const n = normalizePhone(p);
    if (!n){ toast('"' + p + '" does not look like a phone number.'); return; }
    phones.push(n);
  }
  const r = await store.adminSetContacts(state.adminPin, id, phones);
  if (!r.ok){ toast(r.error); return; }

async function addTeamToGroup(){
  const ev = eventById(state.adminEventId);
  if (!ev) return;
  const name = document.getElementById("add-team-name").value.trim();
  const group = document.getElementById("add-team-group").value;
  if (!name){ toast("Type a name first."); return; }
  if (data.entrants.some(e => e.event_id === ev.id && e.name === name)){ toast("That name is already entered."); return; }
  const members = data.entrants.filter(e => e.event_id === ev.id && e.group_name === group);
  const maxSeed = Math.max(0, ...members.map(e => e.seed || 0));
  const entrant = { id: uid(), event_id: ev.id, name, group_name: group, seed: maxSeed + 1 };
  const groupMs = data.matches.filter(m => m.event_id === ev.id && m.stage === "group" && m.group_name === group);
  const startRound = Math.max(0, ...groupMs.map(m => m.round || 0)) + 1;
  const maxOrder = Math.max(0, ...data.matches.filter(m => m.event_id === ev.id).map(m => m.play_order || 0));
  const matches = buildCatchupMatches(ev.id, group, entrant.id, members.map(e => e.id), startRound, maxOrder);
  const r = await store.adminAddEntrant(state.adminPin, ev.id, entrant, matches);
  if (!r.ok){ toast(r.error); return; }
  toast(name + " added to Group " + group);
  await reload();

function parseTeamsInput(){
  return document.getElementById("adm-teams").value
    .split("\n").map(s => s.trim()).filter(Boolean);
}
function setupSummary(names, s){
  const sizes = groupSizes(names.length, s.group_size);
  const groups = sizes.length;
  const matchCount = sizes.reduce((sum, n) => sum + n * (n - 1) / 2, 0);
  let lines = names.length + " entrants into " + groups + " groups (" + sizes.join(", ") + ")\n" +
    matchCount + " group matches";
  if (s.knockout_size === "auto"){
    const base = groups * s.advance_per_group;
    const size = nextPow2(Math.max(2, base));
    lines += "\nTop " + s.advance_per_group + " per group = " + base + " qualifiers; bracket of " + size +
      (size > base ? " adds " + (size - base) + " best next-placed" : "");
  } else {
    const size = s.knockout_size;
    const full = Math.floor(size / groups);
    const fill = size - full * groups;
    lines += "\nKnockout of " + size + ": top " + full + " per group" + (fill ? " plus " + fill + " best " + ordinal(full + 1) + "-placed" : "");
  }
  return lines;
}
function previewSetup(){
  const ev = eventById(state.adminEventId);
  if (!ev) return;

  state.setupPreview = setupSummary(names, readEventSettings(ev));

async function applySetup(){
  const ev = eventById(state.adminEventId);
  if (!ev) return;
  const names = parseTeamsInput();
  if (names.length < 4){ state.setupPreview = "Paste at least 4 entrants first."; render(); return; }
  const dupes = names.filter((n, i) => names.indexOf(n) !== i);
  if (dupes.length){ state.setupPreview = "Duplicate entries: " + [...new Set(dupes)].join(", "); render(); return; }
  const hasMatches = data.matches.some(m => m.event_id === ev.id);
  const msg = hasMatches
    ? 'Draw new groups for "' + ev.name + '" with ' + names.length + ' entrants? This wipes its current groups, matches, and scores, and pauses it.'
    : 'Draw groups for "' + ev.name + '" with ' + names.length + ' entrants?';
  if (!confirm(msg)) return;
  const settings = readEventSettings(ev);
  const shuffle = document.getElementById("adm-shuffle").checked;
  const rand = shuffle ? mulberry32(Math.floor(performance.now() * 1000) % 2147483647 + 1) : null;
  const groups = makeGroups(names, settings.group_size, rand);
  const entrants = [];
  groups.forEach(g => g.members.forEach((name, i) =>
    entrants.push({ id: uid(), event_id: ev.id, name, group_name: g.name, seed: i + 1 })));
  const idsByGroup = g => entrants.filter(e => e.group_name === g).map(e => e.id);
  const matches = buildEventMatches(ev.id, groups.map(g => ({ name: g.name, entrantIds: idsByGroup(g.name) })), 0);
  const r = await store.adminReplaceEvent(state.adminPin, ev.id, { name: ev.name, sort_order: ev.sort_order, settings }, entrants, matches);
  if (!r.ok){ toast(r.error); return; }
  state.setupPreview = null;
  state.showRedraw = false;
  toast("Groups drawn. Pick courts and start when ready.");
  await reload();
}
async function confirmGroupStage(){
  const ev = eventById(state.adminEventId);
  if (!ev) return;
  const groups = groupsOfEvent(ev);
  if (!groups.length){ toast("This event has no groups yet."); return; }
  const left = data.matches.filter(m => m.event_id === ev.id && m.stage === "group" && m.status === "scheduled").length;
  const hadKo = data.matches.some(m => m.event_id === ev.id && m.stage === "knockout");
  const msg = (left ? left + " group matches are still unplayed. " : "") +
    (hadKo ? "Rebuild the bracket from current standings? Knockout scores are wiped." :
      "Confirm the group stage is finished and create the knockout bracket?");
  if (!confirm(msg)) return;
  const field = seedFieldFor(ev);
  if (field.seeds.length < 2){ toast("Not enough qualifiers yet."); return; }
  const maxOrder = Math.max(0, ...data.matches.filter(m => m.event_id === ev.id).map(m => m.play_order || 0));
  const rows = buildBracket(ev.id, field.seeds, maxOrder);
  const r = await store.adminGenerateBracket(state.adminPin, ev.id, rows);
  if (!r.ok){ toast(r.error); return; }
  toast("Bracket created");
  state.view = "bracket"; state.eventId = ev.id; state.bkCentered = false;
  await reload();
}
async function resetBracket(){
  const ev = eventById(state.adminEventId);
  if (!ev) return;
  if (!confirm("Remove the knockout bracket and its scores for this event?")) return;
  const r = await store.adminResetBracket(state.adminPin, ev.id);
  if (!r.ok){ toast(r.error); return; }
  toast("Back to group stage");
  await reload();
}
function csvCell(v){
  v = String(v == null ? "" : v);
  return /[",\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v;
}
/* Results export: one row per played match, team names split into players,
   per-game score column pairs. Copies cleanly into DUPR's club CSV template. */
function downloadResults(allEvents){
  const evs = allEvents
    ? data.events.slice().sort((a, b) => a.sort_order - b.sort_order)
    : [eventById(state.adminEventId)].filter(Boolean);
  const played = [];
  evs.forEach(ev => {
    data.matches
      .filter(m => m.event_id === ev.id && m.status === "played" && m.score1 != null)
      .sort((a, b) => (a.stage === b.stage ? a.play_order - b.play_order : a.stage === "group" ? -1 : 1))
      .forEach(m => played.push([ev, m]));
  });
  if (!played.length){ toast("No played matches to export yet."); return; }
  const maxGames = Math.max(1, ...played.map(([, m]) => Array.isArray(m.games) ? m.games.length : 1));
  const head = ["Event", "Stage", "Date", "Format",
    "Team 1 Player A", "Team 1 Player B", "Team 2 Player A", "Team 2 Player B"];
  for(let g = 1; g <= maxGames; g++) head.push("Game " + g + " Team 1", "Game " + g + " Team 2");
  head.push("Winner", "Notes");
  const lines = [head.map(csvCell).join(",")];
  played.forEach(([ev, m]) => {
    const split = id => {
      const parts = (entrantName(id) || "").split(" & ");
      return [parts[0] || "", parts[1] || ""];
    };
    const [a1, a2] = split(m.entrant1_id), [b1, b2] = split(m.entrant2_id);
    const d = m.updated_at ? new Date(m.updated_at) : null;
    const date = d && !isNaN(d) ? (d.getMonth() + 1) + "/" + d.getDate() + "/" + d.getFullYear() : "";
    const row = [ev.name, m.stage === "group" ? "Group " + (m.group_name || "") : koLabel(m), date,
      a2 || b2 ? "Doubles" : "Singles", a1, a2, b1, b2];
    const games = Array.isArray(m.games) && m.games.length ? m.games : [[m.score1, m.score2]];
    for(let g = 0; g < maxGames; g++) row.push(games[g] ? games[g][0] : "", games[g] ? games[g][1] : "");
    row.push(entrantName(m.score1 > m.score2 ? m.entrant1_id : m.entrant2_id) || "", m.walkover ? "Walkover" : "");
    lines.push(row.map(csvCell).join(","));
  });
  const blob = new Blob(["﻿" + lines.join("\r\n")], { type: "text/csv;charset=utf-8" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = (allEvents ? "nairobi-open-results-all" : "nairobi-open-results-" +
    (evs[0] ? evs[0].name.toLowerCase().replace(/[^a-z0-9]+/g, "-") : "event")) + ".csv";
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 500);
  toast("CSV downloaded: " + (lines.length - 1) + " matches");
}
async function doChangePin(){
  const oldPin = document.getElementById("adm-oldpin").value.trim();
  const newPin = document.getElementById("adm-newpin").value.trim();
  if (newPin.length < 4){ toast("New PIN needs at least 4 characters."); return; }
  const r = await store.changePin(oldPin, newPin);
  if (!r.ok){ toast(r.error); return; }
  state.adminPin = newPin;
  safeSession("pb_admin_pin", newPin);
  toast("PIN changed");
}

/* ---------- init ---------- */
(async function init(){
  state.dismissedCalled = loadDismissedCalled();
  const savedPin = safeSession("pb_admin_pin");
  if (savedPin){
    const r = await store.verifyPin(savedPin).catch(() => ({ ok: false }));
    if (r.ok) state.adminPin = savedPin; else safeSession("pb_admin_pin", null);
  }
  store.subscribe(reload);
  await reload();
  /* Refresh so "go to court" banners expire on time, without stomping on forms. */
  setInterval(() => {
    const ae = document.activeElement;
    const typing = ae && /^(INPUT|TEXTAREA|SELECT)$/.test(ae.tagName);
    if (!document.hidden && !typing && !state.modalMatchId && !state.slotEditId && !state.teamModalId && state.view !== "admin") render();
  }, 45000);
  window.__APP_READY = true;
})();
</script>
