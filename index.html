<script>
/* ================= STORES =================
   Both stores expose the same interface, so the UI never needs to know
   whether it is talking to sample data or to Supabase. */

function demoStore(){
  const db = buildMockData();
  const PIN = "0727";
  const subs = [];
  const notify = () => subs.forEach(f => { try{ f(); }catch(e){} });
  const ok = () => ({ ok: true });
  const fail = msg => ({ ok: false, error: msg });
  const findMatch = id => db.matches.find(m => m.id === id);
  const eventOf = m => db.events.find(e => e.id === m.event_id);
  const settingFor = (m, base) => {
    const ev = eventOf(m);
    const key = base + (m.stage === "knockout" ? "_knockout" : "_group");
    return (ev && ev.settings && ev.settings[key]) || (base === "points_to" ? 21 : 1);
  };
  const checkPin = pin => pin === PIN;
  const courtsConflict = (eventId, courts) => {
    for(const other of db.events){
      if (other.id === eventId || !other.active) continue;
      const overlap = ((other.settings && other.settings.courts) || []).filter(c => courts.includes(c));
      if (overlap.length) return "Court " + overlap.join(", ") + " is already used by " + other.name + ".";
    }
    return null;
  };

  function advanceWinner(m){
    if (!m.next_match_id || m.status !== "played") return;
    const w = m.score1 > m.score2 ? m.entrant1_id : m.entrant2_id;
    const nm = findMatch(m.next_match_id);
    if (nm && nm.status === "scheduled"){
      if (m.next_slot === 1) nm.entrant1_id = w; else nm.entrant2_id = w;
    }
  }

  function applyScore(m, s1, s2, games, isAdmin, walkover){
    const pts = settingFor(m, "points_to");
    const bo = settingFor(m, "best_of");
    if (walkover){
      m.score1 = s1; m.score2 = s2; m.games = null;
    } else if (bo > 1){
      const v = validateGames(games || [], pts, isAdmin, bo);
      if (v.error) return v.error;
      m.score1 = v.w1; m.score2 = v.w2; m.games = games;
    } else {
      const err = validateScore(s1, s2, pts, isAdmin);
      if (err) return err;
      m.score1 = s1; m.score2 = s2; m.games = null;
    }
    m.status = "played"; m.postponed = false; m.court = null;
    m.walkover = !!walkover;
    return null;
  }

  return {
    mode: "demo",
    subscribe(f){ subs.push(f); },
    async loadAll(){ return JSON.parse(JSON.stringify(db)); },
    async verifyPin(pin){ return checkPin(pin) ? ok() : fail("Wrong PIN."); },
    async changePin(){ return fail("PIN changes only work on the live site."); },
    async submitScore(matchId, s1, s2, games){
      const m = findMatch(matchId);
      if (!m) return fail("Match not found.");
      if (m.status === "played") return fail("A score is already in. Ask the desk to change it.");
      if (!m.entrant1_id || !m.entrant2_id) return fail("Teams for this match aren't decided yet.");
      if (m.court == null) return fail("This match isn't on a court yet. The score is entered from the Courts tab once it's called; corrections go through the desk.");
      const err = applyScore(m, s1, s2, games, false, false);
      if (err) return fail(err);
      advanceWinner(m);
      assignCourtsIn(db, m.event_id);
      notify(); return ok();
    },
    async adminSubmitScore(pin, matchId, s1, s2, games, walkover){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      const m = findMatch(matchId);
      if (!m) return fail("Match not found.");
      if (!m.entrant1_id || !m.entrant2_id) return fail("Teams for this match aren't decided yet.");
      const bo = settingFor(m, "best_of");
      let newW;
      if (walkover){
        if (!Number.isInteger(s1) || !Number.isInteger(s2) || s1 === s2) return fail("Bad walkover score.");
        newW = s1 > s2 ? m.entrant1_id : m.entrant2_id;
      } else if (bo > 1){
        const v = validateGames(games || [], settingFor(m, "points_to"), true, bo);
        if (v.error) return fail(v.error);
        newW = v.w1 > v.w2 ? m.entrant1_id : m.entrant2_id;
      } else {
        const err = validateScore(s1, s2, settingFor(m, "points_to"), true);
        if (err) return fail(err);
        newW = s1 > s2 ? m.entrant1_id : m.entrant2_id;
      }
      if (m.next_match_id){
        const nm = findMatch(m.next_match_id);
        const oldW = m.status === "played" ? (m.score1 > m.score2 ? m.entrant1_id : m.entrant2_id) : null;
        if (nm && nm.status === "played" && oldW !== newW)
          return fail("The next round already has a score. Clear it first.");
      }
      applyScore(m, s1, s2, games, true, walkover);
      if (m.next_match_id){
        const nm = findMatch(m.next_match_id);
        if (nm && nm.status === "scheduled"){
          if (m.next_slot === 1) nm.entrant1_id = newW; else nm.entrant2_id = newW;
        }
      }
      assignCourtsIn(db, m.event_id);
      notify(); return ok();
    },
    async adminClearScore(pin, matchId){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      const m = findMatch(matchId);
      if (!m) return fail("Match not found.");
      if (m.next_match_id){
        const nm = findMatch(m.next_match_id);
        if (nm && nm.status === "played") return fail("The next round already has a score. Clear it first.");
        if (nm){
          if (m.next_slot === 1) nm.entrant1_id = null; else nm.entrant2_id = null;
        }
      }
      m.score1 = null; m.score2 = null; m.games = null; m.walkover = false;
      m.status = "scheduled"; m.court = null;
      assignCourtsIn(db, m.event_id);
      notify(); return ok();
    },
    async adminPostpone(pin, matchId, toEnd){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      const m = findMatch(matchId);
      if (!m) return fail("Match not found.");
      if (m.status !== "scheduled") return fail("That match already has a score.");
      const pending = db.matches
        .filter(x => x.event_id === m.event_id && x.status === "scheduled" && x.id !== m.id)
        .sort((a, b) => a.play_order - b.play_order);
      if (toEnd || pending.length <= 8){
        m.play_order = (pending.length ? pending[pending.length - 1].play_order : m.play_order) + 10;
      } else {
        const after = pending.filter(x => x.play_order > m.play_order);
        const anchor = after[7] || after[after.length - 1];
        if (anchor) m.play_order = anchor.play_order + 1;
      }
      m.postponed = true; m.court = null;
      assignCourtsIn(db, m.event_id);
      notify(); return ok();
    },
    async adminPlayNext(pin, matchId){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      const m = findMatch(matchId);
      if (!m) return fail("Match not found.");
      if (m.status !== "scheduled") return fail("That match already has a score.");
      const pending = db.matches.filter(x => x.event_id === m.event_id && x.status === "scheduled" && x.id !== m.id);
      m.play_order = (pending.length ? Math.min(...pending.map(x => x.play_order)) : m.play_order) - 1;
      m.postponed = false;
      assignCourtsIn(db, m.event_id);
      notify(); return ok();
    },
    async adminAckCalled(pin, matchId){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      const m = findMatch(matchId);
      if (!m) return fail("Match not found.");
      m.called_ack = true;
      notify(); return ok();
    },
    async adminUpdateEvent(pin, eventId, name, settings){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      const ev = db.events.find(e => e.id === eventId);
      if (!ev) return fail("Event not found.");
      if (ev.active){
        const conflict = courtsConflict(eventId, (settings && settings.courts) || []);
        if (conflict) return fail(conflict);
      }
      ev.name = name; ev.settings = settings;
      assignCourtsIn(db, eventId);
      notify(); return ok();
    },
    async adminSetActive(pin, eventId, active){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      const ev = db.events.find(e => e.id === eventId);
      if (!ev) return fail("Event not found.");
      if (active){
        if (!db.matches.some(m => m.event_id === eventId)) return fail("Draw groups first, then start the event.");
        const courts = (ev.settings && ev.settings.courts) || [];
        if (!courts.length) return fail("Pick at least one court, save, then start.");
        const conflict = courtsConflict(eventId, courts);
        if (conflict) return fail(conflict);
      }
      ev.active = active;
      assignCourtsIn(db, eventId);
      notify(); return ok();
    },
    async adminReplaceEvent(pin, eventId, meta, entrants, matches){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      let ev = eventId ? db.events.find(e => e.id === eventId) : null;
      if (!ev){
        ev = { id: uid(), tournament_id: db.tournament.id, name: meta.name, sort_order: db.events.length,
          stage: "group", active: false, settings: meta.settings };
        db.events.push(ev);
      } else {
        ev.name = meta.name; ev.settings = meta.settings; ev.stage = "group"; ev.active = false;
      }
      db.entrants = db.entrants.filter(e => e.event_id !== ev.id);
      db.matches = db.matches.filter(m => m.event_id !== ev.id);
      entrants.forEach(e => db.entrants.push(Object.assign({}, e, { event_id: ev.id })));
      matches.forEach(m => db.matches.push(Object.assign({}, m, { event_id: ev.id, court: null })));
      notify(); return { ok: true, eventId: ev.id };
    },
    async adminDeleteEvent(pin, eventId){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      db.events = db.events.filter(e => e.id !== eventId);
      db.entrants = db.entrants.filter(e => e.event_id !== eventId);
      db.matches = db.matches.filter(m => m.event_id !== eventId);
      notify(); return ok();
    },
    async adminRenameEntrant(pin, entrantId, name){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      const e = db.entrants.find(x => x.id === entrantId);
      if (!e) return fail("Team not found.");
      e.name = name;
      notify(); return ok();
    },
    async adminRemoveEntrant(pin, entrantId){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      const e = db.entrants.find(x => x.id === entrantId);
      if (!e) return fail("Team not found.");
      if (db.matches.some(m => m.stage === "knockout" && (m.entrant1_id === entrantId || m.entrant2_id === entrantId)))
        return fail("They're in the knockout bracket. Edit the bracket or reset it first.");
      db.matches = db.matches.filter(m => !(m.entrant1_id === entrantId || m.entrant2_id === entrantId));
      db.entrants = db.entrants.filter(x => x.id !== entrantId);
      assignCourtsIn(db, e.event_id);
      notify(); return ok();
    },
    async adminAddEntrant(pin, eventId, entrant, matches){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      if (!db.events.some(e => e.id === eventId)) return fail("Event not found.");
      db.entrants.push(Object.assign({}, entrant, { event_id: eventId }));
      matches.forEach(m => db.matches.push(Object.assign({}, m, { event_id: eventId, court: null })));
      assignCourtsIn(db, eventId);
      notify(); return ok();
    },
    async adminMoveEntrant(pin, entrantId, newGroup, matches){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      const e = db.entrants.find(x => x.id === entrantId);
      if (!e) return fail("Team not found.");
      if (db.matches.some(m => m.stage === "knockout" && (m.entrant1_id === entrantId || m.entrant2_id === entrantId)))
        return fail("They're in the knockout bracket. Edit the bracket or reset it first.");
      db.matches = db.matches.filter(m => !(m.stage === "group" && (m.entrant1_id === entrantId || m.entrant2_id === entrantId)));
      e.group_name = newGroup;
      matches.forEach(m => db.matches.push(Object.assign({}, m, { event_id: e.event_id, court: null })));
      assignCourtsIn(db, e.event_id);
      notify(); return ok();
    },
    async adminSetBracketTeams(pin, matchId, e1, e2){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      const m = findMatch(matchId);
      if (!m) return fail("Match not found.");
      if (m.stage !== "knockout") return fail("Only knockout matches can be edited here.");
      if (m.status === "played") return fail("This match already has a score. Clear it first.");
      m.entrant1_id = e1 || null; m.entrant2_id = e2 || null;
      assignCourtsIn(db, m.event_id);
      notify(); return ok();
    },
    async adminGenerateBracket(pin, eventId, rows){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      const ev = db.events.find(e => e.id === eventId);
      if (!ev) return fail("Event not found.");
      db.matches = db.matches.filter(m => !(m.event_id === eventId && m.stage === "knockout"));
      rows.forEach(m => db.matches.push(Object.assign({}, m, { event_id: eventId })));
      ev.stage = "knockout";
      assignCourtsIn(db, eventId);
      notify(); return ok();
    },
    async adminResetBracket(pin, eventId){
      if (!checkPin(pin)) return fail("Wrong PIN.");
      const ev = db.events.find(e => e.id === eventId);
      if (!ev) return fail("Event not found.");
      db.matches = db.matches.filter(m => !(m.event_id === eventId && m.stage === "knockout"));
      ev.stage = "group";
      assignCourtsIn(db, eventId);
      notify(); return ok();
    }
  };
}

function liveStore(){
  let client = null;
  const subs = [];
  const notify = () => subs.forEach(f => { try{ f(); }catch(e){} });
  let debounceT = null;
  const debouncedNotify = () => { clearTimeout(debounceT); debounceT = setTimeout(notify, 400); };

  function loadScript(src){
    return new Promise((res, rej) => {
      const s = document.createElement("script");
      s.src = src; s.onload = res; s.onerror = () => rej(new Error("Could not load " + src));
      document.head.appendChild(s);
    });
  }

  async function ensureClient(){
    if (client) return client;
    await loadScript("https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js");
    client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    /* Subscribe per table: the shared project also holds the Dispatch app's
       tables, and their changes shouldn't trigger reloads here. */
    client.channel("nairobi-db-changes")
      .on("postgres_changes", { event: "*", schema: "public", table: "nairobi_tournaments" }, debouncedNotify)
      .on("postgres_changes", { event: "*", schema: "public", table: "nairobi_events" }, debouncedNotify)
      .on("postgres_changes", { event: "*", schema: "public", table: "nairobi_entrants" }, debouncedNotify)
      .on("postgres_changes", { event: "*", schema: "public", table: "nairobi_matches" }, debouncedNotify)
      .subscribe();
    setInterval(() => { if (document.visibilityState === "visible") notify(); }, 180000);
    document.addEventListener("visibilitychange", () => { if (document.visibilityState === "visible") notify(); });
    return client;
  }

  const rpc = async (fn, args) => {
    try{
      const c = await ensureClient();
      const { data, error } = await c.rpc(fn, args);
      if (error) return { ok: false, error: error.message };
      if (typeof data === "string" && data !== "OK" && !data.startsWith("OK")) return { ok: false, error: data };
      return { ok: true, data };
    }catch(e){ return { ok: false, error: e.message || "Network error." }; }
  };

  return {
    mode: "live",
    subscribe(f){ subs.push(f); },
    async loadAll(){
      const c = await ensureClient();
      const [t, ev, en, ma] = await Promise.all([
        c.from("nairobi_tournaments").select("*").limit(1),
        c.from("nairobi_events").select("*").order("sort_order"),
        c.from("nairobi_entrants").select("*").order("group_name").order("seed"),
        c.from("nairobi_matches").select("*").order("play_order")
      ]);
      const err = t.error || ev.error || en.error || ma.error;
      if (err) throw new Error(err.message);
      return { tournament: (t.data && t.data[0]) || null, events: ev.data || [], entrants: en.data || [], matches: ma.data || [] };
    },
    verifyPin: pin => rpc("nairobi_verify_pin", { p_pin: pin }).then(r =>
      r.ok && r.data === true ? { ok: true } : { ok: false, error: r.error || "Wrong PIN." }),
    changePin: (oldPin, newPin) => rpc("nairobi_change_admin_pin", { p_old: oldPin, p_new: newPin }),
    submitScore: (id, s1, s2, games) => rpc("nairobi_submit_score", { p_match_id: id, p_score1: s1, p_score2: s2, p_games: games || null }),
    adminSubmitScore: (pin, id, s1, s2, games, walkover) => rpc("nairobi_admin_submit_score", { p_pin: pin, p_match_id: id, p_score1: s1, p_score2: s2, p_games: games || null, p_walkover: !!walkover }),
    adminClearScore: (pin, id) => rpc("nairobi_admin_clear_score", { p_pin: pin, p_match_id: id }),
    adminPostpone: (pin, id, toEnd) => rpc("nairobi_admin_postpone", { p_pin: pin, p_match_id: id, p_to_end: !!toEnd }),
    adminPlayNext: (pin, id) => rpc("nairobi_admin_play_next", { p_pin: pin, p_match_id: id }),
    adminAckCalled: (pin, id) => rpc("nairobi_admin_ack_called", { p_pin: pin, p_match_id: id }),
    adminUpdateEvent: (pin, eventId, name, settings) => rpc("nairobi_admin_update_event", { p_pin: pin, p_event_id: eventId, p_name: name, p_settings: settings }),
    adminSetActive: (pin, eventId, active) => rpc("nairobi_admin_set_active", { p_pin: pin, p_event_id: eventId, p_active: !!active }),
    adminReplaceEvent: async (pin, eventId, meta, entrants, matches) => {
      const r = await rpc("nairobi_admin_replace_event", {
        p_pin: pin, p_event_id: eventId, p_name: meta.name,
        p_sort_order: meta.sort_order != null ? meta.sort_order : 0,
        p_settings: meta.settings, p_entrants: entrants, p_matches: matches
      });
      if (r.ok && typeof r.data === "string" && r.data.startsWith("OK:")) r.eventId = r.data.slice(3);
      return r;
    },
    adminDeleteEvent: (pin, eventId) => rpc("nairobi_admin_delete_event", { p_pin: pin, p_event_id: eventId }),
    adminRenameEntrant: (pin, id, name) => rpc("nairobi_admin_rename_entrant", { p_pin: pin, p_entrant_id: id, p_name: name }),
    adminRemoveEntrant: (pin, id) => rpc("nairobi_admin_remove_entrant", { p_pin: pin, p_entrant_id: id }),
    adminAddEntrant: (pin, eventId, entrant, matches) => rpc("nairobi_admin_add_entrant", { p_pin: pin, p_event_id: eventId, p_entrant: entrant, p_matches: matches }),
    adminMoveEntrant: (pin, id, group, matches) => rpc("nairobi_admin_move_entrant", { p_pin: pin, p_entrant_id: id, p_group: group, p_matches: matches }),
    adminSetBracketTeams: (pin, matchId, e1, e2) => rpc("nairobi_admin_set_bracket_teams", { p_pin: pin, p_match_id: matchId, p_entrant1_id: e1 || null, p_entrant2_id: e2 || null }),
    adminGenerateBracket: (pin, eventId, rows) => rpc("nairobi_admin_generate_bracket", { p_pin: pin, p_event_id: eventId, p_matches: rows }),
    adminResetBracket: (pin, eventId) => rpc("nairobi_admin_reset_bracket", { p_pin: pin, p_event_id: eventId })
  };
}
</script>

<script>
/* ================= UI ================= */
window.__APP_ERRORS = [];
window.addEventListener("error", e => window.__APP_ERRORS.push(String(e.message)));

const store = (SUPABASE_URL && SUPABASE_ANON_KEY && !new URLSearchParams(location.search).has("demo"))
  ? liveStore() : demoStore();
let data = { tournament: null, events: [], entrants: [], matches: [] };
const state = {
  view: "board", eventId: null, search: "", roundFilter: "all",
  resultsFilter: "all", standingsFilter: "all",
  adminPin: null, modalMatchId: null, teamModalId: null, slotEditId: null,
  setupPreview: null, adminEventId: null, loadError: null,
  showAllQueue: false, showRedraw: false, pendingRender: false,
  dismissedCalled: {}
};

function esc(s){
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}
function safeSession(key, val){
  try{
    if (val === undefined) return window.sessionStorage.getItem(key);
    if (val === null) window.sessionStorage.removeItem(key);
    else window.sessionStorage.setItem(key, val);
  }catch(e){ return null; }
}
function toast(msg){
  const t = document.createElement("div");
  t.className = "toast"; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = "0"; t.style.transition = "opacity .3s"; }, 1600);
  setTimeout(() => t.remove(), 2000);
}

/* ---------- data helpers ---------- */
const entrantById = id => data.entrants.find(e => e.id === id);
const entrantName = id => { const e = entrantById(id); return e ? e.name : null; };
const eventById = id => data.events.find(e => e.id === id);
const activeEvents = () => data.events.filter(e => e.active).sort((a, b) => a.sort_order - b.sort_order);
const courtsCount = () => (data.tournament && data.tournament.settings && data.tournament.settings.courts) || 4;
const evSetting = (ev, key, dflt) => (ev && ev.settings && ev.settings[key] != null) ? ev.settings[key] : dflt;
const matchPts = m => {
  const ev = eventById(m.event_id);
  return evSetting(ev, m.stage === "knockout" ? "points_to_knockout" : "points_to_group", 21);
};
const matchBestOf = m => {
  const ev = eventById(m.event_id);
  return parseInt(evSetting(ev, m.stage === "knockout" ? "best_of_knockout" : "best_of_group", 1), 10) || 1;
};
function currentEvent(){
  if (state.eventId && eventById(state.eventId)) return eventById(state.eventId);
  const act = activeEvents();
  return act[0] || data.events[0] || null;
}
function groupsOfEvent(ev){
  if (!ev) return [];
  const names = [...new Set(data.entrants.filter(e => e.event_id === ev.id && e.group_name).map(e => e.group_name))];
  names.sort();
  return names;
}
function standingsFor(ev, gname){
  const ents = data.entrants.filter(e => e.event_id === ev.id && e.group_name === gname);
  const ms = data.matches.filter(m => m.event_id === ev.id && m.stage === "group" && m.group_name === gname);
  return computeStandings(ents, ms);
}
function seedFieldFor(ev){
  const groups = groupsOfEvent(ev);
  const gs = groups.map(g => ({ group: g, rows: standingsFor(ev, g) }));
  const ks = evSetting(ev, "knockout_size", "auto");
  const override = (ks === "auto" || !ks) ? null : parseInt(ks, 10);
  return seedField(gs, evSetting(ev, "advance_per_group", 2), override);
}
function koLabel(m){
  const ko = data.matches.filter(x => x.event_id === m.event_id && x.stage === "knockout");
  const total = Math.max(0, ...ko.map(x => x.bracket_round || 0));
  return roundLabelFor(m.bracket_round, total);
}
function roundName(m){ return m.stage === "knockout" ? koLabel(m) : "Round " + m.round; }
function gamesStr(m){
  if (Array.isArray(m.games) && m.games.length) return m.games.map(g => g[0] + "-" + g[1]).join(", ");
  return null;
}
function onCourtMatches(){
  return data.matches
    .filter(m => m.status === "scheduled" && m.court != null && m.entrant1_id && m.entrant2_id)
    .filter(m => { const ev = eventById(m.event_id); return ev && ev.active; })
    .sort((a, b) => a.court - b.court);
}
function pendingQueue(){
  const lists = activeEvents().map(ev => data.matches
    .filter(m => m.event_id === ev.id && m.status === "scheduled" && m.court == null && m.entrant1_id && m.entrant2_id)
    .sort((a, b) => a.play_order - b.play_order));
  return weaveQueues(lists);
}
function calledMatches(){
  const now = Date.now();
  return onCourtMatches().filter(m =>
    m.called_at && !m.called_ack && (now - Date.parse(m.called_at)) < CALLED_FRESH_MS &&
    !state.dismissedCalled[m.id + "|" + m.called_at]);
}

/* ---------- rendering ---------- */
/* Only touch the DOM when the generated markup actually changed. Periodic and
   realtime refreshes with no visible difference then leave the page alone, so
   taps never land on elements that were just replaced mid-gesture. */
let renderedHtml = null;
function commitHtml(app, html){
  if (html === renderedHtml) return false;
  app.innerHTML = html;
  renderedHtml = html;
  return true;
}
function render(){
  const app = document.getElementById("app");
  const ae = document.activeElement;
  const typingInForm = ae && app.contains(ae) && /^(INPUT|TEXTAREA|SELECT)$/.test(ae.tagName) && ae.id !== "pin-input" && ae.id !== "search-input";
  if (typingInForm && (state.view === "admin" || state.modalMatchId || state.slotEditId)){
    state.pendingRender = true;
    return;
  }
  const restoreId = ae && ae.id;
  const restoreVal = restoreId && ae.value;

  if (state.loadError){
    commitHtml(app, '<div class="wrap"><div class="empty">Could not load tournament data.<br>' + esc(state.loadError) + '<br><br><button class="btn secondary" onclick="location.reload()">Retry</button></div></div>');
    return;
  }
  if (!data.tournament){
    commitHtml(app, '<div class="wrap"><div class="empty">Loading…</div></div>');
    return;
  }

  const tabs = [
    ["board", "Courts"], ["schedule", "Schedule"], ["results", "Results"],
    ["standings", "Standings"], ["bracket", "Bracket"], ["admin", "Admin"]
  ];
  let html = '<div class="topbar">';
  if (store.mode === "demo") html += '<div class="demo-banner">Demo with sample data. Changes reset on refresh. Admin PIN: 0727</div>';
  html += '<div class="masthead"><div class="wordmark">' + esc(data.tournament.name) + '</div>' +
    '<div class="stagechip">' + courtsCount() + ' courts</div></div>';
  html += '<nav class="tabs">' + tabs.map(([id, label]) =>
    '<button class="tab" aria-current="' + (state.view === id) + '" onclick="setView(\'' + id + '\')">' + label + '</button>'
  ).join("") + '</nav>';
  html += renderCallouts();
  html += '</div>';

  html += '<main class="wrap">';
  if (["schedule", "results", "standings", "bracket"].includes(state.view) && data.events.length > 1){
    html += renderEventPicker();
  }
  if (state.view === "board") html += renderBoard();
  else if (state.view === "schedule") html += renderSchedule();
  else if (state.view === "results") html += renderResults();
  else if (state.view === "standings") html += renderStandings();
  else if (state.view === "bracket") html += renderBracket();
  else if (state.view === "admin") html += renderAdmin();
  html += '</main>';

  html += renderScoreModal();
  html += renderTeamModal();
  html += renderSlotModal();
  if (!commitHtml(app, html)) return;

  if (restoreId){
    const el = document.getElementById(restoreId);
    if (el && el.tagName === "INPUT" && (el.type === "text" || el.type === "password")){
      el.focus();
      if (restoreVal != null){ el.value = restoreVal; try{ el.setSelectionRange(restoreVal.length, restoreVal.length); }catch(e){} }
    }
  }
}

/* "Go to court now" banners: fresh court assignments, auto-expire.
   Tapping a banner hides it on this phone only; the admin ✓ dismisses it
   for everyone. Scores are never entered from here. */
function renderCallouts(){
  const called = calledMatches();
  if (!called.length) return "";
  const multi = activeEvents().length > 1;
  let h = "";
  called.slice(0, 3).forEach(m => {
    const ev = eventById(m.event_id);
    h += '<button class="callout" onclick="dismissCallout(\'' + m.id + '\')" title="Tap to dismiss"><span class="cinner">' +
      '<span class="ctext">Court ' + m.court + ' now: ' + esc(entrantName(m.entrant1_id)) + ' <span class="cdim">vs</span> ' + esc(entrantName(m.entrant2_id)) +
      (multi && ev ? ' <span class="cdim">· ' + esc(ev.name) + '</span>' : '') + '</span>' +
      (state.adminPin
        ? '<span class="ack" role="button" onclick="event.stopPropagation();ackCalled(\'' + m.id + '\')">✓ On court</span>'
        : '<span class="ack" aria-hidden="true">✕</span>') +
      '</span></button>';
  });
  if (called.length > 3) h += '<div class="callout"><span class="cinner"><span class="ctext cdim">' + (called.length - 3) + ' more matches just called</span></span></div>';
  return h;
}

function eventLabel(ev){
  let l = ev.name;
  if (ev.active) l += " · running";
  else if (evSetting(ev, "schedule_note", "")) l += " · " + evSetting(ev, "schedule_note", "");
  return l;
}
function renderEventPicker(){
  const cur = currentEvent();
  const evs = data.events.slice().sort((a, b) => a.sort_order - b.sort_order);
  return '<div class="eventpick"><select onchange="setEvent(this.value)" aria-label="Event">' +
    evs.map(ev => '<option value="' + ev.id + '"' + (cur && ev.id === cur.id ? ' selected' : '') + '>' + esc(eventLabel(ev)) + '</option>').join("") +
    '</select></div>';
}

function queueRow(m, opts){
  opts = opts || {};
  const ev = eventById(m.event_id);
  let row = '<div class="queue-row click" onclick="openMatch(\'' + m.id + '\')">';
  if (opts.pos != null) row += '<span class="qpos">' + opts.pos + '</span>';
  row += '<span class="qnames">' + esc(entrantName(m.entrant1_id)) + ' <span class="qv">vs</span> ' + esc(entrantName(m.entrant2_id)) + '</span>';
  if (m.postponed && !opts.inPostponed) row += '<span class="qtag">Postponed</span>';
  if (opts.showEvent && ev) row += '<span class="qtag">' + esc(ev.name) + '</span>';
  if (state.adminPin && opts.action === "postpone")
    row += '<span class="queue-actions"><button class="btn small secondary" onclick="event.stopPropagation();postpone(\'' + m.id + '\', false)">Postpone</button></span>';
  if (state.adminPin && opts.action === "playnext")
    row += '<span class="queue-actions"><button class="btn small secondary" onclick="event.stopPropagation();playNext(\'' + m.id + '\')">Play next</button></span>';
  row += '</div>';
  return row;
}

function renderBoard(){
  const act = activeEvents();
  const multi = act.length > 1;
  let h = '<span class="print-title">' + esc(data.tournament.name) + ' · Courts</span>';

  if (!act.length){
    h += '<div class="empty">Nothing is running right now.';
    const upcoming = data.events.filter(e => !e.active && evSetting(e, "schedule_note", ""));
    if (upcoming.length){
      h += '<br><br>' + upcoming.slice(0, 8).map(e => esc(e.name) + ' · ' + esc(evSetting(e, "schedule_note", ""))).join('<br>');
    }
    h += '</div>';
    return h;
  }

  const on = onCourtMatches();
  h += '<div class="section-h"><h2>On court</h2></div>';
  h += '<div class="courtgrid">';
  for(let c = 1; c <= courtsCount(); c++){
    const m = on.find(x => x.court === c);
    if (m){
      const ev = eventById(m.event_id);
      h += '<button class="courtcard" onclick="openMatch(\'' + m.id + '\')">' +
        '<div class="chead"><span class="cnum">Court ' + c + '</span>' +
        (multi ? '<span class="tag plain">' + esc(ev.name) + '</span>' : '') + '</div>' +
        '<div class="team">' + esc(entrantName(m.entrant1_id)) + '</div>' +
        '<div class="vs">vs</div>' +
        '<div class="team">' + esc(entrantName(m.entrant2_id)) + '</div>' +
        '<div class="cta">Tap to enter the score</div></button>';
    } else {
      h += '<div class="courtcard idle"><div class="chead"><span class="cnum">Court ' + c + '</span></div>' +
        '<div class="team">Free</div></div>';
    }
  }
  h += '</div>';

  const q = pendingQueue();
  const upNext = q.slice(0, 8);
  if (upNext.length){
    h += '<div class="section-h"><h2>Up next</h2></div><div class="roundblock" style="padding-top:2px">';
    h += upNext.map((m, i) => queueRow(m, { pos: i + 1, showEvent: multi, action: "postpone" })).join("");
    h += '</div>';
    if (q.length > upNext.length || state.showAllQueue){
      h += '<p style="margin-top:8px"><button class="btn small secondary" onclick="toggleAllQueue()">' +
        (state.showAllQueue ? 'Show fewer' : 'Show all matches (' + q.length + ' waiting)') + '</button></p>';
    }
    if (state.showAllQueue && q.length > upNext.length){
      h += '<div class="roundblock" style="padding-top:2px">';
      h += q.slice(8).map((m, i) => queueRow(m, { pos: i + 9, showEvent: multi, action: "postpone" })).join("");
      h += '</div>';
    }
  }

  const postponedList = data.matches.filter(m => m.status === "scheduled" && m.postponed &&
    (eventById(m.event_id) || {}).active);
  if (postponedList.length){
    h += '<div class="section-h"><h2>Postponed</h2><span class="hint">Waiting lower in the queue</span></div><div class="roundblock" style="padding-top:2px">';
    h += postponedList.map(m => queueRow(m, { showEvent: multi, action: "playnext", inPostponed: true })).join("");
    h += '</div>';
  }

  h += '<div class="boardnotes">';
  for(const ev of act){
    const total = data.matches.filter(m => m.event_id === ev.id && m.stage === "group").length;
    const done = data.matches.filter(m => m.event_id === ev.id && m.stage === "group" && m.status === "played").length;
    const ko = data.matches.filter(m => m.event_id === ev.id && m.stage === "knockout").length;
    h += '<span class="note">' + esc(ev.name) + ': ' + done + ' of ' + total + ' group matches played' + (ko ? ', knockout underway' : '') + '</span>';
  }
  h += '</div>';
  return h;
}

function scheduleRow(m, withScore){
  const played = m.status === "played" && m.score1 != null;
  const bye = m.stage === "knockout" && m.status === "played" && m.score1 == null;
  const clickable = !bye && m.entrant1_id && m.entrant2_id;
  let res = '';
  if (withScore){
    if (played){
      const gs = gamesStr(m);
      res = '<span class="res">' + (gs ? esc(gs) : m.score1 + '-' + m.score2) + '</span>' +
        (m.walkover ? ' <span class="tag warn">W/O</span>' : '');
    }
    else if (m.court != null) res = '<span class="res pending">Court ' + m.court + '</span>';
    else if (m.postponed) res = '<span class="res pending">Postponed</span>';
  } else if (played){
    res = '<span class="res pending">✓</span>';
  } else if (m.court != null){
    res = '<span class="res pending">Court ' + m.court + '</span>';
  } else if (m.postponed){
    res = '<span class="res pending">Postponed</span>';
  }
  const inner = '<span class="g">' + (m.group_name ? esc(m.group_name) : '') + '</span>' +
    '<span class="names">' + esc(entrantName(m.entrant1_id) || "TBD") + ' <span class="qv">vs</span> ' + esc(entrantName(m.entrant2_id) || (bye ? "BYE" : "TBD")) + '</span>' + res;
  return clickable
    ? '<button class="srow' + (played ? ' done' : '') + '" onclick="openMatch(\'' + m.id + '\')">' + inner + '</button>'
    : '<div class="srow' + (played ? ' done' : '') + '">' + inner + '</div>';
}
function termFilterFor(){
  const term = state.search.trim().toLowerCase();
  return m => {
    if (!term) return true;
    const n1 = entrantName(m.entrant1_id) || "", n2 = entrantName(m.entrant2_id) || "";
    return n1.toLowerCase().includes(term) || n2.toLowerCase().includes(term);
  };
}

function renderSchedule(){
  const ev = currentEvent();
  if (!ev) return '<div class="empty">No events yet.</div>';
  const evMatches = data.matches.filter(m => m.event_id === ev.id);
  if (!evMatches.length){
    const note = evSetting(ev, "schedule_note", "");
    return '<div class="empty">' + esc(ev.name) + ' has no schedule yet.' + (note ? '<br>Planned: ' + esc(note) : '') + '</div>';
  }
  const groupMs = evMatches.filter(m => m.stage === "group");
  const koMs = evMatches.filter(m => m.stage === "knockout");
  const maxRound = Math.max(0, ...groupMs.map(m => m.round));
  /* Heal a filter that no longer exists (event redrawn, bracket reset). */
  if (state.roundFilter === "ko" ? !koMs.length : state.roundFilter !== "all" && parseInt(state.roundFilter, 10) > maxRound) state.roundFilter = "all";

  let h = '<span class="print-title">' + esc(data.tournament.name) + ' · ' + esc(ev.name) + ' · Schedule</span>';
  h += '<div class="controls">' +
    '<input class="search" id="search-input" type="text" placeholder="Find a name" value="' + esc(state.search) + '" oninput="setSearch(this.value)">' +
    '<button class="btn small secondary" onclick="window.print()">Print</button></div>';
  h += '<div class="subtabs" role="tablist">' +
    '<button class="subtab" aria-current="' + (state.roundFilter === "all") + '" onclick="setRoundFilter(\'all\')">All</button>';
  for(let r = 1; r <= maxRound; r++){
    h += '<button class="subtab" aria-current="' + (state.roundFilter === String(r)) + '" onclick="setRoundFilter(\'' + r + '\')">Round ' + r + '</button>';
  }
  if (koMs.length) h += '<button class="subtab" aria-current="' + (state.roundFilter === "ko") + '" onclick="setRoundFilter(\'ko\')">Knockout</button>';
  h += '</div>';

  const matchesTerm = termFilterFor();

  if (state.roundFilter === "ko"){
    if (!koMs.length) return h + '<div class="empty">No knockout matches yet.</div>';
    const total = Math.max(...koMs.map(x => x.bracket_round));
    for(let r = 1; r <= total; r++){
      const list = koMs.filter(m => m.bracket_round === r && matchesTerm(m)).sort((a, b) => a.bracket_pos - b.bracket_pos);
      if (!list.length) continue;
      h += '<div class="roundblock"><h3>' + roundLabelFor(r, total) + '</h3>' + list.map(m => scheduleRow(m, true)).join("") + '</div>';
    }
    return h;
  }

  const shown = groupMs.filter(m => (state.roundFilter === "all" || String(m.round) === state.roundFilter) && matchesTerm(m));
  if (!shown.length) return h + '<div class="empty">No matches found.</div>';
  for(let r = 1; r <= maxRound; r++){
    const list = shown.filter(m => m.round === r).sort((a, b) => a.play_order - b.play_order);
    if (!list.length) continue;
    h += '<div class="roundblock"><h3>Round ' + r + '</h3>' + list.map(m => scheduleRow(m, false)).join("") + '</div>';
  }
  h += '<p class="note">Matches run in this order, group A first, so everyone plays round 1 before round 2 starts. Tap a match for details; a score can be entered while the match is on a court, and corrections go through the desk. Results and Standings update live.</p>';
  return h;
}

function renderResults(){
  const ev = currentEvent();
  if (!ev) return '<div class="empty">No events yet.</div>';
  const evMatches = data.matches.filter(m => m.event_id === ev.id);
  const matchesTerm = termFilterFor();
  const played = evMatches.filter(m => m.status === "played" && m.score1 != null && matchesTerm(m));
  const koMs = evMatches.filter(m => m.stage === "knockout");
  const groups = groupsOfEvent(ev);
  if (state.resultsFilter === "ko" ? !koMs.length : state.resultsFilter !== "all" && !groups.includes(state.resultsFilter)) state.resultsFilter = "all";
  const f = state.resultsFilter;

  let h = '<span class="print-title">' + esc(data.tournament.name) + ' · ' + esc(ev.name) + ' · Results</span>';
  h += '<div class="controls">' +
    '<input class="search" id="search-input" type="text" placeholder="Find a name" value="' + esc(state.search) + '" oninput="setSearch(this.value)">' +
    '<button class="btn small secondary" onclick="window.print()">Print</button></div>';
  if (groups.length > 1 || koMs.length){
    h += '<div class="subtabs" role="tablist">' +
      '<button class="subtab" aria-current="' + (f === "all") + '" onclick="setResultsFilter(\'all\')">All</button>' +
      groups.map(g => '<button class="subtab" aria-current="' + (f === g) + '" onclick="setResultsFilter(\'' + esc(g) + '\')">Group ' + esc(g) + '</button>').join("") +
      (koMs.length ? '<button class="subtab" aria-current="' + (f === "ko") + '" onclick="setResultsFilter(\'ko\')">Knockout</button>' : '') +
      '</div>';
  }
  if (!played.length) return h + '<div class="empty">No results yet for ' + esc(ev.name) + '.</div>';

  let body = '';
  if ((f === "all" || f === "ko") && koMs.some(m => m.status === "played" && m.score1 != null)){
    const total = Math.max(...koMs.map(x => x.bracket_round));
    for(let r = total; r >= 1; r--){
      const list = played.filter(m => m.stage === "knockout" && m.bracket_round === r);
      if (!list.length) continue;
      body += '<div class="roundblock"><h3>' + roundLabelFor(r, total) + '</h3>' + list.map(m => scheduleRow(m, true)).join("") + '</div>';
    }
  }
  if (f !== "ko"){
    for(const g of groups){
      if (f !== "all" && f !== g) continue;
      const list = played.filter(m => m.stage === "group" && m.group_name === g).sort((a, b) => a.round - b.round || a.play_order - b.play_order);
      if (!list.length) continue;
      body += '<div class="roundblock"><h3>Group ' + g + '</h3>' + list.map(m => scheduleRow(m, true)).join("") + '</div>';
    }
  }
  return h + (body || '<div class="empty">No results here yet.</div>');
}

function renderStandings(){
  const ev = currentEvent();
  if (!ev) return '<div class="empty">No events yet.</div>';
  const groups = groupsOfEvent(ev);
  if (!groups.length){
    const note = evSetting(ev, "schedule_note", "");
    return '<div class="empty">' + esc(ev.name) + ' has no groups yet.' + (note ? '<br>Planned: ' + esc(note) : '') + '</div>';
  }
  const field = seedFieldFor(ev);
  const adv = Math.max(1, field.guaranteed);
  if (state.standingsFilter !== "all" && !groups.includes(state.standingsFilter)) state.standingsFilter = "all";
  const f = state.standingsFilter;
  let h = '<span class="print-title">' + esc(data.tournament.name) + ' · ' + esc(ev.name) + ' · Standings</span>';
  h += '<div class="section-h"><h2>' + esc(ev.name) + '</h2><span class="hint">Top ' + adv + ' per group advance' +
    (field.wildcards ? ' plus ' + field.wildcards + ' best next-placed' : '') + ' · tap a team for details</span></div>';
  if (groups.length > 1){
    h += '<div class="subtabs" role="tablist">' +
      '<button class="subtab" aria-current="' + (f === "all") + '" onclick="setStandingsFilter(\'all\')">All</button>' +
      groups.map(g => '<button class="subtab" aria-current="' + (f === g) + '" onclick="setStandingsFilter(\'' + esc(g) + '\')">Group ' + esc(g) + '</button>').join("") +
      '</div>';
  }
  for(const g of groups){
    if (f !== "all" && f !== g) continue;
    const rows = standingsFor(ev, g);
    const left = data.matches.filter(m => m.event_id === ev.id && m.stage === "group" && m.group_name === g && m.status === "scheduled").length;
    h += '<div class="group-card"><h3><span>Group ' + g + '</span>' + (left ? '<span class="tag plain">' + left + ' left</span>' : '<span class="tag plain">Complete</span>') + '</h3>';
    h += '<table class="standings"><thead><tr><th></th><th class="tname">Team</th><th>P</th><th>W</th><th>L</th><th>+/-</th></tr></thead><tbody>';
    rows.forEach((r, i) => {
      h += '<tr onclick="openTeam(\'' + r.id + '\')"><td class="pos">' + (i + 1) + '</td><td class="tname">' + esc(r.name) + '</td>' +
        '<td>' + r.p + '</td><td>' + r.w + '</td><td>' + r.l + '</td><td>' + (r.diff > 0 ? '+' : '') + r.diff + '</td></tr>';
    });
    h += '</tbody></table></div>';
  }
  h += '<p class="note">Tiebreakers: wins, then head to head, then point difference, then points scored.</p>';
  return h;
}

/* One column of the bracket tree. Sibling matches are wrapped in a .bkpair,
   whose CSS draws the elbow connectors into the next round. */
function bkColumn(label, cells, feeds){
  let h = '<div class="bkcol"><div class="bkhead"><span class="microlabel">' + label + '</span></div><div class="bkbody">';
  if (feeds && cells.length === 1){
    h += '<div class="bkpair link solo"><div class="bkslot">' + cells[0] + '</div></div>';
  } else if (feeds){
    for(let i = 0; i < cells.length; i += 2){
      h += '<div class="bkpair link"><div class="bkslot">' + cells[i] + '</div><div class="bkslot">' + cells[i + 1] + '</div></div>';
    }
  } else {
    for(const c of cells) h += '<div class="bkpair"><div class="bkslot">' + c + '</div></div>';
  }
  return h + '</div></div>';
}
/* One underlined line of a bracket cell. Every cell is exactly two of these,
   so sibling cells stay the same height and the connector elbows line up.
   `right` is optional markup for the line's right end (score or edit link). */
function bkRow(inner, cls, right){
  return '<div class="bkrow"><span class="bkteam' + (cls || '') + '">' + inner + '</span>' + (right || '') + '</div>';
}
function bkScore(n){ return '<span class="bkscore">' + n + '</span>'; }

function renderBracket(){
  const ev = currentEvent();
  if (!ev) return '<div class="empty">No events yet.</div>';
  const ko = data.matches.filter(m => m.event_id === ev.id && m.stage === "knockout");

  if (!ko.length){
    const groups = groupsOfEvent(ev);
    if (!groups.length) return '<div class="empty">' + esc(ev.name) + ' has no groups yet.</div>';
    const field = seedFieldFor(ev);
    if (field.seeds.length < 2) return '<div class="empty">Not enough teams yet.</div>';
    const left = data.matches.filter(m => m.event_id === ev.id && m.stage === "group" && m.status === "scheduled").length;
    const pairs = bracketPairs(field.seeds);
    const size = nextPow2(Math.max(2, field.seeds.length));
    const totalRounds = Math.log2(size);
    const slotRow = s => {
      if (!s) return bkRow('BYE', ' tbd');
      return bkRow(esc(s.group + s.place) + (s.wildcard ? ' <span class="tag warn">Best ' + ordinal(s.place) + '</span>' : ''));
    };
    let h = '<div class="section-h"><h2>Projected bracket</h2><span class="hint">' +
      (left ? 'Live, ' + left + ' group matches to go' : 'Group play complete') + '</span></div>';
    h += '<div class="bkwrap"><div class="bk">';
    for(let r = 1; r <= totalRounds; r++){
      const count = size / Math.pow(2, r);
      const cells = r === 1
        ? pairs.map(p => '<div class="bko">' + slotRow(p[0]) + slotRow(p[1]) + '</div>')
        : Array.from({ length: count }, () => '<div class="bko">' + bkRow('', ' tbd') + bkRow('', ' tbd') + '</div>');
      h += bkColumn(roundLabelFor(r, totalRounds), cells, true);
    }
    h += bkColumn('Champion', ['<div class="bko">' + bkRow('', ' tbd') + '</div>'], false);
    h += '</div></div>';
    h += '<p class="note">A1 means the group A winner, C2 the group C runner-up, from standings right now, so matchups can shift until group play ends. ' +
      field.seeds.length + ' qualify for a ' + size + '-slot bracket' +
      (field.wildcards ? ', including ' + field.wildcards + ' wildcard' + (field.wildcards > 1 ? 's' : '') + ' from the next places' : '') +
      '. Winners advance along the lines. The real bracket is created when the desk confirms the group stage is finished.</p>';
    return h;
  }

  const total = Math.max(...ko.map(m => m.bracket_round));
  let h = '<span class="print-title">' + esc(data.tournament.name) + ' · ' + esc(ev.name) + ' · Bracket</span>';
  h += '<div class="bkwrap"><div class="bk">';
  for(let r = 1; r <= total; r++){
    const list = ko.filter(m => m.bracket_round === r).sort((a, b) => a.bracket_pos - b.bracket_pos);
    const cells = list.map(m => {
      const n1 = entrantName(m.entrant1_id), n2 = entrantName(m.entrant2_id);
      const played = m.status === "played" && m.score1 != null;
      const bye = m.status === "played" && m.score1 == null;
      const w1 = played && m.score1 > m.score2, w2 = played && m.score2 > m.score1;
      const clickable = !bye && m.entrant1_id && m.entrant2_id;
      const wo = ' <span class="tag warn">W/O</span>';
      const edit = state.adminPin && m.status === "scheduled" && !bye
        ? '<span class="bedit" role="button" tabindex="0" onclick="event.stopPropagation();openSlotEditor(\'' + m.id + '\')">Edit teams</span>'
        : '';
      const inner = bkRow((n1 ? esc(n1) : '') + (m.walkover && w1 ? wo : ''), n1 ? (w1 ? ' win' : '') : ' tbd', played ? bkScore(m.score1) : '') +
        bkRow((n2 ? esc(n2) : (bye ? 'BYE' : '')) + (m.walkover && w2 ? wo : ''), n2 ? (w2 ? ' win' : '') : ' tbd', played ? bkScore(m.score2) : edit);
      return clickable
        ? '<button class="bko" onclick="openMatch(\'' + m.id + '\')">' + inner + '</button>'
        : '<div class="bko">' + inner + '</div>';
    });
    h += bkColumn(roundLabelFor(r, total), cells, true);
  }
  const final = ko.find(m => m.bracket_round === total);
  let champCell;
  if (final && final.status === "played" && final.score1 != null){
    const champ = final.score1 > final.score2 ? final.entrant1_id : final.entrant2_id;
    champCell = '<div class="bko"><div class="champ"><span class="microlabel">' + esc(ev.name) + '</span><br>🏆 ' + esc(entrantName(champ)) + '</div></div>';
  } else {
    champCell = '<div class="bko">' + bkRow('', ' tbd') + '</div>';
  }
  h += bkColumn('Champion', [champCell], false);
  h += '</div></div>';
  h += '<p class="note">Tap a match to see or enter its result. Winners advance along the lines.</p>';
  return h;
}

        ['auto',4,8,16,32].map(v => '<option value="' + v + '"' + (ksize == String(v) ? ' selected' : '') + '>' + (v === 'auto' ? 'Auto' : v + ' teams') + '</option>').join("") + '</select></div>' +
      '<div class="field"><label for="adm-adv">Advance per group (auto)</label><input id="adm-adv" type="number" min="1" max="4" value="' + evSetting(ev, "advance_per_group", 2) + '"></div>' +
      '</div>' +
      '<button class="btn small secondary" onclick="saveEventSettings()">Save settings</button>' +
      '<p class="note" style="margin-top:8px">Changes apply right away. "Auto" knockout size takes the top ' + evSetting(ev, "advance_per_group", 2) + ' per group and fills to a full bracket with best next-placed teams; a fixed size does the same math for that exact number.</p>';

    if (!hasMatches || state.showRedraw){
      h += '<div class="divider"></div><h4>' + (hasMatches ? 'Start over with a new list' : '2 · Draw groups') + '</h4>';
      h += '<p class="note">Paste entrants one per line. For doubles use one line per team, e.g. "Maya &amp; Owen".</p>';
      h += '<div class="field"><label for="adm-teams">Entrants (one per line)</label><textarea id="adm-teams" placeholder="One team or player per line"></textarea></div>' +
        '<div class="fieldrow"><div class="field"><label for="adm-gsize">Target group size</label><input id="adm-gsize" type="number" min="3" max="10" value="' + evSetting(ev, "group_size", 6) + '"></div>' +
        '<div class="field" style="display:flex;align-items:flex-end"><label style="display:flex;align-items:center;gap:6px;margin:0;padding-bottom:10px"><input type="checkbox" id="adm-shuffle" checked> Random draw</label></div></div>' +
        '<button class="btn small secondary" onclick="previewSetup()">Preview</button> ' +
        (hasMatches
          ? '<button class="btn small danger" onclick="applySetup()">Draw new groups (wipes this event)</button> <button class="btn small secondary" onclick="toggleRedraw()">Cancel</button>'
          : '<button class="btn small" onclick="applySetup()">Draw groups</button>') +
        (state.setupPreview ? '<div class="preview-box">' + esc(state.setupPreview) + '</div>' : '');
    }

    if (evEntrants.length){
      const nextLetter = groupLetter(groups.length);
      h += '<div class="divider"></div><h4>' + (hasMatches ? '2 · Teams and groups' : 'Teams') + '</h4>';
      h += '<details class="teamlist"><summary>Team list (' + evEntrants.length + ' in ' + groups.length + ' groups) · rename, move, remove, add</summary>';
      const byGroup = {};
      evEntrants.forEach(e => { (byGroup[e.group_name] = byGroup[e.group_name] || []).push(e); });
      Object.keys(byGroup).sort().forEach(g => {
        byGroup[g].forEach(e => {
          h += '<div class="queue-row"><span class="qnames">' + esc(e.name) + '</span><span class="qtag">Group ' + esc(g) + '</span>' +
            '<span class="queue-actions">' +
            '<select class="mv" onchange="moveEntrant(\'' + e.id + '\', this.value); this.value=\'\'">' +
            '<option value="">Move…</option>' +
            groups.filter(x => x !== g).map(x => '<option value="' + x + '">To ' + x + '</option>').join("") +
            '<option value="__new">New group ' + nextLetter + '</option></select>' +
            '<button class="btn small secondary" onclick="renameEntrant(\'' + e.id + '\')">Rename</button>' +
            '<button class="btn small danger" onclick="removeEntrant(\'' + e.id + '\')">Remove</button></span></div>';
        });
      });
      h += '<div class="addteam"><input id="add-team-name" type="text" placeholder="New team or player">' +
        '<select id="add-team-group">' + groups.map(g => '<option value="' + g + '">Group ' + g + '</option>').join("") + '</select>' +
        '<button class="btn small secondary" onclick="addTeamToGroup()">Add</button></div>' +
        '<p class="note" style="margin-top:6px">Moving or removing a team also removes its matches (and results). New or moved teams get catch-up matches at the end of the queue.</p></details>';
      if (hasMatches && !state.showRedraw){
        h += '<p class="note"><button class="btn small secondary" onclick="toggleRedraw()">Start over with a new list</button></p>';
      }
    }

    h += '<div class="divider"></div><h4>3 · Courts and start</h4>';
    h += '<div class="courtchecks">';
    for(let c = 1; c <= courtsCount(); c++){
      const holder = data.events.find(e => e.active && e.id !== ev.id && (evSetting(e, "courts", [])).includes(c));
      h += '<label><input type="checkbox" class="adm-court" value="' + c + '"' + (alloc.includes(c) ? ' checked' : '') + '> Court ' + c +
        (holder ? ' <span class="holder">(' + esc(holder.name) + ')</span>' : '') + '</label>';
    }
    h += '</div>';
    h += '<div class="field" style="margin-top:6px"><label for="adm-note">Schedule note (shown to players, e.g. "Sat 9am")</label>' +
      '<input id="adm-note" type="text" value="' + esc(evSetting(ev, "schedule_note", "")) + '"></div>';
    h += '<button class="btn small secondary" onclick="saveCourts()">Save courts and note</button> ';
    h += ev.active
      ? '<button class="btn small secondary" onclick="setActive(false)">Pause event</button>'
      : '<button class="btn small" onclick="setActive(true)">Start event</button>';
    h += '<p class="note" style="margin-top:8px">Ticking a court another running event holds will ask to take it over, no pausing needed. Court changes apply immediately.</p>';

    h += '<div class="divider"></div><h4>4 · Finish group stage</h4>';
    if (koCount){
      h += '<p class="note">Knockout bracket is live (' + koCount + ' matches).</p>' +
        '<button class="btn small secondary" onclick="confirmGroupStage()">Redo bracket from standings</button> ' +
        '<button class="btn small secondary" onclick="resetBracket()">Back to group stage</button>';
    } else {
      h += '<p class="note">' + (groupLeft ? groupLeft + ' group matches still unplayed. ' : 'Group play is complete. ') +
        'Check the projected matchups on the Bracket tab, then confirm to create the knockout.</p>' +
        '<button class="btn small' + (groupLeft ? ' secondary' : '') + '" ' + (hasMatches ? '' : 'disabled') + ' onclick="confirmGroupStage()">Confirm group stage finished</button>';
    }

    h += '<div class="divider"></div><button class="btn small danger" onclick="deleteEvent()">Delete this event</button>';
    h += '</div>';
  }

  h += '<div class="panel"><h3>Admin powers on the other tabs</h3><p class="note">' +
    'While unlocked: tap any match anywhere (Courts, Schedule, Results, a team in Standings, or the Bracket) to fix or clear its score, enter a walkover, or postpone. ' +
    'Players can only enter a score while a match is on a court; admins can score anything from anywhere. ' +
    'The Courts tab has Postpone on the queue and Play next on postponed matches. On a "go to court" banner, ✓ On court dismisses it for everyone; a plain tap hides it only on that phone. ' +
    'On the Bracket tab, unplayed matches have an Edit teams link for manual fixes. ' +
    'Everything updates live on everyone\'s phone.</p></div>';

  if (store.mode === "live"){
    h += '<div class="panel"><h3>Change PIN</h3><div class="fieldrow">' +
      '<div class="field"><label for="adm-oldpin">Current PIN</label><input id="adm-oldpin" type="password"></div>' +
      '<div class="field"><label for="adm-newpin">New PIN</label><input id="adm-newpin" type="password"></div></div>' +
      '<button class="btn small secondary" onclick="doChangePin()">Change PIN</button></div>';
  }
  h += '<p style="margin-top:6px"><button class="btn secondary small" onclick="adminSignOut()">Sign out of admin</button></p>';
  return h;
}

/* ---------- modals ---------- */
function renderScoreModal(){
  if (!state.modalMatchId) return "";
  const m = data.matches.find(x => x.id === state.modalMatchId);
  if (!m) return "";
  const n1 = entrantName(m.entrant1_id) || "TBD", n2 = entrantName(m.entrant2_id) || "TBD";
  const played = m.status === "played" && m.score1 != null;
  const isAdmin = !!state.adminPin;
  /* Players can only enter scores for matches currently on a court; everything
     else is read-only for them (admins can score any match from anywhere). */
  const onCourt = m.status === "scheduled" && m.court != null;
  const infoOnly = !isAdmin && !played && !onCourt;
  const pts = matchPts(m);
  const bo = matchBestOf(m);
  const ev = eventById(m.event_id);

  let h = '<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal" role="dialog" aria-modal="true">';
  h += '<h3>' + (played ? 'Match result' : infoOnly ? 'Upcoming match' : 'Enter score') + '</h3>';
  h += '<div class="sub">' + esc(ev ? ev.name : '') + ' · ' + esc(roundName(m)) + (m.court != null && !played ? ' · Court ' + m.court : '') +
    ' · ' + (bo > 1 ? 'best of ' + bo + ', games' : 'first') + ' to ' + pts + '</div>';

  const adminExtras = () => {
    let x = '';
    if (isAdmin && m.status === "scheduled"){
      x += '<button class="btn small secondary" onclick="postpone(\'' + m.id + '\', false, true)">Postpone</button>' +
        '<button class="btn small secondary" onclick="postpone(\'' + m.id + '\', true, true)">To end</button>';
    }
    if (isAdmin && played) x += '<button class="btn small danger" onclick="clearScore(\'' + m.id + '\')">Clear score</button>';
    return x;
  };
  const walkoverRow = () => {
    if (!isAdmin || !m.entrant1_id || !m.entrant2_id) return '';
    return '<p class="note" style="margin-top:10px">No-show? Record a walkover win:</p>' +
      '<div class="actions" style="margin-top:4px">' +
      '<button class="btn small secondary" onclick="walkover(\'' + m.id + '\', 1)">W/O · ' + esc(n1) + '</button>' +
      '<button class="btn small secondary" onclick="walkover(\'' + m.id + '\', 2)">W/O · ' + esc(n2) + '</button></div>';
  };

  if (played && !isAdmin){
    h += '<div class="score-line"><label>' + esc(n1) + '</label><span style="font-size:22px;font-weight:800;font-variant-numeric:tabular-nums">' + m.score1 + '</span></div>';
    h += '<div class="score-line"><label>' + esc(n2) + '</label><span style="font-size:22px;font-weight:800;font-variant-numeric:tabular-nums">' + m.score2 + '</span></div>';
    const gs = gamesStr(m);
    if (gs) h += '<p class="note">Games: ' + esc(gs) + '</p>';
    if (m.walkover) h += '<p class="note">Walkover.</p>';
    h += '<p class="note">Score already recorded. Spot a mistake? Ask at the desk and an organizer can fix it.</p>';
    h += '<div class="actions"><span class="spacer"></span><button class="btn secondary" onclick="closeModal()">Close</button></div>';
  } else if (infoOnly){
    h += '<div class="score-line"><label>' + esc(n1) + '</label></div>';
    h += '<div class="score-line"><label>' + esc(n2) + '</label></div>';
    h += '<p class="note">' + (m.postponed ? 'Postponed: waiting lower in the queue.' : 'Waiting for a court.') +
      ' When the match is called, it appears on the Courts tab and the score can be entered. Anything wrong? Ask at the desk.</p>';
    h += '<div class="actions"><span class="spacer"></span><button class="btn secondary" onclick="closeModal()">Close</button></div>';
  } else if (bo > 1){
    h += '<div class="game-line"><span class="glabel"></span><span style="flex:1;font-size:12px;font-weight:700;color:var(--muted);overflow-wrap:anywhere">' + esc(n1) + '</span><span style="flex:1;font-size:12px;font-weight:700;color:var(--muted);overflow-wrap:anywhere;text-align:right">' + esc(n2) + '</span></div>';
    for(let g = 1; g <= bo; g++){
      const pre = played && m.games && m.games[g - 1] ? m.games[g - 1] : null;
      h += '<div class="game-line"><span class="glabel">Game ' + g + '</span>' +
        '<input class="score-in" id="g' + g + 'a" type="number" inputmode="numeric" min="0" value="' + (pre ? pre[0] : '') + '" style="flex:1">' +
        '<input class="score-in" id="g' + g + 'b" type="number" inputmode="numeric" min="0" value="' + (pre ? pre[1] : '') + '" style="flex:1"></div>';
    }
    h += '<div class="err" id="score-err"></div>';
    h += '<p class="note">Fill games in order and leave unplayed games blank. First to ' + (Math.floor(bo / 2) + 1) + ' game wins takes the match.</p>';
    if (!isAdmin) h += '<p class="note">One entry per match: after that, corrections go through the desk.</p>';
    h += '<div class="actions">' + adminExtras() +
      '<span class="spacer"></span><button class="btn secondary" onclick="closeModal()">Cancel</button>' +
      '<button class="btn" onclick="saveScore(\'' + m.id + '\')">' + (isAdmin ? 'Save (admin)' : 'Save score') + '</button></div>';
    h += walkoverRow();
  } else {
    h += '<div class="score-line"><label for="score1">' + esc(n1) + '</label><input class="score-in" id="score1" type="number" inputmode="numeric" min="0" value="' + (played ? m.score1 : '') + '"></div>';
    h += '<div class="score-line"><label for="score2">' + esc(n2) + '</label><input class="score-in" id="score2" type="number" inputmode="numeric" min="0" value="' + (played ? m.score2 : '') + '"></div>';
    h += '<div class="err" id="score-err"></div>';
    if (!isAdmin) h += '<p class="note">Winners report the score. One entry per match: after that, corrections go through the desk.</p>';
    h += '<div class="actions">' + adminExtras() +
      '<span class="spacer"></span><button class="btn secondary" onclick="closeModal()">Cancel</button>' +
      '<button class="btn" onclick="saveScore(\'' + m.id + '\')">' + (isAdmin ? 'Save (admin)' : 'Save score') + '</button></div>';
    h += walkoverRow();
  }
  h += '</div></div>';
  return h;
}

function renderTeamModal(){
  if (!state.teamModalId || state.modalMatchId) return "";
  const e = entrantById(state.teamModalId);
  if (!e) return "";
  const ev = eventById(e.event_id);
  const ms = data.matches
    .filter(m => (m.entrant1_id === e.id || m.entrant2_id === e.id))
    .sort((a, b) => (a.stage === b.stage ? a.play_order - b.play_order : a.stage === "group" ? -1 : 1));
  let w = 0, l = 0;
  ms.forEach(m => {
    if (m.status !== "played" || m.score1 == null) return;
    const mine = m.entrant1_id === e.id ? m.score1 : m.score2;
    const theirs = m.entrant1_id === e.id ? m.score2 : m.score1;
    if (mine > theirs) w++; else l++;
  });

  let h = '<div class="overlay" onclick="if(event.target===this)closeTeam()"><div class="modal" role="dialog" aria-modal="true">';
  h += '<h3>' + esc(e.name) + '</h3>';
  h += '<div class="sub">' + esc(ev ? ev.name : '') + (e.group_name ? ' · Group ' + esc(e.group_name) : '') + ' · ' + w + '-' + l + '</div>';
  h += ms.map(m => {
    const opp = entrantName(m.entrant1_id === e.id ? m.entrant2_id : m.entrant1_id);
    const played = m.status === "played" && m.score1 != null;
    const bye = m.stage === "knockout" && m.status === "played" && m.score1 == null;
    let res;
    if (played){
      const mine = m.entrant1_id === e.id ? m.score1 : m.score2;
      const theirs = m.entrant1_id === e.id ? m.score2 : m.score1;
      const gs = gamesStr(m);
      res = '<span class="tmres ' + (mine > theirs ? 'w' : 'l') + '">' + (mine > theirs ? 'W' : 'L') + ' ' + mine + '-' + theirs +
        (m.walkover ? ' <span class="tmgames">W/O</span>' : '') +
        (gs ? ' <span class="tmgames">(' + esc(gs) + ')</span>' : '') + '</span>';
    } else if (bye){
      res = '<span class="tmres pending">Bye</span>';
    } else if (m.court != null){
      res = '<span class="tmres pending">Court ' + m.court + '</span>';
    } else if (m.postponed){
      res = '<span class="tmres pending">Postponed</span>';
    } else {
      res = '<span class="tmres pending">To play</span>';
    }
    const clickable = !bye && m.entrant1_id && m.entrant2_id;
    const inner = '<span class="tmround">' + esc(roundName(m)) + '</span>' +
      '<span class="tmopp">' + (opp ? 'vs ' + esc(opp) : 'Opponent TBD') + '</span>' + res;
    return clickable
      ? '<button class="tmrow" onclick="openMatch(\'' + m.id + '\')">' + inner + '</button>'
      : '<div class="tmrow">' + inner + '</div>';
  }).join("");
  h += '<div class="actions"><span class="spacer"></span><button class="btn secondary" onclick="closeTeam()">Close</button></div>';
  h += '</div></div>';
  return h;
}

function renderSlotModal(){
  if (!state.slotEditId) return "";
  const m = data.matches.find(x => x.id === state.slotEditId);
  if (!m) return "";
  const ev = eventById(m.event_id);
  const evEntrants = data.entrants.filter(e => e.event_id === m.event_id)
    .slice().sort((a, b) => a.name.localeCompare(b.name));
  const opts = sel => '<option value="">TBD (empty)</option>' + evEntrants.map(e =>
    '<option value="' + e.id + '"' + (sel === e.id ? ' selected' : '') + '>' + esc(e.name) + (e.group_name ? ' (Group ' + esc(e.group_name) + ')' : '') + '</option>').join("");
  let h = '<div class="overlay" onclick="if(event.target===this)closeSlotEditor()"><div class="modal" role="dialog" aria-modal="true">';
  h += '<h3>Edit bracket teams</h3>';
  h += '<div class="sub">' + esc(ev ? ev.name : '') + ' · ' + esc(roundName(m)) + '</div>';
  h += '<div class="field"><label for="slot1">Top slot</label><select id="slot1">' + opts(m.entrant1_id) + '</select></div>';
  h += '<div class="field"><label for="slot2">Bottom slot</label><select id="slot2">' + opts(m.entrant2_id) + '</select></div>';

  h += '<div class="actions"><span class="spacer"></span><button class="btn secondary" onclick="closeSlotEditor()">Cancel</button>' +
    '<button class="btn" onclick="saveSlots(\'' + m.id + '\')">Save teams</button></div>';
  h += '</div></div>';
  return h;
}

/* ---------- actions ---------- */
function setView(v){ state.view = v; state.setupPreview = null; render(); }
function setEvent(id){ state.eventId = id; state.roundFilter = "all"; state.resultsFilter = "all"; state.standingsFilter = "all"; render(); }
function setAdminEvent(id){ state.adminEventId = id; state.setupPreview = null; state.showRedraw = false; render(); }
function setRoundFilter(r){ state.roundFilter = String(r); render(); }
function setResultsFilter(v){ state.resultsFilter = v; render(); }
function setStandingsFilter(v){ state.standingsFilter = v; render(); }
function dismissCallout(id){
  const m = data.matches.find(x => x.id === id);
  if (m) state.dismissedCalled[m.id + "|" + m.called_at] = true;
  render();
}
function toggleAllQueue(){ state.showAllQueue = !state.showAllQueue; render(); }
function toggleRedraw(){ state.showRedraw = !state.showRedraw; state.setupPreview = null; render(); }
let searchT = null;
function setSearch(v){ state.search = v; clearTimeout(searchT); searchT = setTimeout(render, 150); }
function openMatch(id){ state.modalMatchId = id; render(); }
function closeModal(){ state.modalMatchId = null; render(); }
function openTeam(id){ state.teamModalId = id; render(); }
function closeTeam(){ state.teamModalId = null; render(); }
function openSlotEditor(id){ state.slotEditId = id; render(); }
function closeSlotEditor(){ state.slotEditId = null; render(); }
document.addEventListener("keydown", e => {
  if (e.key === "Escape"){
    if (state.modalMatchId) closeModal();
    else if (state.slotEditId) closeSlotEditor();
    else if (state.teamModalId) closeTeam();
  }
});
document.addEventListener("focusout", () => {
  setTimeout(() => {
    const ae = document.activeElement;
    const typing = ae && /^(INPUT|TEXTAREA|SELECT)$/.test(ae.tagName);
    if (state.pendingRender && !typing){ state.pendingRender = false; render(); }
  }, 60);
});

async function reload(){
  try{
    data = await store.loadAll();
    state.loadError = null;
    if (state.eventId && !eventById(state.eventId)) state.eventId = null;
    if (state.adminEventId && !eventById(state.adminEventId)) state.adminEventId = null;
    /* Drop modal state whose record vanished (deleted on another device),
       otherwise a dead modalMatchId silently blocks the team modal forever. */
    if (state.modalMatchId && !data.matches.some(m => m.id === state.modalMatchId)) state.modalMatchId = null;
    if (state.slotEditId && !data.matches.some(m => m.id === state.slotEditId)) state.slotEditId = null;
    if (state.teamModalId && !data.entrants.some(e => e.id === state.teamModalId)) state.teamModalId = null;
  }catch(e){
    let msg = e.message || String(e);
    if (/does not exist|schema cache/i.test(msg)){
      msg = "The database tables aren't set up yet. Run supabase-schema.sql once in the Supabase SQL editor, then refresh.";
    }
    state.loadError = msg;
  }
  render();
}

function collectGames(bo){
  const games = [];
  for(let g = 1; g <= bo; g++){
    const a = document.getElementById("g" + g + "a").value;
    const b = document.getElementById("g" + g + "b").value;
    if (a === "" && b === "") continue;
    games.push([parseInt(a, 10), parseInt(b, 10)]);
  }
  return games;
}
async function saveScore(matchId){
  const m = data.matches.find(x => x.id === matchId);
  const bo = m ? matchBestOf(m) : 1;
  const errEl = document.getElementById("score-err");
  let r;
  if (bo > 1){
    const games = collectGames(bo);
    r = state.adminPin
      ? await store.adminSubmitScore(state.adminPin, matchId, null, null, games, false)
      : await store.submitScore(matchId, null, null, games);
  } else {
    const s1 = parseInt(document.getElementById("score1").value, 10);
    const s2 = parseInt(document.getElementById("score2").value, 10);
    r = state.adminPin
      ? await store.adminSubmitScore(state.adminPin, matchId, s1, s2, null, false)
      : await store.submitScore(matchId, s1, s2);
  }
  if (!r.ok){ errEl.textContent = r.error || "Something went wrong."; return; }
  state.modalMatchId = null;
  toast("Score saved");
  await reload();
}
async function walkover(matchId, side){
  const m = data.matches.find(x => x.id === matchId);
  if (!m) return;
  const winner = entrantName(side === 1 ? m.entrant1_id : m.entrant2_id);
  if (!confirm("Record a walkover win for " + winner + "?")) return;
  const bo = matchBestOf(m);
  const pts = bo > 1 ? Math.floor(bo / 2) + 1 : matchPts(m);
  const s1 = side === 1 ? pts : 0, s2 = side === 1 ? 0 : pts;
  const r = await store.adminSubmitScore(state.adminPin, matchId, s1, s2, null, true);
  if (!r.ok){ const errEl = document.getElementById("score-err"); if (errEl) errEl.textContent = r.error; else toast(r.error); return; }
  state.modalMatchId = null;
  toast("Walkover recorded");
  await reload();
}
async function clearScore(matchId){
  if (!confirm("Clear this score? The match goes back into the queue.")) return;
  const r = await store.adminClearScore(state.adminPin, matchId);
  if (!r.ok){ const errEl = document.getElementById("score-err"); if (errEl) errEl.textContent = r.error; else toast(r.error); return; }
  state.modalMatchId = null;
  toast("Score cleared");
  await reload();
}
async function postpone(matchId, toEnd, fromModal){
  const m = data.matches.find(x => x.id === matchId);
  if (m && m.court != null &&
      !confirm("This match is on Court " + m.court + ". Pull it off the court and postpone it?")) return;
  const r = await store.adminPostpone(state.adminPin, matchId, toEnd);
  if (!r.ok){ toast(r.error || "Could not postpone."); return; }
  if (fromModal) state.modalMatchId = null;
  toast(toEnd ? "Moved to the end of the queue" : "Postponed");
  await reload();
}
async function playNext(matchId){
  const r = await store.adminPlayNext(state.adminPin, matchId);
  if (!r.ok){ toast(r.error || "Could not move it."); return; }
  toast("Moved to the front of the queue");
  await reload();
}
async function ackCalled(matchId){

function adminSignOut(){ state.adminPin = null; safeSession("pb_admin_pin", null); render(); }

function readEventSettings(ev){
  const num = (id, dflt) => { const el = document.getElementById(id); return el ? (parseInt(el.value, 10) || dflt) : dflt; };
  const ksEl = document.getElementById("adm-ksize");
  const ks = ksEl ? ksEl.value : String(evSetting(ev, "knockout_size", "auto"));
  return Object.assign({}, ev.settings, {
    points_to_group: Math.max(1, num("adm-ptg", evSetting(ev, "points_to_group", 21))),
    points_to_knockout: Math.max(1, num("adm-ptk", evSetting(ev, "points_to_knockout", 21))),
    best_of_group: num("adm-bog", evSetting(ev, "best_of_group", 1)),
    best_of_knockout: num("adm-bok", evSetting(ev, "best_of_knockout", 1)),
    knockout_size: ks === "auto" ? "auto" : parseInt(ks, 10),
    advance_per_group: Math.max(1, num("adm-adv", evSetting(ev, "advance_per_group", 2))),
    group_size: Math.max(3, num("adm-gsize", evSetting(ev, "group_size", 6)))
  });
}
async function saveEventSettings(){
  const ev = eventById(state.adminEventId);
  if (!ev) return;
  const r = await store.adminUpdateEvent(state.adminPin, ev.id, ev.name, readEventSettings(ev));
  if (!r.ok){ toast(r.error); return; }
  toast("Settings saved"); await reload();
}
async function saveCourts(){
  const ev = eventById(state.adminEventId);
  if (!ev) return;
  const courts = [...document.querySelectorAll(".adm-court:checked")].map(el => parseInt(el.value, 10));
  const note = document.getElementById("adm-note").value.trim();

  const others = data.events.filter(e => e.active && e.id !== ev.id);
  const conflicts = others
    .map(o => ({ o, overlap: (evSetting(o, "courts", [])).filter(c => courts.includes(c)) }))
    .filter(x => x.overlap.length);
  if (conflicts.length){
    const desc = conflicts.map(x => "court " + x.overlap.join(", ") + " from " + x.o.name).join(" and ");
    if (!confirm("Take " + desc + " and give it to " + ev.name + "?")) return;
    for(const x of conflicts){
      const ns = Object.assign({}, x.o.settings, { courts: (evSetting(x.o, "courts", [])).filter(c => !x.overlap.includes(c)) });
      const rr = await store.adminUpdateEvent(state.adminPin, x.o.id, x.o.name, ns);
      if (!rr.ok){ toast(rr.error); return; }
    }
  }

  const settings = Object.assign({}, ev.settings, { courts, schedule_note: note });
  const r = await store.adminUpdateEvent(state.adminPin, ev.id, ev.name, settings);
  if (!r.ok){ toast(r.error); return; }
  toast("Courts saved"); await reload();
}
async function setActive(active){
  const ev = eventById(state.adminEventId);
  if (!ev) return;

async function addEvent(){
